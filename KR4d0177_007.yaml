body:
  text: 屏山集巻七宋劉子翬撰表代直閣南劍謝表枌社引嫌方趨嚴召鐔川易守驟拜恩除力小知難寵深極懼伏念臣猥以凡末誤蒙使令敢懷擇地之安思効捐軀之報自昔宼攘之役禍流建劍之間瓦礫相望坐待流移之復新陳未接日虞餉餽之空稍鉏復出之姦與變惟新之俗五月詎聞於報政兩州遽沐於更符地悉凋殘任均勞劇考其已試固知五技之窮責以後圖庶補東隅之失恭惟皇帝陛下乘光武中興之運先孝宣共治之良憫時囏難軫念黎庶謂遐陬習於為亂豈德意壅而未宣以臣閩人諳其土俗使之奉行條教或能安集流離曷副旁求祗深兢惕臣敢不博詢利疚袛導隆寛勸勉農桑俾復歸於飽煖解除苛嬈冀少飬於瘡痍代賀天申節表赤伏彰符方協興王之運猗蘭肇慶欣逢誕聖之期專效嵩呼仰增鴻筭恭惟皇帝陛下囏難嗣統寅畏御圖兵雖用而不殘德遂加於無外歸仁孰禦初同亶父之去邠脩政益勤終羙宣王之攘狄天申福佑人沸謳歌臣迹滯偏州夢聞清蹕瑶觴獻壽悵莫綴於朝行金鑑納忠願少俾於淵聽代寳學白州謝表幕府贊襄初無善狀公朝慎罰止棄遐荒咎積驚心感深流涕伏念臣受材謭薄逢世艱難痛黠虜之亂華悼先臣之死節頃因人乏出佐戎行雖誼切君親常藴枕戈之憤而敵忘彼巳終懷負職之愆黽勉五年召還萬里既久隳於成績宜薦致於煩言謗欲誰分孽由自作晋師討敗難逃先縠之誅虞典從輕姑示三苖之竄兹蓋伏遇皇帝陛下廣天地涵容之德收雷霆震讋之威謂臣誤國雖多察臣初心可諒肆埀大惠特賜微軀敢不念徃知非雖窮不怨身縻瘴海此生尚覬於生還夢繞沙塲効死寜忘於死所代寳學漳州謝表十罪併聞分己甘於誅殛五年兩謫恩尚許其全生聞命疾趨拊躬流涕伏念臣猥才凡下臨事濶疎誤被選掄浸塵班列昔叅戎幕已無裨贊之勞再奉籓條又乏循良之效志力雖期於自竭功名常嘆於數竒不移匪石之心果獲羸瓶之咎釁愆已積雖擢髮以難陳章疏交彈顧噬臍而何及兹蓋伏遇皇帝陛下堯仁廣覆湯網宏開念臣顛沛於戎行心惟盡瘁謂臣數更於宥典特與從輕臣敢不怵惕以思屛營自守投閒置散已叨善貸之恩補劓息黥庶幾改過之善代寳學謝復宫觀表負罪至深甘從永棄疏恩甚渥許遂生還盡復文階仍叨祠館荷寵光之雜㳫驚涕泗之横流伏念臣頃以𤨏材誤蒙器使雖臨難不求苟免効死捐軀而籌邉非其所長終成誤國孟明之恥未雪樂羊之謗已盈疎遠易離愛憎相半責五載曠瘝之咎固無所逃騰一時萋菲之言亦已大甚衆欲擠之必死臣敢保其餘生禦魑魅於遐荒觸炎㬢而就道危機自踐沒齒何言豈期流落之蹤更沐甄收之惠兹蓋伏遇皇帝陛下仁不忘遠道唯至公善貸且成恩每深於含垢寜僭不濫網或漏於吞舟致此迂愚亦蒙昭洗臣能不佩韋是戒食蘖知艱在畎畆不忘我君願希前哲執干戈以衛社稷圖報他時代張丞相辭免不允謝表渙號已孚愚誠莫達處非其據愧溢於中竊以古稱論相之難朝以得人為重况屬艱危之㑹尤須輔佐之良豈惟料勝以折衝亦在安民而和衆有王導濟時之志能舒朝廷之憂懷謝安鎮物之情坐致淮淝之㨗以今多事特異前聞鏖兵殆困於連年駐蹕靡聞於定所邦之阢隉念底定之猶難狄固貪惏肆慿凌而未已倘失疇庸之任益乖恢復之圖如臣者起自書生謬承天奬㧞賤跡於覊單之日識孤忠於喪亂之秋偶際風雲得階塵露入同宥宻初無借箸之竒出總戎機更昧干城之畧既辜注倚宜速譴尤召還方邇於清光爰立遽膺於異數息黥補劓顧徃咎之何追經體贊元豈薄材之能强恩私甚渥報塞謂何兹蓋伏遇皇帝陛下道廣輿圖仁深覆被謂臣材雖至陋察臣事不辭難敷告外庭誕揚顯册處以鈞衡之地委之調御之宜責任如斯孱微曷副臣敢不益思自勵期稱厥職守一節之精忠造次於是廓九土之氛祲死生以之代翁殿撰遺表傳薪熖息將隨化於大鈞易簀氣微願輸忠於半藁伏念臣受資朴訥奮跡單平風猷輙慕於古人詩禮僅傳其家學初霑世賞方傴僂以循墻繼竊科名遂夤縁而隨牒未更繁冗已玷清華無一介之先容辱前朝之異遇編摩書局黽勉郎曹參陪三老於賢闗領袖羣英於秘府官箴恪守歲籥易流傳癖書癡性雖安其所好客嘲賔戱時或歎其夕淹但直道以事人恥曲學以阿世至乃東州懷紱淮部乘軺敢圖擇地之安惟勵匪躬之節屬中原之雲擾當陛下之龍飛趣歸行所之班俾典奉常之職綿蕞之儀未就蒲柳之質已衰一返家園五更祠館朝有著而廩有給叨冐為多壯也仕而老未休絲毫無補今則已嬰沉痼難羡反生重念臣自㓜讀書即知論古憤張禹臨終之請惟訴私情喜史魚絶命之言猶存忠諫操其悃愊灼見正邪雖真偽或混於平昔之時而隠微必發於死生之際臣今憊矣心切戒之敢伸奄奄之言仰凟高高之聽伏惟皇帝陛下日新聖學躬攬權綱中華之服裂五千天惟授德列聖之基埀一百民實歸仁誠既洞昭禍斯潛弭豈待期期之夕克全復復之功臣即棄明時莫瞻盛舉未草浯溪之頌定愧懷鈆倘平伊洛之戎固欣含受劄子論時事劄子八首代寳學泉州作江北臣竊論今日國家大計莫先戰守二䇿因險為守則守易固因守為戰則戰必克自古倚長江之險者屯兵據要雖在江南而挫敵取勝多在江北故吕蒙築濡須塢而朱威以偏將郤曹仁之全師諸葛脩東興堤丁奉以兵三千破胡遵之七萬轉弱為强形勢然也今日淮甸雖置守師而無堅壁無聚糧或營一師之市或聚烏合之徒敵人一至則冰散瓦解千里蕩然長江之險舟楫之利固已與敵共之虛聲所摇人情騷動此由江北籓衛之不立也臣欲乞將淮甸郡縣不必盡守故城各隨所在擇險據要營置寨栅守以偏將敵來仰攻固非其利若欲長驅深入則我綴其後二三大將浮江上下為之聲援敵之進退墮落吾計中朱威丁奉之勲固可圖也江北籓衛既立陛下移蹕建康觀時待釁以定中原此萬全之䇿也荆襄臣聞善奕棋者不争邉角之隅善立國者必强腹心之勢若今日國家暫保江左形勢之地若緩而甚急者荆襄是已荆襄西通秦蜀東連吳㑹北據漢沔昔人以為用武之地故三國戰争皆出於此得之者强失之者弱自喪亂以來莾為盗區國家多事未遑經理亦幸敵人棄而不顧殆天以資我也今千里空墟固難卒守臣謂宜將荆襄合為一路增重帥權暫治公安益兵聚糧為戰守計分遣别將渡江據險置栅募民耕種積以歲月更為後圖一者貫通秦蜀無斷絶之虞二者控扼上流如首尾相應三者窺闞中原有巻席之勢是一舉而獲三利也今不早圖萬一敵人先之則主客不侔利害易轍復欲争之固已難矣欲望陛下沉機獨斷亟詔大臣講論措置先事慮事以强立國之勢禁衛臣竊惟藝祖削平僭亂聚天下精兵以强京師取太原兵以為龍衛取幽州兵以為神武左右員僚本藩鎮㕔頭也左射拱聖本諸州騎兵也忠節之軍升自川陕虎翼之軍選自江淮凡此之類不可悉與皆總於三衙訓練精閑故能坐制四方如臂運指自南渡以來禁旅凋耗勁兵驍騎分隷諸將沿江戍守蓋救紛解急支吾目前未暇長顧遠慮也昔周瑜拒魏而吳王提重兵以為後援鍾㑹伐蜀而文帝率師十萬屯長安二主豈不知指撓目顧端拱仰成哉蓋尾大不掉末大必折其所防者深也今三衙兵雖稍收集而寡弱未振欲望陛下遠鑒吳魏居重馭輕之術近法藝祖以中制外之權選徒蒐卒益增禁衛仍擇腹心忠亮之臣分為統帥則威聲所憺非獨折衝禦侮亦所以强本固基為社稷久長之計守江臣聞善固圉者不顯為必守之形善勝敵者不示以可乘之利所以消禍亂於未萌沮姦謀於將發也竊讀舊史見六朝之守國也皆輕戍江北重戍江南因險而守因守而戰内强根本外鎮邉陲敵來則出驍將合銳兵先事而逆擊未便則清野鄙據要害伺間而後動故北兵遷延乏絶畏首畏尾徃徃狼狽亡遁大約皆此謀也昔陶侃不城邾其說謂設險禦㓂政以長江隔江而城非三萬人不守引敵致禍實此之由若虜有可乘之㑹又非所資侃非失形勢也緩小利以全大利也蔡謨諌止諸鎮北移其說謂時有否泰道有屈伸須養威待時虜若送死敵之有餘棄江遠進亦吾所短謨非畏怯也知用其所長也何承天論守邉之計謂斥堠之交非耕牧之地曹孫相持江淮之間所居各數百里宜堅壁繕兵以待敵來承天非泥古也事有可法也侃之練事謨之見遠承天之燭機審利害於當時埀龜鑑於後世臣竊見比年以來虜頻盗邉肆兇搶掠淹畱冬春雖王師驅逐屢挫其鋒而兇熖未熄猶輕南向蓋今日形勢事宜畧與古同夫雷動風馳不難於必勝形格勢禁實本於沉機願陛下詔帷幄之臣稽六朝重戍之謀考三千慎守之䇿固本保邉隂消戎詐庶幾不動聲色疆場妥安我既出於上䇿矣彼猶貪冐南來是符堅淮淝之轍復尋宋武燕秦之役可舉也舟船臣竊惟長江之險雖本天設實由人用拒敵之方不特防隄岸塞險隘而已維檣艦據津流則其險十倍飛棹檝冐風濤則其險百倍東南立國戰守之利無出於此伏見廵省以來暫駐吳㑹雖有守江之名而無用險之實舩艦率皆草創水軍不甚練習且海船入江則顛沛不行歩兵乘水則惴慄失措官司奉行措置姑欲畢事而已陳利害者以為常談習游泳者以為末技未思臨機對敵何以取勝故向來邀羯虜於長江攻羣盗於平湖戰多不㨗職此之由竊攷六朝舟楫之制名字雖不同要之大艦利於控扼若五牙艨􅀈之類是也小舟利於走集若金翅油船之類是也大艦有飛樓有拍竿有長櫓屯兵走馬可容西北勁兵以當衝要小舟欲輕快追逐須擇吳越水工輕果善沒者負船鑿艦出入湍流見之若神敵人所以魂驚膽墮也昔李氏水軍敏銳周人莫當孫權浮江萬艘魏人畏遁用我之長乘彼之短此制敵之上䇿也欲望下詔講求舟艦大小之制南北士卒之宜嚴械之用訓練之方專委統帥以備强敵南兵臣伏覩朝廷向來數調諸路禁兵沿邉戍守多即逃亡議者便謂南人脆弱終不堪用臣昨知泉州日嘗呼逃卒審問其由皆言非怯懦畏敵亦非勞苦思歸只縁撥屬諸將南北人情不通非禮役使横加箠辱未嘗預聞金皷之事衆情憤憤遂皆潰散凡推驗十數人供荅畧同因知逃亡非其本心况南人素號剽悍春秋吳越之覇六朝晋宋之㨗不聞資兵於他境取材於異代今猶古也豈獨不可用哉特用之不得其術耳自今諸將之兵雖足戰守無仰於此然國家養兵額衆費大不應艱難之際使無缺食比年以來訓練亦精士氣思奮臣愚欲望調各路禁兵自遠及近更畨出戍别立統帥不隷他營分屯險隘不當虜衝連營締壘張大形勢使之耳聞目覩漸熟征戰秋出春歸不戀鄉土嵗月積久習以為常緩急調發人情不震可以集事吳蜀臣聞擊首則尾應擊尾則首應擊中則首尾俱應此昔人論一陣之勢也臣竊謂一國之勢亦然兩國相持雌雄未决能盡用其力者强不能盡用其力者弱盡其力者其力合也不盡其力者其力分也戰者力常合守者力常分上下一體者力常合遠近異謀者力常分此必然之理也國家自南渡以來保有吳蜀而羯胡侵擾殆無寜歲徃年數窺梁淮故江左稍安比年頻犯江淮故未入蜀境醜虜之衆棄其所長梯巖險冐濤江蹈必死必亡之地而我未能收其功者蓋彼無畏首畏尾之虞而得全用其力也昔三國鼎峙吳蜀為異邦然當時所為謀困曹魏者常萬里尅期表裏相應况今二方一統力不應分竊見金房荆襄境壤相望乃西南之交吳蜀之㑹也若虜廹近江淮陜蜀之兵當稍循金房而南若窺全蜀則江淮之兵當稍循荆襄而北批亢擣虛互為聲援以分虜勢庶幾狂狡之謀不敢輕動動而乘之萬全之舉也募兵臣聞衆不可已楚兵所以威晋多而益辦漢將所以成功竊見金虜叛􅉀數窺淮甸諸將驅攘奮擊雖獲酋渠殱醜類㨗音係道然鏖兵酣戰殺傷殆相當也似聞諸營闕額徃徃逐急招填不暇銓擇多出於傭僱厮役之流未必皆勇悍驍雄之士平時可以充數緩急恐難當敵臣聞自昔戰争之時裒兵益衆固非一途或取之内郡如蕭何發闗中卒以補兵缺漢威復振是也或取之盗賊如諸葛恪取丹陽勁民深加慰撫籍為甲士是也或取之逃亡無賴如馬隆募洛陽勇士無問從來立標簡試自成一軍是也欲乞明詔諸將應兵闕許申陳於諸路選募况荆粤之人尚氣喜鬬困於閭閻不得其欲或多椎埋犯法販私為姦久之探丸弄兵遂為劇盗若加收籍使之勇於公鬬非惟强兵而威敵抑亦弭禍而安民是一舉而獲二利也代張丞相辭免劄子三首一承命兢惶心顧靡措伏念臣頃以罔功自招物議分甘屏棄沒齒無言仰蒙天度包容龍光不替更於流落深軫眷慈而臣循省未幾遽蒙環召琳館旣叨於優逸經筵獲持於穆清懇切未陳心猶有待豈意悞恩遽及擢位宰司自揣庸陋曽無一可灼知輿論孰以為宜伏望陛下察臣誠衷亟行追寢庶幾孤跡終遂保全上不累於眷知下得全於素守二比罄忱誠未蒙開可再念臣勤勤之懇非敢飾辭誠以當軸處中之任實安危治亂之源苟非其人國家何頼今陛下宵衣旰食思濟囏難英俊并驅猶恐不及以臣疲懦雖欲竭慮畢精終恐無益况臣五技之窮見於已試强顏素餐謗議必盈髙位疾顛可不深戒伏望陛下護其所短用其所長勿以反汗為嫌惟以得賢為急許臣且奉殊庭安其愚拙則毫髮之間或得盡其區區三温詔屢頒靡容遜避深惟陛下所以推擇之慎眷倚之深加於㣲臣者可謂至矣且臣非不知寵榮之可慕事功之當勉然而義有未安不能但已蓋與其招尤速累自訟於他時不若守分安愚懇祈於今日在臣之請猶為有辭伏望陛下擴天地之包容埀日月之臨照矜其誠懇曲賜聽從庶俾危蹤得全無過之地臣之萬幸屏山集巻七
