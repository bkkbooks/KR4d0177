body:
  text: 屏山集巻十五宋劉子翬撰詩金陵懷古荒城莽莽蔽荆榛虎踞龍蟠迹已陳赤壁戰爭江照晩青樓歌舞鳥鳴春十年王氣雄圖盡一疊寒笳客恨新折屐風流猶可想只今高卧豈無人㑹兵羽檄西來趣㑹兵秋風胡虜更縱横烽明石嶺塞垣逈馬渡分河波浪生使者漫傳蘇武節君王頻幸亞夫營百年信誓明如日何事紛紛起戰爭别安子允得酒猶堪慰倦遊長亭直為故人留煙塵㡬處兵猶鬬風雨一年春又休尚記虎頭初擲筆終憐猿臂未封侯離歌唱落榆闗月可是君心耐得愁望楚客浦舟凝滯凭髙識楚鄉有愁闗眺覽何地不凄凉草木詞人怨江山覇主亡悠然獨搔首暮靄一星光井泉石井水濺濺寒砂暎碧鮮雨聲添溜急天影入波圓曉汲連山寺春耕潤野田杖藜三嚥罷毛髪更蕭然巖桂凉颸振逺村寂寞度清芬山路不知處月窓時夜聞孤根寒抱石落子半飄雲袖手空延佇無才可賦君園蔬十詠茭白秋風吹折碧削玉如芳根應傍鵞池發中懷灑墨痕芋分得蹲鴟種連根占地腴曉吹黏玉糝深椀啖糢糊韭肉食嘲三九終憐氣韻清一畦春雨足翠髪翦還生瓠溉釜熟輪囷香清味仍美一線解瓊瑶中有佳人齒芥葉實抱芳辛氣烈消煩滯登俎效㣲勞乍食驚頻􅅉菘周郎愛晩菘對客䝉稱賞今晨喜薦新小嚼氷霜響波薐金鏃因形製臨畦發永嘆時危思擷佩楚客莫紉蘭子薑新芽肌理膩暎日凈如空恰似勻粧指柔尖帶淺紅蘿蔔密壤深根蔕風霜已飽經如何純白質近蔕染㣲青苦益雖無適口味暖益功稀比菜苦不登盤言忠多逆耳次韻盧贊元喜雪六花初逐曉風繁五袴那憂歳晩寒杖屨客迷村徑逺笙歌人在小樓看也知近郭梅先動只恐行春路未乾授簡梁園休惜醉銀臺列燭妓圍寛府㑹次士特韻夜宴芙蓉苑華榱燭影光使君頻㑹客侍女慣新籹劇飲不勝醉論詩非所長倚欄霄漢近宫殿鬱相望士特贈别次韻客舎愁分袂梅花小雪前夜看牛渚月春别剡溪船麗句光行色悲歌慘别筵後期相約處雙闕五雲天訪士特舉和六四叔詩因次韻聞道歸舟泊淺沙藍輿出郭日初斜新傳賦詠來梁苑舊識芝蘭向謝家遣興只慿樽有酒感時愁見樹飛花相逢未欵還相别囘首長亭鬂欲華分韻賦古松得青字風韻颼飀逺更清蒼髯瘦甲聳亭亭連根欲鬬巖巒力一蓋常涵雨露青曾暎月明留鶴宿近經雷霹帶龍腥衰殘愧我無仙骨願採流膏慰暮齡六言二首鼎食鼎烹謀拙山南山北興長片夢彭殤夀夭一枰楚漢興亡黄巻篋中昆友白醪杯裡聖賢我願長閑足矣人憐獨處蕭然池蓮四詠分韻葉郁烈香浮雨團圞緑䕃波近堤千葉亂知有畵船過花孤紅低暎岸併艷逺連汀露浥層層展風披葉葉零藕密藴羅文細明含玉色清氷盤時薦美刀惹㫁絲輕子分房圓戢戢弄色翠娟娟摘實憐空菂方知雨露偏雨歇雨歇長虹淡欲收疎疎寒靄暮依樓西風滿院催搖落已覺梧桐不耐秋新灣苒苒寒生水面煙吳歌唱罷月㣲偏停橈又向灣前宿一夜西風浪打船汴堤參差歌吹動離舟宫女張㠶信浪流轉盡桞堤三百曲夜橋燈火看揚州天逈天逈孤㠶隠約歸茫茫殘照欲沉西寒鴉散亂知多少飛向江頭一樹棲葉集之舉士特唱和因次韻漂泊分攜後囏難㑹面時夜燈初獻酒春草舊題詩遊宦君雖厭才名衆所期不應如倦翼寂寞戀南枝銅爵金碧銷磨瓦面星亂山依舊遶宫城路人休唱髙臺曲臺上而今春草生中渡渡南渡北是長亭沙上行人立馬情囘首若無煙樹隔只應猶望見髙城江上江上潮來浪薄天隔江寒樹晩生烟北風三日無人渡寂寞沙頭一簇船送曾彦思減罷赴闕馬首成南渡西風木葉疎去程烟雨外孤館别離初未試平戎䇿空懷逐客書漢皇方問賦誰復薦相如過楚懷王廟割據銷殘運并呑息戰塵遺民猶憫楚三户欲亡秦念昔懷王立潛圖霸業新降顔欣接士薄伐屢窺隣慷慨心何壯囏難勢未伸干戈憐暴骨玉帛更和親末路人多詐輕謀禍及身單車行凛慄伏甲變逡廵鹿走章臺下龍沉渭水濵素棺歸慘淡故老恨酸辛歳月今何在興亡跡已陳愁隂生古廟翠蔓鎖重闉有客投清酹臨江憶放臣聴䜛雖主惑多難亦時屯憤氣摩星斗哀詞動鬼神飄零瓊玉佩寂寞蕙蘭春毁譽千年定窮通一死均招魂嗟已矣抱石想漂淪戀戀空囘首行行欲問津潸然憂國泪今古獨醒人雙廟無復連雲戰皷悲英風凛凛在雙祠氣呑驕虜方張日恨滿孤城欲破時幽鳥自啼簷際樹夕陽空照路傍碑平生不作脂韋意倚棹哀吟兩鬂絲一樹一樹梅開早清香襲客衣夕陽簫皷散半是折殘枝偶歩偶歩忘歸逺心閒逸興增山深知有寺路盡不逢僧離居馬嘶何隴暮有意念離居去路經秋雨行裝一擔書窮知身計拙病覺世縁疎曉枕殘歸夢飜然憶舊廬有感抱石親征澤潞時艱難猶想舊開基官軍不守河陽渡囘首橋山淚欲埀程嬰墓停車莽蒼認孤墳烈烈英標尚想存已脱遺孤安趙氏更輕一死報公孫荒林雀噪風常急古道人稀日自昏惆悵九原如可作欲憑楚些為招魂晩宿石瀨分流小霜林間樹紅暮橋横隠約寒鍛響丁東畵船隠約菱歌斷斜陽水面移美人貪照影不覺畵船欹宫亭湖近湖黯黯氣常寒指㸃宫亭渺莽間素色夜浮全楚月緑光春浸十洲山醉思天末騎鯨去老怯風頭聴鴈還柔櫓聲中知禹烈愧無椽筆畵孱顔安仁道中汩汩復汩汩著鞭鷄一號老身縁底急長路只徒勞石亂春溪惡山深曉月髙村沽得㣲醉猶足張餘豪酴醿顛風急雨退花晨翠葉銀苞照眼新髙架攀縁雖得地長條盤屈總由人横釵素朶開猶小撲酒餘香韻絶倫唯有金沙顔色好年年相伴殿殘春夜坐客裡驚秋晩慵眠但曲肱夜闌深院雨人過隔􅉹燈逺思千端惡寒威一倍增夢孤渾易破哀柝故登登靖康改元四十韻肉食開邊釁天驕負漢恩隂謀招叛將喋血犯中原飲馬江河竭鳴笳宇宙喧氛埃纒帝座猰㺄吠宫垣皷銳梯飛壁彎強矢及門黔黎驚瓦解冠葢盡星奔走轍秦城地浮航楚峽村畵堂空鎖鑰樂府散嬋媛夜詔聞傳璽春王記改元三辰光盡匿四海浪横飜伏閣惟羣彦興邦在一言雉城期必守虎旅更増屯龍困雖憂蟻牛羸尚覆豚謀成擒頡利義可絶烏孫堅壁師彌老窮兵火自燔鈎魚猶假息幕燕暫游魂懇欵情先露誅鉏黨實繁横磨非嗜殺下䇿且和番割地煩専使要盟脇至尊賜弓埀拱殿畱宴玉津園囘騎桑乾北游軍廣武源驅馳無立草剖斵露空墳太子悲秦粟明妃泣漢軒敵情終未測隣好久宜敦晉趙封疆逺金湯阻固存短衣求李廣長嘯得劉琨御極朝儀盛臚傳詔語温神霄分别仗法駕引雙轅内栁東風軟宫花麗日暄閭閻多喜氣簫鼔送芳樽運契天同力時危禍有根覆車宜自戒曲突更深論落拓江南士飄零塞北籓蚤嘗專翰墨晩厭屬櫜鞬拔劍還摩壘懷書擬叩閽蹉跎謀不遂感激氣潛呑野逈寒烽照樓髙暮雨昏望鄉心恍惘憂國涕潺湲仄席勤諮訪埀紳樂引援鵷鸞方競集短翼待騰騫春雨暝色春朝雨滋榮喜及時雲昏遙莫辨地渴久方知栁岸逰車歇濤江釣舸移拒寒須把酒病骨况支離瀑布路窮巖瀑挂爽氣凈塵紛溜險時依壁源髙半隔雲入池驚練盡觸石聴雷分接勝多幽侣笻聲破蘚紋海棠花幽姿淑態弄春晴梅借風流桞借輕初種直教圍野水半開長是近清明㡬經夜雨香猶在染盡胭脂畵不成詩老無心為題拂至今惆悵似含情䇿杖策杖農家去蕭條絶四隣空田依壠峻斷藳布巢勻地薄惟供稅年豐尚苦貧平生飽官粟愧爾力耕人送杜季習四首結廬空谷抱沉憂底事軒車肯為留千里問塗良獨苦似君須向古人求聞道華亭已解圍親朋消息未全知君歸為遣書來報細說從初喪亂時寂寂家園草覆堦亂兵飛箭入樓臺丁寧莫斫湖邊栁盡是劉郎手自栽搖落難堪更語離曉風吹月上征衣送君直到長亭去隻影愁尋舊路歸劉處士墳山禮亭風馬雲車悵莫尋祠亭空鎖古原隂豆觴三獻禮經事霜露四時人子心世盡浮雲同渺渺名髙拱木共森森平生積善身徒老賴有家兒敵萬金喜誅大將自提烏合衆南北久跳梁避事㡬危國專權擬僭王然臍誅未快擢髪罪難詳膏血汙砧斧何曾灑戰塲疊嶂益遣歸心快愁霖喜乍晴樹隂迎馬合波影照人清不見雲山路時聞樵斧聲暮雲偏有意相伴隔溪行梅花玉骨綃裳韻太孤天教飛雪伴清癯林寒疎蘂半開落野逈暗香疑有無庾嶺風光仍似舊漢宫鉛粉莫相汙驚心不必臨空樹一白流空春便徂和李巽伯浦樹㝠茫裏雲山淺淡中客愁生逺望春意入晴空酒憶相如病途憐阮籍窮慇懃桃葉句欲和愧難工野歩野歩忘歸逺春心不自休管絃非老伴風雨定花讎栁暗深深路溪寒小小樓謝娘歌白紵此意可忘憂李伯時畵十古圖鄭尚明作詩詩詞多振絶因為同賦王猛捫蝨劇談世事灞河濵竒骨瓌姿兩絶倫却訝秦無豪傑至坐中捫蝨定何人髙陽長揖胡牀二女執巾裾長揖高陽舊酒徒不是蒼皇能輟洗溺冠何異昔坑儒霍光取璽此郎守節固堪論漢璽飄飄亦僅存周勃取將迎代邸霍光持去授皇孫馮媛當熊婕妤下輦辭榮日馮媛當熊效死時帶礪稱忠惟一傳宫闈著節有雙姬李宻迓太宗海内羣雄逐鹿時虬髯一見識英姿牖窺已嘆尚書婦野拜仍驚柱國兒明妃出塞羞貌丹青鬬麗顔為君一笑靜天山西京自有麒麟閣畵向功臣衛霍間張釋之諫文帝擾擾椎埋徧九原因山獨有覇陵存孝文儉徳雖天縱亦賴忠臣效一言醉山簡倒載山公豈酒狂羣兒拍手峴山旁汗青等是虚填耳不把雲臺喚酒鄉武帝問日磾漢朝人物盡英竒武帝招延盛一時拒諫不能容汲直託孤何至問胡兒明皇覽鏡妃子翦鬟不復青銅照瘁顔耄荒從諫若移山只將女子論賢否陶母當時亦翦鬟送原仲之荆南風急塵埃滿漢闗送君行處路漫漫不知爭戰㡬時定常恐别離相見難三徑舊逰松竹老五湖新隠水雲寛交朋日覺知音少緑綺從今莫浪彈和士特南浦詩羽檄分兵控上流時傳烽火過隣州樓船半渡旌旗曉胡馬欲來江漢秋淝水投鞭真浪語幄中借箸有竒謀吾儒雅有康時意不把詩輕萬户侯屏山集巻十五
