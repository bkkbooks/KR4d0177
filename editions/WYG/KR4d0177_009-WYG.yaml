body:
  text: 屏山集巻九宋劉子翬撰祭文祭翁殿撰文堂堂老成國之龜玉進則光朝退斯美俗天其靳耶奪之何速嗚呼哀哉維公之質嶽重海滙學窮古書道通聖門本朝取士科張甲乙偉人巨公皆此途出公亦欣然飛聲騰實賢俊之關圖書之囿孰游其間惟徳之懋公亦欣然来為領袖懐紱承流乘軺光逺時以外移為仕之蹇公亦欣然屢膺臨遣愠色三已榮輕九遷浮雲巻舒何往不安公亦欣然老於祠官惟公行藏曰有義命物智時機無心而應蘂笈探𤣥麟經纂聖得意忘年怡然處順惟我小子與公同鄉交舊年契奕葉有光晩獲從公素心始償見必我留宴笑坐旁公雖病矣神氣内强袖手不言色惠滿堂大化宻移逺遊不復壽格睟容悶於一木楚些徒招秦詩莫贖設醴陳殽文以相之誠可達幽公其亮之祭翁郎中文嗚呼文人才士天所惜耶幸而有之何多厄耶將理有乘除而物無兼得耶抑人定者勝天而造物不能與之争力耶嗚呼孰謂我邦遐荒陋僻人物之竒而有士特自謂兒時已驚超逸士友咸曰是必將耀乳虎之䦨班奮雛鸞之羽翼也游宦平生聲華籍籍倚堅而摧履坦而踣所圖則多十不酬一士友為之說曰大器晩成彼銳進速騰固旋敗而亟失也濬海崇山筆無勍敵才者疾其勝已不才者疾其輕已白首窮年流離竄斥嗚呼今者死矣曩說不讎皆拂膺而為之太息也然而士特之文角立傑出羅萬象乎筆端煥丹青乎胸臆他人缶鳴我則雷驚他人杓盈我則川溢生乎以此潤身死乎以此埀名造物之遺士特者厚矣彼窮達信黄粱之夢壽天同白駒之隙也失之錙銖者泯泯如彼得之丘山者永永如此較輕重於斯言則九原可以自慰士友可以亡戚也墓銘致仕祝君墓誌銘紹興三年三月六日致仕祝君卒五月六日𦵏金相山之原其孤可久来請銘祝君余之父友也其孤又余姊壻也来請銘以舊姻之故也而不辭所以終我祖我父之惠好也正議公曩遊學時忠顯公侍君之諸父深相交結傾盖遺縞不足諭也正議曰他日無忘祝氏忠顯公既達結昬貤爵光其子孫君亦以此通班朝著示不忘也今君之死余又銘之以申前志以敦外姻以昭潜徳以慰孝思也有是四者斯可為銘君諱祐字彦將信州鉛山縣紫溪人也曾祖虞祖仁覇父世昌君少時刻勵思自奮致而宦學齟齬皆不得其志焉初任吉水縣嵗饑多盜捕獲填圄吏白君曰正盜之罪法應受賞君曰道殣相望官弗加恤又忍峻刑而資吾進身耶盡釋之白郡守賑給之境内多全活後任福州福清縣主簿監建州寳瑞場當路者薦其堪事君曰僕僕不已又將何求遂挂冠而歸自是脫畧世紛寓意於酒朝醺暮酣不見醒客時與賔友獻酬盡歡或悠然獨酌賦詩長嘯所居有林泉之勝君躡履曳杖倘佯雲間人識之曰此醉仙也君在燕間寵光時至可久立功西域乞回賞以授君牙緋朝廷許之青紫侁侁環戯膝下鄉黨以為榮觀君寛仁樂施湍川為梁如已思濟病者與藥如已獲瘳晩嵗絶粒益幸酒美疢遂臻臨絶之際所以訓勵其子孫者皆厚徳之言也悲夫君享年六十有六娶周氏生子二曰可久武功大夫貴州刺史主管潭州南嶽廟曰可大承信郎二女長適進士黄敷次適余翬孫男三人孫二人彭年松年皆將仕郎皆尚㓜銘曰是非喧喧以醉為籓名奔利馳以醉為歸蹈世紛而不染葆天光而自熙所謂徳全於酒者惟君為庶幾積厚不施嗚呼噫嘻墓表處士劉公墓表劉公居建之潭溪九世餘二百年矣其初京兆萬年縣人唐僖宗時有為將軍者嵗久名逸五季亂子諱庸者南逰獵較於此愛其形勝因家焉今推為始祖以其近而可攷也皇考忠顯公曩使關中嘗訪京兆劉氏僅有存者某雜著譜牒諸書劉氏陶唐系也自元王交封楚居彭城支𣲖最衍今九大族并出元王之後唐史譏言劉悉出彭城非也京兆劉氏廼九族之一周有石州刺史懿隋有上柱國韶唐史有民部尚書文静自文静子樹義而下未詳其繼惟我始祖之居潭溪也蕩拓焚拂以啟山林二世而廬室完三世而田疇闢庸生光位光位生玉玉生文廣文廣生朝議公太素於是崇禮文篤經術謹逰從厚風化是載是循久而弗怠識者知其後之必大也公諱民覺字莘材朝議次子也恪紹前脩濃薰泛挹早自知名正奉遊學時普寧暨夫人老矣公常留侍以故不遑科舉之事夫人年九十六而卒公始終孝養敬不弛顔既𦵏結茅罄哀鄉評尚之耋老聚而請曰非公孰為吾黨指南公據師席二十餘年毓英導秀多所成就忠顯之守㑹稽長樂也甞迎公就養二郡江山大有佳處公從羽流衲子逍遥物外時忠顯公欲請於朝官之公曰衰朽那復有此意若欲亢宗則夫二子在盖其恬曠自適世網莫之能攖也公為人淳樸謙厚温温然常以和畀人人皆樂親之内藴雖深若不叩擊似不能言者紹興改元寇作里中騷動公時已卧疾扶輿適上饒慈氏寺以其年十一月十五日卒享年八十四公娶吴氏司業著之妹也一女適進士吴敏脩孫男子翇子􅀢子翌以紹興三年八月乙巳歸𦵏於壽口之原吴氏後公十二年卒享年八十一又三年乙丑十一月乙酉合𦵏焉壽口潭溪皆在崇安縣開耀鄉云畢事叔父命某為文表墓姑紀其實以曉方来非敢私親而侈也辭曰谷變陵遷山摧石泐死而不朽兮潭溪老人居此室處士祝君墓表惟我皇祖宣奉公以道術為東南儒宗著錄之士悉皆名流君嘗受業焉盖挹學海之波瀾潤詞林之枝葉者也時皇考忠顯公在膝下與同研席者甚衆雅竒君因定交焉君業成遊上久之㑹親疾慨然嘆曰竭力為養是亦孝也何必三釡耶拂衣而歸自是克勤幹蠱祈寒燠暑無巨細必親人以為難君安而行之君天資孝友遇人以誠内和而外剛士無賢否皆樂親之而有所憚或有缺行惟恐聞於君君聞而愧切之必改也君隠耕餘數十稔攻苦食淡家貲遂豐然於貧窶時亦賙貸有足大者至於拓險徑造飛梁稍便於人傾橐不吝晩嵗即逰岸鄉造别宇幅巾杖藜將終世焉俄以疾終時建炎三年八月五日也君生喜學已雖不達訓子弟益勤厚禮館置名儒故祝氏為學者皆有師承而子卣稱最卣屢擢薦翺翔國學識者謂將大君門必自卣而君猶不亡也君諱奕字彦思姓祝氏信州鉛山人曾大父虞大父仁覇父世昌初娶余氏終娶周氏四子曰中正曰天與皆早亡曰卣曰鹵一女適進士傅衮孫男女八人君享年六十有七三年十月二十二日𦵏於邑之芭蕉塢卣来請文某視君為丈人行雖逰宦契濶猶及識君也然安能窺君之所存哉以宣奉公道術之奥忠顯公名徳之重而君從之逰且欵宻焉是必有大過人者因攷君行實涕泣而表於其墓曰嗚呼君之賢可稱也哉又可悲也猶幸其有以少慰也君之平生顯然可知者固可書也書之人故信之其賢已可稱而未盡也以君之才未盡見於設施驟而書之無所攷焉人誰信之懼人之不信而不書則君之所藴終無得而聞焉此又可悲也古之士抱才埋沒而後世知其賢者是或論其師友或觀其所以許與者或跡其為之傳記者因得以信之也後之覽斯文者由是而求君之所藴焉則其賢可盡知猶足少慰也嗚呼君之賢可稱也哉又可悲也猶幸其有以少慰也夫熊氏令人陸氏孺人墓表建炎己酉嵗余兄侍郎從戎川陜時余嫂熊氏已嬰病明年冬十一月十一日卒侍郎書来曰聞汝嫂訃彌劇傷悼曩常憂其疾也屬吾在行不得視其棺殮故以是為恨也吾歸而𦵏之慰夫亡者又明年春三月二十七日余室陸氏病卒侍郎書来曰國事未濟懐恩則虧義棄成則失武一集吾私二疵深矣何以歸乎時方艱虞塗殯非䇿汝嫂汝婦可共塋窀穸相地惟吉涓日惟良送終之禮惟盡則猶吾歸也於是𦵏於建州拱辰山開善寺之東原熊氏建州建陽人故朝奉郎安行之女也慈懿知書年二十為侍郎之配生二男五女長男珙承務郎女恩娘尚㓜餘皆早亡封令人享年三十六以紹興二年十月十七日葬陸氏家越州左丞佃之孫奉直大夫寘之女謙淑能琴年十八歸余生一女失之享年二十四先熊氏六十二日而葬畢事復於侍郎兄仍刻文以表之辭曰熊氏居左陸氏居右異穴同邱辭詔厥後屏山集巻九
