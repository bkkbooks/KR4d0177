body:
  text: 屏山集巻三宋劉子翬撰論漢書雜論上陳萬年性諂臨死召其子咸告教至夜半咸睡頭觸屏風萬年大怒咸曰具曉所言大意教咸諂也初丙吉病時萬年與二千石同問疾衆退萬年獨留昬夜乃歸吉病甚宣帝臨問大臣行能吉薦萬年遂為御史大夫嗚呼以吉之賢猶樂佞人信乎逺佞人之難也萬年以此致身雖死猶不知愧又欲世濟其術悲夫王商長八尺餘容貌絕人為丞相單于来朝拜謁商仰視商貌大畏之遷延却退成帝歎曰真漢相矣王商聞望見重一時單于豈能知哉特畏其貌耳成帝相商已久聞單于之言始以為真漢相則帝初不知商之所以可用也單于之言果足為重則堂堂之夫皆真相也耶史稱王商有剛毅節初商有女太后欲以備後宫商意難之竟辭以疾及商為王鳯所中事下司𨽻商惶怖更欲内女為援廼因李媫妤白見其女故張圭以此撃之甚力廷臣史丹等皆排根之商免相三日嘔血而死然則商所謂信道不篤既得之患失之者也孔子曰棖也慾焉得剛商豈剛者乎馮野王不為三公名重當世倪寛為御史大夫官屬易之以此知士之立朝可不思有以重耶要官顯爵居賢則重居不肖則輕人主以是柄而御天下可不慎其選耶元帝詔曰剛強堅固確然亡欲馮野王是也野王以女弟為昭儀不得為御史嘆曰人皆以女寵貴我兄弟獨以賤野王之行能髙矣觀此言未可謂確然亡欲者也孟子曰養心莫善於寡欲易曰君子以懲忿窒慾非近乎道者不足語此趙廣漢為京兆告丞相魏相韓延夀為左馮翊劾御史蕭望之皆坐誅故班固謂訐上不信以失身墮功廣漢􅋵術始終如此其死宜也延夀平生謙遜和易所在有稱一發不中遂䧟大戮豈其平日所為出於矯揉耶抑不忍一朝之忿遂掩其終身之美耶是以君子慎其㣲也史稱髙祖定天下異姓王者八國皆徼一時之權變以詐力成功終於滅亡惟呉芮之起不失正道故能傳號五世余謂髙祖之定天下多用良平竒謀秘䇿亦未免乎權變詐力也賈誼謂大扺強者先反長沙廼在二萬五千户爾功少而最完勢䟽而最忠非特性異人也亦形勢然也斯言當矣蕭何起刀筆吏助成漢業髙祖謂之三傑然何非子房韓信之流也何與髙祖㣲時親昵故特重之髙祖即位首封何功臣怫然雖髙祖推重勤勤如此而人心卒不服也鎮國家撫百姓何實有焉若曰發縱指示其功大也斯言過矣何謂天下方未定可因以就宫室非令壯麗無以示威且亡令後世有以過也觀此言何真刀筆吏哉或謂何能識韓信固非碌碌然信之英特亦易識耳漂母識之於饑困之時滕公識之於刀鋸之下惟何之言能必行於髙祖此所以獨受知人之名也武帝勤兵四夷禍流中外而卒得無他者頼前有文景累培基址後有昭宣撫養瘡痍耳不然天下土崩久矣李廣之騎射程不識之軍律可謂精矣霍去病無所稱焉所長者武帝使之學孫呉去病曰顧方畧如何耳不至學古兵法又曰匈奴未滅何以家為其氣識已度越諸将矣宋義提兵救趙至安陽不進曰秦勝則兵罷我承其敝不勝則我引兵而西必舉秦矣此萬全之䇿也項羽殺義奪其兵破秦義乃沒沒無聞誠不幸也羽雖勝秦然其計猶出義下羽知秦兵銳甚戰難必勝故渡河沈舟破釡甑燒廬舍以必死期一勝豈不殆哉羽雖一勝而秦兵尚衆㑹章邯與趙髙有隙遣人約和羽乗其狐疑又破之竟以糧少與之約和及坑秦軍猶二十餘萬人夫邯軍亦精銳羽之所将非其敵也以羽必死之戰乗章邯狐疑之隙僅能服之其難也如此非萬全之策也初秦兵破周章田儋等項梁乗其敝破之梁輕秦有驕色故義知其必敗也義又欲承其敝故以趙闘秦范增之謀深矣不以義為非者勢當然也秦不救韓魏周亞夫以梁委呉蓋用卞荘子刺虎之說也噫羽既據功名之㑹故義乃沒沒無聞誠不幸也亞父日說項羽曰沛公貪財好色今入闗無所取此其志不小吾使人望之氣皆為龍成五色此天子氣急撃之勿失羽竟不殺沛公亞父曰吾屬今為虜矣亞父之知明矣而不知天命也君擇臣臣亦擇君亞父與羽比肩事懐王無君臣之分也言既不從何不引去知沛公之人事天時如此而忿然欲以區區之力勝之不亦難乎武帝遣李陵屬貳師軍陵願得自當一隊帝遣路博徳迎李陵博徳亦羞為陵後距奏願留易曰長子帥師弟子輿尸凶此武帝之所以覆軍蹶将也周亞夫強直自信當文帝而顯名遇景帝而殺身非有幸有不幸其撡術然也方匈奴宼邊文帝遣亞夫屯細桞細桞在長安西當時非臨敵之地文帝以萬乗臨之先過棘門覇上則軍中豈不預知哉萬弩持滿向帝先驅帝至又不得入既入又禁馳驅此亞夫欲以軍威示文帝爾如穰苴之斬荘賈孫武之斬呉姬有意為之也文帝因此重之亞夫之名遂顯後屢諫景帝帝怒下吏又不對竟殺之夫行已恭事上敬此大臣之節也亞夫不知遵此姑以強直自信不移文帝寛仁故推成其美景帝忌刻故陷於戮辱然則景帝之殺亞夫雖曰濫刑固有以招之矣蕭望之不屈霍光而甘於抱闗孫寳不屈張忠而安於主簿後卒為名臣士之行已必正其始易曰進以正可以正邦也彼􅏥進之士茍得一時雖欲自反人弗信焉可不慎與公孫宏與轅固同徴宏側目事固固曰公孫子務正學以言無曲學以阿世士之立朝由其素養洪之阿諛雖未委質固已知之矣易曰素履坦坦嚴彭祖不事權貴或說曰天時不勝人事經誼雖髙不至宰相願少自勉強彭祖曰凡通經術當修行先王之道何可委曲從俗茍求富貴乎噫漢儒雖盛若彭祖者可謂有守之士矣彼夏侯勝謂明經取青紫劉歆謂學易干利禄其言鄙矣孔子曰古之學者為己今之學者為人况爵禄乎武帝問申公以治亂之事對曰為治者不在多言顧力行何如耳令霍去病學孫呉對曰不至學古兵法顧方畧何如耳二子所言者殊途所㑹者一理可謂知為治論兵之要矣武帝能用去病故兵威逺震不能聽申公故治道無聞惜哉孔甲為陳渉博士卒與俱死史稱渉起匹夫不滿歳而滅亡其事至㣲然而搢紳先生負禮器往委質為臣者何也以秦禁其業積怨而發憤於陳王也劉子曰孔甲誠怨秦而思發憤者然使甲知渉不滿嵗而亡甲必不輕與之也委質為臣與之俱死在搢紳先生豈細事哉蓋甲之知不明不知勝之不足與也勝初入陳便立王號其志不廣矣張耳陳餘皆諫止之不從則引其權以去知勝之不足與也又務夸殿屋帷帳之盛彼傭畊者見之猶譏誚之甲曾不如傭畊者乎若知其必亡徒以怨秦與之俱死此特匹夫之發憤耳成帝惑於昭儀自殺絶其嗣子哀帝惑於董賢而欲遜以大位人君一有所惑舉其甚重而不顧焉亦可謂昬愚矣中謁者丞陳臨殺司𨽻校尉轅豐於殿中以此知成帝之時紀綱不肅甚矣殺人不忌曰賊况近在宫掖間耶國柄移於王氏不足怪也陳湯誅郅支單于元帝告祠郊廟赦天下羣臣上夀置酒以其圖書示後宫貴人昔楚子以宋馘示文羗君子曰戎事不邇女器譏之也元帝以獲郅支圖上祠郊廟下以為婦人之悅失禮甚矣其事雖㣲史臣詳著之元帝時御史闕在位多舉馮野王行能第一帝以馮媛之故不用曰吾用野王為三公後世必謂我私後宫親屬以野王為比余嘗偉之後讀石顯傳乃昭儀兄馮逡嘗言專權得罪後朝臣薦野王帝以問顯顯曰野王親昭儀兄後世必以陛下私後宫親帝曰善吾不見是以此見元帝不能為此乃石顯之謀也舉用三公不信廷臣而折中於宦者元帝陋矣又見小人之譛君子亦各有道也可不戒哉平帝紀王莾奏事史官只書安漢公蓋是時平帝之權已移於莾矣史臣非獨不敢書亦以見莾已有無君之心也文帝身衣弋綈慎夫人衣不曵地惜百金不作露臺治覇陵以瓦器可謂儉徳之至矣然寵幸鄧通賜賞通鉅萬以十數賜銅山得鑄錢鄧氏錢布天下何耶盖心有所嬖惑不能自勝也然文帝躬行儉約實恵及人小疵不足掩大美故卒為漢世之賢主也其視唐虞三代之君則有間矣袁盎馮唐張釋之數諫止文帝帝或大怒或怒起入禁中若不能堪也然卒聽數子之言者以能勝其私也成帝委政王鳯王章諫其專權帝初納之後不忍廢鳯卒殺章哀帝欲封董賢王嘉亦數諫帝初憚嘉卒封董賢遂殺嘉二君初非不知其言是也卒殺之者不勝其私也勝己之私之謂克人君能自克如文帝而以成哀為戒豈不賢哉鄭當時雖推轂士類然極無操守卜式雖朴直然所行多詐非汲黯之流匹也太史公作汲鄭傳班固則又以黯式同科是生不見知於武帝死不見知於遷固也周勃入北軍令曰為吕氏右袒為劉氏左袒或曰使衆皆右袒勃當何如哉是未察其情也方漢臣謀諸吕時禄主北軍勃欲入北軍不得乃令紀通持節矯納勃北軍復令說禄曰急歸将印辭去不然禍且起禄遂觧印以兵授勃當是時軍衆豈不知勃為劉氏而來哉勃已執兵柄下令以激衆心故云耳豈有奪吕禄之兵而復為吕氏哉髙祖曰安劉氏者必勃也其有以知之矣髙祖與項羽戰幾不免者數矣彭城之敗楚圍三匝大風晝晦與數騎遁廣武之伏弩丁布之追騎當是時也雖有三傑智無所用力不得施卒得無他者天相之也故髙祖曰吾以布衣提三尺取天下此非天命乎韓信亦曰陛下天授非人力也漢楚争天下髙祖非獨得諸侯也北貉燕人來致梟騎助漢項王非獨失諸侯也鴻門舞劍項伯自蔽沛公此所謂多助之至天下順之寡助之至親戚叛之也酈食其謀撓楚權欲立六國後張良難之及追羽至陽夏南良復請彭越王魏韓信王齊使各自為戰則楚易散何也葢是時楚兵埀敗借魏齊一戰之力以滅之因時應變此善用兵者也武帝好大喜夸故一時羣臣皆務為髙言濶論以中人主意希求寵禄甚若可笑公孫宏曰周公朞年而化臣竊遲之王恢曰匈奴侵盗不已者以不恐之故耳東方朔自謂天子大臣吾邱夀王自謂海内寡二司馬相如奏大人賦春卿謂神仙可見延年欲囘崑崙河以限虜其言不經受之欣然乃知孝宣總核名實漢家所以中興也元帝為太子時諫宣帝宜用儒生帝曰亂我家者必太子也及元帝即位貢薜韋匡迭為宰相而孝宣之業衰焉然則是儒生果不可用耶劉子謂不然宣帝不用者腐儒耳所謂儒者不獨明訓詁通章句而已必練逹世務器識兼全可也宣帝㧞為輔相者魏相張安世黄覇于定國蕭望之之流是也相明易經有師法安世識亡書三篋黄覇繫獄就夏侯勝受尚書曰朝聞道夕死可矣定國迎師學春秋自執經北面備弟子禮蕭望之好學治齊詩是皆通經術者也處事知宜立朝有守所謂通儒也梁邱賀夏侯勝韋𤣥成嚴彭祖尹更始劉向王襃或以儒術進或以文章顯宣帝與之議論於石渠或於燕游播為歌頌第其髙下則宣帝豈不好儒哉元帝任韋匡等為相齪齪鹿鹿親附閹尹不敢失其意故史臣曰服儒衣冠傳先王語其藴籍可也然皆持禄保位被阿諛之譏則元帝所用其腐儒也耶屏山集巻三
