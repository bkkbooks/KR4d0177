body:
  text: 屏山集巻五宋劉子翬撰記友石臺記友石臺肇慶呉公南園勝處也臺因墩形不事培剗傍有大柿樹如側蓋然風藤月篠從而附益之清䕃周覆可容六七客肇慶輦羣石置其上所以悦觀瞻而供遊憩也石出吾里無嵌空竒怪之姿特以其介然若英毅之氣鍾結而成者皆取以自近焉倚立參錯如拱如伏遊其間者莫不神竦意動吾知肇慶之不茍為此戯也徐而物色之老而耄耋有若純臣者示人以忠不玉其佩有若祈子者示人以孝容儀偉麗有若奮威者示人以勤詞氣剴切有若徂徠者示人以直有數馬以對若御史之謹者有穴城而戰若統軍之雄者異派同宗􅀈􅀈凛凛是以肇慶之所取亦吾平昔之所樂親也附狷介而沉者次之為勢力所驅者次之能言以怪除三品以冐除隕星以妖除化婦以執除一有是玷雖瑰瑋亦棄是以知肇慶之所擯亦吾平昔之所欲疎也夫以咫尺之地數拳之石寓意深逺若此則周旋於斯孰不砥礪茍逐物從好以兹為小而陋也則雖擴六合為基立五嶽為塊鄧林蔽其左江漢流其右自逹而觀之亦掌中之一物耳曾何足大焉唯随見而足怡然理㑹則又何大小之别主人方刈桞源之稻釀明月之泉數招客徜徉於臺上倘以此說為是與則倚而歌據而瞑皆吾之三益也因以文記䝉齋記暇日與二三子為䝉齋遊有客仰而言曰名齋之義其㫖矣哉泉涔乎山虚静而冽導之至易也人亦然童心瑩如雜慮無寄發其䝉者非有所畀付増益之也勿振其翾勿鼓其蕩順之於正而已余聞之悚然念聞道最晩童之淳一既已澆耗童之愚昧固自宛然以因循易輟之功制扞格難勝之質凛凛乎其難也有客曰不然此精義也小子何足以知之學者惟見善明為可一燎懸室積暗頓除况吾崇智皎如日月之光何遇而不披剝耶此撃蒙之要訣也䝉自我䝉有之則固見自我見廓之則神豈外也耶余聞之則大喜過望因念人之真性非不了了七情環起而攻之則紛華利欲物物得而䝉之顧又不至是卓然自立於羣趨之表而以學問自娯茍無見焉則竒邪浮末術術得而䝉之三代而下易學廢矣六國之士為談說所䝉兩漢之士為章句所䝉晉魏之士為虚無所䝉隋唐之士為辭藻所䝉皆處偏滯而不反如波滚沙反以自渾如谷騰霧反以自暝初不知其豁然者常存也今吾與二三子既知之矣可不兢兢肅肅以養其聖耶雖然吾初讀易而有得於復也以名吾東齋今又以䝉名吾西齋而吾玩易未既也嗣而有得又将志之况吾家山􅆼窕深䆳登臨徙倚寄吾賞心固非一方所可盡也以無盡之賞寄無盡之義互相推發豈不多多而益辦耶茍為不足又将推之於親族交遊之好事者則吾起居宴息出入往来無非與易俱矣觀其名玩其義黙隠於吾心以求合焉不亦樂乎客既出因筆之為䝉齋記序送張當世序庚戌張侯來守莆田余佐郡事後兩月至時逸宼楊勍犯閩官軍綴之鏖演山下聲摇四境已而回源盗作辛亥其徒益熾吾之赤子探丸佩犢皆號范葉兵疽食旁郡壬子春靈旗大伐衝逐蕩拓宼乃平又一月天子召侯為郎余亦及𤓰焉噫余與侯同僚最久而宼攘甲兵之事相為終始也方繡衣交馳羽檄狎至裒兵括食刻期取辦侯以強敏濟之余因以免戾焉顧於侯未有助也今侯将承前席之寵思效一言可乎夫平盗易使盗不作難蓋勦戮之威易伸而涵養之恩難洽也閩之勢猶人嬰痼疾者隂邪内乗根固盤互牢不可觧今以鍼艾藥石攻之灼之蕩之滌之疾雖除其真氣􅉵矣道和扶衰如保嬰兒如擎盤水如維持側車惴惴然不敢有毫髪之傷則生理可致不然一疴已一恙生消於指臂聚於腹心必甚於前而至不可為也吾民困矣輕徭薄賦寧使鈍官守法勿使利官逞能庶幾有瘳乎余閩人所知者閩事四海之廣亦猶是也願侯以此告於上送翁徳功序書生輕議兵自荀卿發之三至五權六術雖畧本仁義然聖人不輕議兵夾谷之㑹田常之討勇往直前無如我夫子者至於衛公求由之問皆深閉固拒不假以辭色非沮之也慎之也卿談之何容易乎末世乃有長嘯却虜圍棊破敵揮扇靖烟塵投筆取封侯抵掌談笑横槊賦詩視聖人之所甚慎藐然輕肆焉使書生讀之激昻歆羡袖書公卿之門飛奏雲天之陛莫不撫髀嘆息恨其試已之晩是則鼓之舞之荀卿為之罪人也吾黨翁侯徳功老於經術不得一第向來小試武事朝廷官之徳功沉毅忠信客氣不藏於胸躗言靡出諸口吾知其可以有為也因贈言焉夫金玉已生螻蟻人命徒詐長平之卒不媿申息之老以是言兵者徳功之所嫉也余亦嫉之謀乖借箸勇将憑河扁舟慕西子之載抄騎縱南塘之出以是言兵者徳功之所嫉也余亦嫉之誠莫動天忠非許國匿魚腹之丹書灑指端之公字以是言兵者徳功之所嫉也余亦嫉之操心倘不然提十百千萬之衆凌凌兢兢如是愛子慈孫将跳白刃焉雖不慎者慎矣徳功是行也有引而用之者乎摩厲以湏卓然自見於世矣異時海宇清泰毒手尊拳袖而不用凌烟之像有白面書生雍容於虎臣之列者其徳功也耶屏山集巻五
