body:
  text: 屏山集卷四宋劉子翬撰論漢書雜論下或曰武帝不冠不見汲黯此足稱者余謂君臣相與在貴以誠心不在貴虛禮也武帝以黯為社稷之臣是非不知黯也黯進言未嘗一聼畫策未嘗一用𢎞湯之阿諛順旨皆超躐見用至謂黯為甚戇謂黯為不學謂黯為妄發卒見斥逐則不冠不見是虛禮也後拜黯為淮陽太守欲借其威重以靖寇也黯不受印綬強豫之曰吾今召君矣此紿黯欲令之淮陽也黯居淮陽十年竟不召也髙祖騎其項而問周昌據牀而見酈食其可謂亡禮矣然其計策行其身名顯故髙祖雖有嫚侮之譏而英雄樂為之用者蓋其誠心相與不責以虛禮也武帝力征胸奴主父偃嚴安徐樂引危亡之事諫之甚切帝曰公輩皆安在何相見之晚也悉拜為郎然征伐竟不已又包南山民田為上林苑東方朔陳三不可帝拜朔為大中大夫給事中賜黃金百然遂起上林苑蓋武帝知受諌為人君之美故不吝爵祿以旌寵之也然有賞諫之名無受諌之實何益於治乎孔子曰法語之言能無從乎改之為貴此之謂也哀帝為定陶王從傅相中尉入朝成帝問之對曰令諸侯王朝得從其國二千石傅相中尉皆國二千石也問中山王不能對帝乃賢定陶王時哀帝年十七元帝即位時年二十七矣不省召致廷尉為下獄竟殺蕭望之以此言人君一日二日萬幾豈可不練逹世務也哉元帝好儒宣帝曰亂我家者必太子也漢業自元帝而衰知子莫若父信矣杜欽説王鳯曰王章所坐事密天下不知章實有罪而以為坐言事也宜因章事舉直言極諫則流言稍釋疑惑著明鳯行其䇿史稱欽補過將美皆此類也且王章上封事指言鳯專權蔽主宜廢勿用鳯乃陷以大逆章死不以罪天下寃之欽為鳯謀主言無不聽也不能救章之死又為此謀蓋惡誣善天下果可欺耶欽姦人之雄也初鳯專權欽嘗戒之又令鳯乞骸骨及王章上封事鳯稱疾篤欲遂退當是時劉氏王氏之禍幾解矣欽乃力説鳳起視事竟殺章欽內結鳳心而外取虛名故其謀反覆如此元帝舉直言欽專指後宫謂外戚親屬無乖剌之心隂為鳳地谷永之流也而機險過之史臣責永而恕欽且謂浮沉當世好謀而成非夫浮華博習之徒所能窺也其然豈其然乎張湯杜周酷吏也皆子孫榮顯侯爵數世史稱湯雖酷烈及身蒙禍其推賢揚善固宜有後此牽合之論也湯深刻排陷流毒一時其稱引一二掾史何足掩其過伐安世延年之德器自應綿逺未必由湯與周舜之帝禹之王豈必自瞽鯀耶公孫宏徒步數年至宰相封侯於是起客館開東閣以延賢人一時稱焉然不聞有所引薦也一董仲舒卒擠排之何賢人之能得耶若所招延唯諂諛軟美之士則宏之客館與屈氂之奴婢室無以異也史稱賈山自下劑上鄒陽枚乘遊於危國然卒免刑戮者以其言正也審如是則比干諫紂子胥諫吳皆不免刑戮者豈其言不正耶君有明暗寬暴由其所遭有幸與不幸也太史公以儒墨隂陽名法道德為六家較其短長而論其指要劉子曰夫儒何所不通哉不通非儒也其論墨者曰強本節用人給家足之道也孔子曰與其奢也寧儉有子曰百姓足君孰與不足易曰節以制度不傷財不害民則墨家之長吾儒之為也其論隂陽家曰敘四時之大順不可失也孔子曰行夏之時易曰變通莫大乎四時又曰君子以治厯明時則隂陽之長吾儒之為也其論法家曰尊主卑臣分職不相踰越不可改也孔子君在踧踖如也君命召不俟駕而行易曰君子以辨上下定民志則法家之長吾儒之為也其論名家曰其正名實不可不察也孔子曰必也正名乎又曰惟名與器不可假人又曰如有所譽者其有所試矣則名家之長吾儒之為也其論道家曰使人精神專一動合無形淡足萬物孔子曰造次必於是顛沛必於是易曰以此洗心退藏於密又曰無思無為寂然不動感而遂通天下之故則道家之長吾儒之為也以是觀之則五家之長吾儒通之明矣其論儒者之短則曰以六藝為法六藝經傳以千萬數纍世不能通其學當年不能究其禮故曰博而寡要勞而少功是以迹論儒也孔子曰一以貫之又曰豫欲無言然則所謂六藝者果可以病儒哉論儒之迹而不論儒之道非知儒者也不蔽於一偏不滯於一隅以之治世以之修身無不可焉兹所謂通儒也若曰殊途而同歸百慮而一致則紛紛之論不發亦可昌邑王賀廢宣帝即位心內忌賀詔山陽太守張敞謹備敞見賀察其言語跪起不常敞即奏曰故王清狂不惠由此知賀不足忌若賀者可謂無道之主非清狂不惠者也賀憂不免張敞之來故於言語跪起之間陽為顛蹶以免禍也初霍光廢賀時令賀受詔賀曰聞天子有爭臣七人雖亡道不失天下觀此應對豈清狂不惠者耶賀雖昏於治國亦善於保身其得終其天年抑有由也丙吉為丞相掾吏有罪臧終無所案驗後因以為故事且吏不敢為姦臧者畏刑法也刑法不加彼何憚焉姦臧之吏蹤迹詭祕幸而一敗又獲善脫蠧國害民多矣賞罰之柄詔王馭臣相之職也治逺自近掾吏之姦臧不案欲責百司郡縣之亷可乎丙吉馭吏嘗從吉出醉嘔丞相車上吉容之後赤白囊至馭吏刺知虜入雲中代郡以白吉曰二千石有老病不任兵馬者宜可預視吉召曹案科條其人會帝召問吉具以對宣帝稱其憂邊思職吉歎曰不先聞馭吏言何見勞勉之有掾吏由是益賢吉夫丞相百僚之表也馭吏嘔車其傷體貌甚矣且時方多警邉郡二千石長吏可不預知耶老病不任可不預擇耶倉卒之間偶得馭吏之言而見勞勉又何足賢噫吉漢之名臣兹不足以貶其盛德史臣載為美談亦已陋矣趙充國罷騎兵屯田欲不戰以破先零其計得矣然須遲以歲月以待其敝而宣帝責成甚速遂詔别將辛武賢等出擊斬獲數千其餘盡降先零之破雖充國計畫已定然當時多言武賢出擊之功或使充國見宣帝言屯田不戰先零必破䇿之上也用兵則有勝有負負則其患滋多後勿輕戰未為失也繼乃罷遣武賢更不論賞此則過矣使之率三軍冒萬死既已成功安可不賞故武賢深恨充國告其子卬他事卬自殺充國亦罷遂為世讎蓋作不順而施不恕也夫爭功招禍自古多矣余獨於充國惜之史稱雋不疑學以從政臨事不惑遂立名迹始終可述疏廣行止足之計免辱殆之纍亦其次也余觀不疑為政初亦尚嚴賴賢母之訓故不至殘酷耳其議論容飾頗近豪俠然不疑誠竒才考之當世其倫匹尚多也西漢士大夫持祿保位習以為風廣受獨行止足之計名重一時亷頑立懦後世猶想其風采焉其人非不疑之所能先也以遊夏之文學冉季之政事宰貢之言語列於四科不得先顔閔之德行聖人之意深矣元帝欲御樓船薛廣德免冠曰宜從橋詔曰大夫冠廣德曰陛下不聼臣臣自刎以血汙車輪陛下不得入廟帝不悅張猛曰乘船危就橋安聖主不乘危帝曰曉人不當如是耶乃從橋噫廣德刎血之言誠過矣然廣德不先發此言以激上心則張猛之言未必見聼也事君有犯無隱廣德有之然元帝亦可謂能納諫矣武帝任車千秋一言寤主何哉智有餘也武帝惑於鬼神故千秋訟太子之寃託以白頭翁教臣言武帝亦曰此髙廟神靈使公教我也武帝晚年多病尤信巫蠱之説衛太子傅曰久之巫蠱事多不信上知太子惶恐無他意車千秋復訟太子寃是千秋逆知武帝有悔恨心故乘間而開説也不然千秋為髙寢郎當追捕太子時何不言耶因其悔恨之心挾以鬼神之事故一言寤主豈非智有餘耶傳中亦言千秋敦厚有智千秋無他施為所謂有智者豈當時史臣亦微見此意耶薛方蔣栩之流漢髙士也附於他傳僅見姓名東方朔一傳幾萬餘言考其所載皆滑稽戲弄不經之談孔子曰辭逹而已矣亦盍翦其繁蕪乎蕭望之自諫官出為平原太守望之上疏曰選經術之士以為內臣外郡不治豈足憂哉此有激而言非通論也史稱元帝優遊不斷蕭望之謂中書本用宦者非國舊制欲退宏恭石顯更置士人元帝謙遜重改作議久不定此優遊不斷也後恭顯譖望之請召置廷尉請免為庶人即免為庶人請詘之牢獄即詘之牢獄又何勇決耶蓋由聽受不明故忠直之言難行讒昵之言易入也三長史譖殺張湯武帝後殺三長史恭顯譖殺蕭望之元帝竟不加罪此人君之所以貴英斷也望之既死帝為之却食涕泣哀慟每嵗時遣使祠祭無所不盡其至焉生不能用又殺其身既死乃為此紛紛何耶哀公誄仲尼子貢所以譏之也魏相為揚州刺史考案郡國守相多所貶退丙吉與書曰朝廷已深知弱翁治行方且大用矣願少慎事自重相心善其言為霽威嚴相所貶退皆當耶不可已也失之過耶針之可也不當以朝廷方見用而為慎事之計也以丙魏之賢猶如此况其下乎後之人慎事自重而致身榮顯者率遵此言也班固謂平當逡巡有恥又謂當持祿保位被阿諛之譏孔子曰行已有恥又曰巧言令色足恭左丘明恥之丘亦恥之若審阿諛烏得謂之有恥乎當為相才數月觀其不受侯而過於公孫宏稚圭之流矣髙祖召田橫至尸鄉自殺其客二人亦自剄髙祖驚以橫客皆賢也盡召之其徒五百人聞橫死皆自殺於是乃知田橫兄弟能得士也余謂史溢美之言也五百人時在海中聞橫死懼而逃散耳或有與橫同死生者亦不過數人海上遼邈因遂傳以為皆死未可知也橫竄海中其徒五百人若果能皆為橫死則方其盛時據三齊之地所得死士可勝論哉以橫兄弟之賢得死士如此之衆夫孰能當之然橫兄弟亦屢與諸侯兵戰矣未嘗一勝則所謂死士者皆安在耶史臣蓋欲成田橫得士之名因世俗之傳遂實其説袁盎雖引義慷慨然捭闔之士也嘗謂文帝有髙世之行三且曰陛下至代邸西鄉讓天下者三南鄉讓天子者再夫許由一讓陛下過許由四矣方漢大臣誅諸吕迎文帝帝與宋昌決䇿而來豈有許由之志哉再三之讓姑欲謙謙盡力耳盎乃謂過許由之讓四何諂諛之甚耶文帝甘受其言使庸庸之君豈不張其驕心哉書曰有言遜於汝志必求諸非道帝王以此觀人則邪與正豈不洞然耶張良至圯上見老父授以一編書乃太公兵法也初老父與良約五日平明與我期比良往父已先在怒曰與老人期後何也又五日雞鳴往父又先在又五日良半夜往有頃父來喜曰當如是兵法曰先發者制人後發者制於人老父之意良默得之故未傳兵書而先許之也張良所畫計䇿髙祖用之以成漢業及招四皓以安太子則髙帝亦墮其計中矣良欲從赤松子遊蓋婉其辭以脫世網所謂鴻飛冥冥弋人何慕焉髙祖與雍齒有故怨嘗欲殺之後諸將欲反用張良計乃封雍齒王陵坐與雍齒善亦最後封噫以髙祖寬仁大度猶未能於此釋然乃知不念舊惡亦是難事韓信王楚召辱己少年令出跨下者以為中尉曰此壯士也觀此則信豈庸庸武夫耶有告韓信反者髙帝初欲發兵陳平勸帝偽遊雲夢信必郊謁即執縳之此計亦適行耳據韓信傳髙祖且至楚欲發兵自度無罪欲謁上恐見擒是信已明知髙祖欲擒之矣使信決䇿發兵以襲髙祖事固不測也或説信斬鍾離昧楚亡將漢捕之甚急信初匿之今發之是自暴其罪也以此求免難哉噫信誠無他然髙祖卒疑之者豈兩雄不並居耶韓信料敵制勝可謂明矣而不知髙祖之疑已是天奪其鑒也髙祖兵敗成臯自稱漢使晨馳入信軍信未起即入卧內奪其印符麾召諸將易置之信乃知獨漢王來大驚則髙祖疑信之迹彰矣及封齊王會垓下項羽死髙祖襲奪信軍徙信為楚王則髙祖疑信之迹又昭昭矣信殊不覺故武涉蒯通之言如水投石焉初謂漢王親信我不奪我齊既奪齊又謂我無罪既見縳始知漢王畏惡其能遂稱疾不朝嗚呼何信知之晚也奪軍徙地出其不意相疑甚矣三尺童子亦須覺悟而信不知信豈暗昧至此哉天奪其鑒也項羽引兵欲渡烏江亭長艤舟待請羽急渡羽不渡乃戰死蓋是時漢購羽千金邑萬户亭長之言甚甘羽疑其欺已也羽意謂丈夫途窮寧戰死不忍為亭長所執故託以江東父老之言為解爾使羽果無東渡意豈引兵至此哉羽至東城才二十八騎與漢兵戰斬二將殺數百人漢軍披靡使羽盡用其衆決死垓下豈易當哉所以去垓下者猶冀得脫也乃為田父所紿陷於大澤羽知人心不與已安知亭長不出田父之計哉此羽之所以戰死也武帝之時異人并出史臣方之版築飯牛斯言過矣公孫宏倪寬之儒雅專事阿諛皆佞人也張湯趙禹之定令多務嚴急皆酷吏也李延年倡優善歌乃許之協律桑宏羊剝民聚斂乃許之運籌至如嚴助張騫之徒皆啓唱邊事以資進取在堯舜三代之時不免乎流放竄殛者也尚何才之足云惟汲黯蘇武一時傑出而武帝疏逺之肆其私心禍流四海則以朝無人也史臣之言過矣爵祿者人主之柄也褒貶者史官之柄也史官之柄與人主相為權衡以勸善懲惡孔子作春秋後之作史者取法焉莫尊於丞相陶青劉舍相也不得立傳莫貴於通侯扶栁吕成侯也不得立傳嚴彭祖不為宰相李廣不封侯當時惜之然皆有傳焉孟眭以議郎立傳江公以博士立傳蘇武以典屬國立傳嚴安以騎馬立傳賈山鄒陽之徒以諸侯之客立傳不以爵祿之崇所以勵善也春秋澶淵之會卿當書以其無信不書召陵之盟屈完不當書以其賢故特書蓋此意也佞幸貨殖何以立傳希恩冒利之人茍一時之榮非求名於萬世也史必立傳所以懲惡也春秋書三叛人名蓋此意也此史官之柄與人主相為權衡而勵善懲惡也班固作漢書惟紀最為嚴密事皆詳載於傳而撮其要書於紀固自名之曰春秋考紀其言有深意焉余嘗考之吳王濞約六國舉兵齊王後悔背約城守濟北王為其郎中令劫守不得發兵濞敗遂得不誅班固書曰皆舉兵反何以書皆舉兵反初意皆反也戾太子斬江充矯制發兵武帝詔劉屈氂捕斬反者班固書曰太子以節發兵與丞相劉屈氂大戰長安何以不書反初無反意也張湯凌折三長史長史發湯隂事湯曰謀陷湯者三長史也遂自殺武帝盡誅三長史班固書曰張湯有罪自殺何不書陷湯湯有罪也𢎞恭石顯奏蕭望之不悔過請詘於牢獄塞其怏怏心望之自殺有司奏望之有罪請絶其爵邑班固書曰中書令𢎞恭石顯譖望之令自殺何不書有罪恭顯譖之也太子矯制不書反而書以節發兵譏武帝惑巫蠱而致亂禍也望之自殺不書有罪而書譖譏元帝信閹宦而殺其師傳也凡此之類不可殫舉固自謂春秋考紀者豈以得春秋之意耶班固作史贊非獨詳於紀善也又重美之非獨略於記過也又婉其辭其記善也雖小善必録其記過也非大過不書文帝之仁言儉德贊中總列十數條嘆曰嗚呼仁哉於景帝贊又曰至於孝文加以恭儉於武帝贊又曰文景務在養民非詳於記善又重美之乎武帝之窮兵奢侈其贊曰雄材大略不改文景之恭儉詩書所稱何以加焉非略於記過又婉其辭乎元帝之號令溫雅成帝之穆穆之容皆見稱述者不以一失廢其他長也故曰雖小善必録吕后之寵産祿景帝之殺朝周皆略而不言者不以小疵玷其全美也故曰非大過不書史讃諸帝皆稱述獨髙祖贊推其世系運統而已無所稱也蓋以髙祖之盛德大業不假言而自著亦非一二言可贊也故贊衛霍不言征伐之功贊相如不論文章之美其他則片善寸長贊皆言之有餘易見不足難知故也髙祖輟洗受言吐哺銷印其從諌若轉圜也至於廢太子則雖得百張良無益文帝身衣弋綈慎夫人衣不曳地其儉無以加也至寵鄧通則賞賜輒巨萬併舉銅山與之何相戾哉蓋惑於所愛雖聖主賢君猶不能自免也及四皓入見而嬖姬舞泣申屠一言而弄臣碎首此二帝所以稱賢聖哉屏山集卷四
