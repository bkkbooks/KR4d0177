body:
  text: 屏山集巻二宋劉子翬撰論維民論上古無自固之國若有維民之道有國之大猶人之形神其君也氣其民也神氣相資形乃生焉君民相資國乃固焉相資之道必先有與也神與氣氣乃與神君與民民乃與君盖上者下之唱本者末之附也民有駭亂離析與民者之過也氣有乖戾泮渙與氣者之過也是以神存其氣則氣盛而形充君維其民則民歸而國固甚哉民心之無常也浸浸乍歸蕩蕩俄往去就之端最為難察自昔觀我政於廟堂之間得民情於肝膈之内有要道矣政苛與刑酷與賦斂重與徭役數與有是四者民必不樂其生不待聞其怨嗟之聲見其蹙額之色時雖幸安民必叛已無是四者時雖甚危民必附已不待走閭巷訪鰥獨而知其必樂其生矣夫民之樂不樂其事至微何規規察察而欲知之耶盖不樂之意鬰於胸中亦不能自制也積而為怨怨極則怒怒之心蓄而未發甚於敵國之兵戈過於天灾之水旱不見其形莫知警懼彼其疾上如仇讐伺有釁隙與之偕亡而為上者方且偃然撫之曰此吾赤子也猶木蠧於中魚潰於腹一旦破壊其可支哉民心無常如此去就之端難察如此故有國者兢兢業業不敢自安思有以維之也自古及今天下之民必有所屬堯舜之民禹維之桀解其維而夏亡商之民文武維之幽厲解其維而周亡自秦漢以來或解或維此治亂興亡循環不已也我宋統御十聖雖武畧文經其道不同要之皆以寛厚為治至哉仁宗之仁也三代以來一人而已笑言成恩咳唾為澤薫蒸沈浸四十餘年所以維民者盡矣故胡虜崛興過於劉石徳光之暴靖康竒禍同乎永嘉開運之酷而人心戴宋亂而不離宜乎主上之所以中興也竊惟南渡以來天歩窘蹙宸心鬱焦凡咨詢之及詔令之頒惟勤恤元元是先豈非鍳古昔之治道紹祖宗之遺澤以祈安定耶愚嘗攷維民之四説焉政苛無有也刑酷無有也徭役之煩無有也惟賦斂一事不可謂輕且今日國家非有横給浮費也特以軍旅之興資用不可一日闕耳有司奉承無術益費増煩故常税之外月有樁嵗有糴有明耗暗耗有帶科析科有和買有預借如市庚銀如貨鹹茗如賣僧鬻爵如造甲脩船其微至皮角竹木之類一取於民名之曰和其實强估名之曰借其實不償以瘡痍之民供多多之賦豈易支吾耶膏萎凉暍必有道焉兹幸邉遽暫息戎事稍紓當講畫究明蘇凋甿活遺噍以成康阜之治噫求民之瘼施恩弗恩維民之道輕斂為急維民論中維民之道莫先於輕賦斂或曰賦歛輕則國用不足柰何是未之思也昔人以蜀為富國以江淮為財賦淵藪今奄宅二區居膏腴厚實之地而常有煎熬窘乏之憂是理財無術也術之大要有二一曰講經制之道二曰革科納之弊皆所以足國寛民也何謂講經制之道財欲豐而散不欲豐而聚散則足聚則竭所以豐之有源也今山澤之利搜求竅穴毫髮無遺闗市之征束薪把菜亦有所取利源至多至煩而用猶不足者竊意本之過也敦本之道莫先重農今散農非一塗無術以聚之困農非一事無術以寛之營屯雖興耕鑿未廣盖兵驕不肯躬耒耜也將無體國之誠也寛鄉薈盛而嘉榖稀狹鄉人衆而農夫寡古有遷民薦更之法焉或徙弛刑或出贜吏以實空鄙禁游惰抑技末誘之罰之一歸於農使闤闠難寓而田畆易居他業艱苦而田夫優裕是聚之寛之之術也今未行焉是經制之道有所未盡也國富而節人有拂心國貧而節人有恕心今主計之官無出入之制隨田取足不量民力焉兵以衞民食於民官以治民食於民茍出不臨戎居不司事勿食可也郡縣已併旋復員闕可减復増或慮裁抑之行衆將咨怨殊不思費用之廣浩於邱山非天降而地溢也一取於民耳深鐫痛削民不堪命亦將怨叛䘏此小嗟忘彼大憾較其輕重當何如耶况節之有道當於人心未必生怨此經制之道有所未盡也昔之足國者斂不及民今一錢用度必取於民術至相反也究其弊在於儒臣縉紳耻言財賦國計之權一委强幹之吏彼以堪事為能無所斟酌惻怛之意素不存於胸中况以任之弗乆聴之不專無因時通變闔闢之道裂東裨西趣辦目前而已如豪右之家主帑藏者月更嵗易豈復有豐饒之理耶此經制之道有所未盡也茍不任謀猷經逺之臣而責成於幹局之吏不求通變闔闢之宜而専守彛常之制不務敦本富民之道而争求錐刀之末不圖甘節之苦而慮悠悠諠嘩之怨則浸浸靡靡日復一日坐困而不可為矣何謂革科納之弊今朝廷少有科敷州縣必増其數其説謂細民逃户無可供輸按産而均或致乏事善良畏憚奔奏豪猾巨捍遷延吏緣為姦權宜縱舍則民已倍費矣受納之間巧弊百出執役掌事皆老姦宿獪視吾民猶家雞圏豕惟所咀啖焉權衡斗尺邦有定制一揺手則變多為寡一謬言則指精為粗事例糜費既不可闕隂欺晝攫紛然其間愚民眩胱驚駭不知所措則又倍費矣受納既艱權歸攬子攬子與倉吏潛通腹心相為脣齒民户自輸則千端阻抑攬子代納則一槩通融倉吏要民民憤之攬子要民民甘之盖依之雖若見侵去之又患無託也民聴命於攬子則又倍費矣或立期促迫或先限監催一檄經過千家搔擾則又倍費矣民安得不重困哉噫民孤立於下衆蠧乗之若蝟毛非法弊也官弊也非上困民也官困民也故官非其人則官為蠧官無其術則下為蠧今欲扶弱沮强惟在得一受納官爾郡縣皆選清亷强力之士主之振職者有賞有陟否則有罰有愆使應此選者為試才之地發譽之基則人人自勵必躬必親取民之賦如出其槖自然羣蠧屏縮斯民稍寛矣經制之道既盡科納之弊又革則國用足而民安富矣夫民之叛上非樂為也由其中懐不滿之心故易以傾揺盗賊誘之從為盗賊夷狄刼之從為夷狄誰之罪耶方其為民也官誅求吏掊克視之如草芥不知人心之已解及其既叛也急追捕肆屠戮視之如禽獸不慮邦本之益危豈不殆哉今日維民之道非他要在安之富之而已非謂人人慰勞撫摩之也勿擾之斯安矣非謂人人豐殖贍給之也勿窮之斯富矣民心一固推之不舍逐之不離彼其附上非上人連比膠結之也富之安之民自相維矣維民論下無苛政無暴刑無重役無厚斂維民之道盡矣誰與奉行良法美意被彼黎庶哉外建千官内列百吏親於民者惟縣令耳日者朝廷嚴選舉之法開褒擢之路大縣皆自堂除憂民之深也然邑有小大民無親䟱重此輕彼豈一視同仁之意哉以縣邑至多擇其大猶以為難安得盡付良吏哉挈領而裘正理綱而目張太守者縣令之綱領也令之賢否守得舉之刺之存之罷之榮之辱之聲氣所加有變化人材之道焉舉一郡言之令有亷有貪有勤有惰有循有暴守將賢與慕徳則觀感而化畏威則悚懼而化以求知己以寛罪戾心競力争千里之内皆化而為良吏矣守將不賢與則貪者自遂暴者肆情惰者日偷恬然無所忌憚而潔白公正之吏立已則見尤守法則獲謗抗上則招戾往往變節忍詬以謀茍安千里之内皆化而為不良之吏矣龔黄為郡諸邑無不獲之民趙張試政千里無不才之令其勢然也故守將重寄也有七不可除姻婭勿除勲勞勿除私䁥勿除祈閑均逸勿除告衰引疾勿除被劾左遷勿除便私養了婚嫁勿除無是七者惟以承宣牧民為心乃分符剖竹其名正其任專且古之牧民者甚難今之牧民者甚易古之守令出入阡陌勸督農桒疏渠築埧遣鰐去獸課其牛馬教之植藝疾癘則治之療之貧窮則賑之恤之訓以祭祀婚冠之禮讀以比閭族黨之法其勞甚矣今之四民生生之理皆自營辦毫髮不仰於官惟官勿撓之足矣撓之之由在於不能戢下刻木舞文貪如谿壑彎弧肆威畏於虎狼賕賂公行其弊乆矣十數年來尤甚錢非盈積不受貨非溢槖不携故東臯南畆高門大第鮮衣美食皆此曹之受用也守令雖不殘民而民破家蕩産於此曹之手善控御者猶不能盡其防况縱之哉故今日守令之良莫先於戢下夫良法美意朝廷之惠也逹朝廷之惠以及民守令之惠也守令之惠弗施咎在守令守令之惠不得施復何咎耶方嚴文峻法星流火飛今日以乏事褫官明日以緩征鐫職雖有豈弟慈愛之心恐懼弗得施也而乃責其循撫之效無聞是猶委市賈之求贏而禁其㒺利乾沒趣庖人之進味而惡其剝膚槌髓安有是理耶故賦斂急則守令才賦斂寛則守令賢守令賢則民寛守令才則民擾由上使之也噫羿能簒夏之天下而不能簒夏之民心莾能移漢之社稷而不能移漢之民心是以少康光武之興呼吸而雲聚川赴抑有由也國家茍盡維民之道焉則恢復之功期期可集本固邦寧内何慮乎嘯呼外何憂乎介狄哉屏山集巻二
