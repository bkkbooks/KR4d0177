body:
  text: 屏山集卷十九宋劉子翬撰詩徑山寄生子作道服三首旋裁山繭作山衣更著芒鞋白接䍦自笑支離風貌野紆朱紆紫不相宜逺信殷勤到草庵却慚衰病豈能堪聊將佛日三端布為造青州一領衫粲粲休誇綺與紈紉蘭製芰亦良難此袍遍滿三千界要與寒兒共解顔清泉亨老寄鼓枕二首團團鼓枕樣新傳竹簞繩床得飽眠耳界若聞聲外意不須撾擊也鏗然蘧蘧一覺直千金雅贈徒知感激深莫道林間髙臥穩憂時亦有枕戈心贈總上人兼簡無求居士二首雙徑山中一衲衣曵笻逺逺叩巖扉愧無白璧黃金贈擕取清風滿袖歸多謝徽州吳使君新詩問勞意何勤無求已得心空樂更作無心出岫雲㑹蔡子思張叔獻二教授膠庠夙昔記追隨物變時移萬事非曉闕風烟胡騎滿夜窗燈火故人稀中郎秉德無瑕纇平子談經有㫖歸獨我衰遲愧朋友蹉跎已覺壯心違次韻挹山亭張子猷絶句鶴駕騰空春復秋淡烟寒日鎖林邱夕郎自是金門客更莫臨風思逺遊邃老寄龍涎香二首瘴海驪龍供素沫蠻村花露挹清滋微參鼻觀猶疑似全在爐烟未發時知有名香出海隅幽人得得寄吾廬明窗小爇跏趺坐更覺胸懷一事無次韻溫其元日詩曉來飛雨挾風顛洗出韶容換故年花動一紅明屋角山寒亂碧到樽前病如夜鶴孤還警老似春蠶飽即眠賴有故人開寂寞錦囊詩句許時傳吕丞相挽詩黃髮三朝老勤勞險阻中十年流馬䇿一日斷鼇功迅掃乾坤靜扶持廟社隆璜溪今寂寞髣佛見英風次韻明仲遊北巖雲巖藏勝絶何路不潛通信步迷時逺冥心樂處同亂松風索索懸瀑雨濛濛陶謝多清興招邀有逺公李丞相挽詩三首委質艱難際精忠日月昭引裾堯浸縮斷鞅虜氛消顧盼安諸夏風聲動一朝南遷誰辨謗公論付芻蕘文武中興相名髙北斗南茂𢎞恢逺量安石暢元談六策陳丹扆三休寄夢庵公所居有夢庵人亡今孰賴憂國意如惔賔榻勤初設詩筒辱屢傳一嗟雲霧隔坐閲嵗時遷埋玉俄成恨乘風想已仙終當挽行紼長慟繐帷前無諸策題問顔亡絶好軻沒無傳孔林黃玉化飛埃一派淵源有自來具體好時心似谷厲辭傳處口如雷聞聲盡是緇帷客見色無非古市槐却訝文公迷聖户不知靈鑰有人開次韻黃宰一源亭二首聞說催耕步澗幽田家喜氣共春浮仁聲似水潛漸物不作驚人洶洶流賔榻浮塵拂不開胸中豐恨結崔嵬幔亭雲散天全露猶想雙鳬化舄來翁仁山受恩歸以詩相訪因次其韻寒階響葉終日靜剝啄欣聞人叩關一聼清言風灑座幾回幽夢月沉山遺珠未許留滄海老驥終聞在六間獻策明光豈無用人心久矣厭多艱題王巖起樂齊三首數叢修竹擁齊居興味翛然樂有餘午枕睡酣窗寂寂清風來去自翻書怪底愁端生不已勞心逐事事無窮陶然一㸃冲融趣只在清虛淡泊中我亦雲根結小房年來與世略相忘定知可蛻紛華事不及絃歌氣味長寄巨山分擕六換禁城煙夢也慵飛到日邊綵筆尚懷貂可續冰銜時許鴈遙傳紫薇院靜君宵直緑苧村深我晝眠㑹向急流歸亦好雙笻同訪幔亭仙寄題觀瀾亭二首遙知壓水創新齊百里寒聲席下來准擬杖藜秋夜去同看月湧斕銀堆未合滄溟勢不休噴雲齧石幾經秋雄心戲欲相吞吐一縱詞瀾筆下流遊密庵致明有喜雨詩次原韻雨氣經巖上僧窗暗復明溪流生急響松吹助狂傾䆉稏無邊潤蘧蒢一味清仁心樂同飽擁鼻發吟聲次韻熊叔雅七言只今漂蕩賈長沙來往三山躡緯霞馬上新詩猶憶友枕邊幽夢不離家風驚枯葦連汀雨霜著寒楓滿樹花却記梁園初識面干戈豈料落天涯題石井二首玲瓏巖穴巧如刳中貯滄浪百斛餘衰懶自憐遊世久襟懷未及汝常虛道經蘭若偶停鞭客裏逢幽意惘然一把緑蘿蒙石竇夢魂翻憤醒心泉登鵝湖妙峯亭次韻偶向妙峯亭上望一襟寒色近春分晴風吹散天全露吹盡江南江北雲題吳若愚一經堂老矣惟書愛未消喜聞新孰出塵囂軒窗近水來無厭絃誦因風聼忽遙遊藝定知輕拾芥正心端欲似耘苖一經教子誠為樂家世從今未寂寥寄如愚珙二首别殿遙聞駐六飛天顔咫尺引儒衣吾家亦有臚傳喜叔姪聨名賜第歸鴈塔蟾宫盡假途要須行實副名譽六經堂上歸來日飽讀平生未見書次韻朱喬年送山老住三峯二首已愛雲山信腳行撩人詩句更增情直須吏部尋盟日急遣雙魚一寄聲平生耳裏三峯寺况識峯頭新主人借我一笻扶病去月林松吹度綸巾朱喬年同傅茂元見訪校書蘭臺昔名士懷望㑹稽今望郎忽驚風采照户牗便覺肺腑流冰霜手談逼剝屢爭局眼視咍臺時對床山林情話政可樂只恐雲路雙雕翔寄題黃應亨東明齊二首青藜不復來人世好學如君自少雙賴有羲和鞭日轂曉紅常照讀書窗齊居雅意與誰論㑹見依光沐寵恩慚愧野人欺我懶相招炙背坐松根寄題清軒二首聞說名軒寄遠情得非遊世厭營營丈夫出處渾無纍只要心源一點清中郎言語妙天下曾向軒中記舊遊一尺翠珉揮染罷冰輪夜轉屋山頭有感三首八葉炎圖茂千齡聖主昌農桑開漢域禮樂煥周庠宴粲三登樂謳吟七閏長徽名辭鏤玉盛舉冠前王運屬宣和末干戈變故仍倦勤修內禪流澤啓中興睢水千麾集胡沙八駿騰尺書傳諱日寰宇淚如澠孝感柔強敵和盟定一朝龍輴來瀚海鶴駕返神霄歌吹仍祠禹羮墻若見堯稽山同峻極從此百神朝和黃德欽韻贈公路二孫佩韘趨蹌正妙年階庭蘭玉固天然人間百藝皆由學惟有讀書知子賢謝致中瓜二首萬言不直一杯水才似謫仙良可嗟顧我小詩偏發市年年博得蕭屯瓜病翁癡絶端可笑文墨骫骳誰得稱故人分甘聊爾耳更向詩流說我能詹君則賦光璧堂詩拉余同作幽行已辦百枝扶况有溪山近故廬水碧山花都幾許道人著眼恰無餘李佐國擕致中贈别詩來戲成二首星郎絶筆版曹卧懶翁病翁稀綴文豈料詩壇今再鼓蕭屯賴有故將軍贊皇吟毫不可掣交游酬答被惱深贈言排狠入吾里以鄰為壑君何心次韻白水雪梅二詩閩雪少曾棲瓦白怪來浩浩擁寒濵戒嚴故作敝裘厄淡彩潛催幽幌晨眼觀醉中迷有色心華淨處照無垠搖松旋拾晶熒煮已覺肥生齒頰津豪氣無根老自摧尚留餘習愛尋梅苦寒扶病也須去薄暮微吟埀欲開靜納長芬風外塢醉臨髙白水邊臺無言自得幽貞意莫吐肝腸錦繡才原仲致中寄雪梅二詩再次前韻一雪度臘寒不春風光淡然溪谷濵清湖讀易月當午烏石掛廬梅照晨未借流膏耕沃野聊乘爽氣欵蒼垠嗣音風雅愧辭竭安得筆翻雲漢津飯了意行忘逺近翛翛老眼入疏梅愁邊賞味平生劇亂後橫斜幾度開勝韻撩詩頻呫囁冷香熏夢破咍臺莫將花客輕題品自有渠儂十倍才橙子四首尚懷細雨初移日著子已見清霜澘絶憐面有貴人色偶致吾儕樽俎間橙虀細縷風韻勝我不痛飲那知音何如金丸走衾枕三月夢遊薝蔔林自從天籞守吏散老樹零落煙雲凄今朝我為作知己小摘秋風黃欲齊花瓷泛密小劑供極有痛快鏖邪功生枝滋味雖可口流品故應甘下風寄巨山故人浮家檇李傍為愛修竹分僧房霏霏玉塵夢千里剡剡銀鈎書數行極知神潛鼻端白秪恐喜動眉間黃烟波莫久費吟筆好繪日月增天光次韻傅茂元二絶濠樂亭前花已披馬軍送酒故來遲只恐春雨卷春去紅染芳郊一徑泥酒興何如畢吏部詩情已過鮑參軍醉吟自足了一世肯羡飄飄出岫雲居仁報李季言論養生之益平生外騖已知非木枕藤衾老可依春半風光唯掩户病邊懷抱自忘機不知靜守綿綿息何似閒隨栩栩飛欲寄勤渠問仙李元關底處是真歸次居仁韻是身如樹槁窮冬一㸃心花自閉封久矣吹噓存泛愛偶於遲暮得相從頗聞妙用縱橫是深愧真源左右逢白雪黃芽計雖下可能無意起龍鍾送致明之髙沙三首忽驚風袂去翻翻老子吟毫強更援底事幽懷却成惡鵝峯一㸃入離樽不夢清淮鬢欲凋因君行色意飄飄鐡頭船子舊遊處三尺霜鱗鏡面跳棠棣隂中更唱和嘉賔助勇氣如雲勢孤屢欲拱降手恐辱髙沙小使君次韻新鄉諸公雪詩二首臘裏天宫未得閒重隂先殿晚來寒數絲綽約流空際一陳繽紛糝夜䦨已傍餘光窺蠧簡更消清液試龍團杜門自覺心神瑩老去追隨只強歡貪行璀璨意無寒不管飛花著鬢斑一假清光貽老境十年勝覽在家山遙知物外徜徉樂肯放毫端造化閒寸鐵不擕當百戰欲申前令愧辭艱大年三月書來許訪敝廬繼聞阻雨已歸近聞復有來意以詩溫之畫沙筆妙言猶在折角巾欹興已窮不見此豪春色晚至今遺恨雨聲中詞華端是補天手謔浪故存髙世風聞欲尋盟石峯下人生能費幾枝笻分茶公美子應預為白曬之約夢裡壺山尋二妙不因荔子鬢絲華聊分茗碗應年例故有筠籠來海涯鮮苞尚想妃子笑槁面何取西施豝老饞惟作耐久計一瞬紅紫真空花竒仲德華第二轉語皆有㫖趣致中乃謂僕操兩可於其間戲成長句不可無詩絶盍簮雜然嘲玩寄嘉音唯阿似是摸稜手虛靜初無照物心蓮蕩逺隂波面合堇峯橫翠雨中深頗能逐勝此來否一笑又成梁甫吟寄致中因溫前約故山歸路豈云賖憶對春風餞物華尚口乃窮憐反舌以年當廢惜殘花勤渠載酒傳非誤倉卒回輿事偶差今日重來緑槐夏已拌纈面醉君家原仲紅釀甚佳嘗有十壺之約小詩發一笑廣文挾書門户閉廣文置書樽罍開但欣引人著勝地豈暇問客從何來走浪畦風初緑稻屑塵村雨欲黃梅十泓琥珀今餘幾壘塊非澆不可摧居仁與季言論養生方往叩之而原仲詩有金花充膆之語乃知致中妙用如此近舍皇甫逺取居易豈不迂耶以詩請事紫微談道渺無津逸步超然嘆絶塵但向函關迎老子不知鄭圃有真人數絲雪髮神彌瑩一㸃金花意自春莫謂子衰難語此胸中勇氣尚輪囷致中詩戲論詩棋酒輒次原韻只應心醉六經醇自是陶陶晉魏人每向幽居橫素榻惟容我輩岸烏巾毫端空有千題巧枰上原無一著真要得坦然懷抱穩煩君澆潑乳泓春屏山集卷十九
