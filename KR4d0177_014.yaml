body:
  text: 屏山集卷十四宋劉子翬撰詩題大義泉移笻山未深切骨寒無那蜿蜒瘦蒼虬腳底飛騰過幽亭護石池庭事不敢涴虛中涵月淨冷面從雲呵去聲欲槌玄璧試恐觸方諸破平生泉石癡屢此箕踞坐重來照清癯白髮添箇箇凡心未痛浣老氣日以墮緬懷大義風絶唱寧無和悚然聽琮琤耳觀為之大同范智聞五月十四日夜賞月微風淨郊原暮色含清夏層巔月欲上炯炯木葉罅豐姿一髮虧爽氣千豪射流光不著地黃抹溪西舍翩然釋矯飛雲浪鱗鱗化常恐螺髻青失此驪珠挂竒觀天所吝老眼得屢借不嫌神太清跣立高梧下故人肯留連一笑偶良夜濁醪勿虛杯庭縞醉可藉向元伯寄爇香陶爐有心清聞妙之語鄱江細壤如凝脂陶成小爐圓淨姿色含三秋玉沆瀣韻壓六尺金狻猊明忩淡淡浮薰起故人警余良有以心清聞妙遊無方萬石只在吾家傍元伯居萬石鎮感白髮兒時坐澗石散髮如浮煙風驚緑鬅鬙意欲凌飛仙那知二毛見倐忽到老邊蒙紗猶鏟彩獵鬢強呈鮮星星倘未已遂恐華吾顚騎省歎遇合郎潛感迍邅萬古寄一轍長歌悲昔賢流光不假借志抱何由宣餘齡事可知已矣寧非天窮通各有待憔悴孰使然凄其稿梧畔惕若明鏡前靈膏豈能涅薅拂事可憐惟應幽室處一猛放萬緣嘗聞衛生要心白髮自玄同吳居安入開善四首遊松庵虛廊附山翔泉聲小庵閉齋餘恣行遨剝啄欣屢至午隂遇蘭芳夕照坐松吹徜徉無所為聊盡今日意宿省軒夜空合一寂擾擾息萬勞幽懷耿不寐孤燈側殘膏稍知山雨來聲在橫林高凄然却成夢夢泛秋江濤過報德庵循溪踏危矼路入篔簹塢森森翠櫺間一幹橫清雨茶煙日月靜石壁軒扉古盡兹北山旁小勝無遺取出山日日冬氣昏霜風不鐮面回輿始見山數點寒中現我行得勝友笑語生華絢如何劍峯南咫尺不常見次韻茂元獨速歌大兒行文學蘇黃暗潮無聲走茫茫小兒分題擬甫白手抉蟇頤取冰魄自成機杼誰如君悲歌乃有可憐色曉來春歸薺葉新青女摧之良不仁那知妙齡氣如許一睨辟易驚千人我亦歸為村裏翁接花成條欹屋紅跣行肯追蹀􅞃步杯飲不羡琉璃鍾相逢他事不發語醉面徹日承溪風君不見豐碑模糊立峴首又不見繐帷虛斟百眉侑何如吾儕見在身有口猶堪著醇酎陶陶兀兀未全非赫赫炎炎豈長有硯峯絶頂撫孤松伊誰及此蒼髯夀張巨山賦蠟梅因成四首取名慕橫枝要自同風格雖微調鼎味宛有金鉉色渾疑蠟作花貌野中抱幽冷香不盈階意盡仍一流尖蕚破微霜明犀透清暾不有朱紫繁那知中色尊今日尋此梅危行石澗東花神欲宣令萬鐸懸春風和李似之秉燭觀梅詩凍色沉萬象晴巔露皚皚通宵月觀夢夢破東風來小立值芳氣微尋見寒胚我病亦呼客沙邊久徘徊恍然驚老眼一枝印清杯應知塵意盡故向癯儒開謫仙愛逃禪兹心政難灰覘新不待晨燒燭寒巖隈草木有含章發揮要天才賴公管領春筆端起潛雷行夫寄黃山棐子有詩因同來韻老坡文中哮闞聲凜凛常如對英峙琅然諷詠興凌雲瞪若追攀顙流泚玉山妙唱久寂寥可與言詩有之子裁箋遠餉風露新坐我千尺黃山底初挼玄縠出冰霜小嚼清香泛忩几已輕魏帝昵蒲桃肯許唐賢魁緑李極知人口無正味苦淡甘酸各矜美不輕真識為品題此物初筵幾不齒青菁有用拔蒿萊白粲無酬腐粳粃士懷瓌瑋勿自神邂逅飛沉同一理子才超矣會曄然外澤中真期是以味果固已驅煩邪味道更須淪骨髓劉道祖江程萬邱順甫講易孟子拾其意為二十韻吾初讀七篇未領躍如義晚而窺大易稍解寂然意乃知平放著的的目前事盡心則無餘窮神忽超詣以斯印羣書拈出句句是君臣父子間運量周旋際體之則光明雜物了無纍偉哉此陳編孔孟心所寄有如撞洪鐘合響入迢遞言高聽者聵不絶僅如綴幸茲良友集一發萬古祕真長富辭原百折無留勢文通秉文均裁度取中制宛邱坐忘言袖手豈深閉鄙懷頓為空快若掃長篲旁觀二三子耳剽咸愕眙誘之循循然活處潑潑地氣質雖有拘學問欲如蛻時乎不再來過此恐少味大書鑱坐隅以起衰惰氣韓幹畫馬闕四足龍眠榻而全之吾聞兩臂天下重馬失四蹄將底用平生想似萬里逝對此惟心惻然動得非曾落駑駘羣踠脫泥塗良已勤又疑逸氣厭拘係絶蹯徑欲超浮雲諦觀事乃不爾劇破練丹青老無色軒昻自有尊足存顧盼一株隂山碧韓生筆法妙此圖龍眠榻出了不殊斷鼇自昔徒聞説續鳬雖工計已疏何如染作滄江遠要看追風蹴微雲次明仲矼字韻詩頖宫德厚仍信矼北扉筆力談笑扛重圭疊璧凛羣視不使東甌成陋邦日邊時見召仙李林下那容棲老龎故園此日成勝聚歸夢不泛瀟湘江萬畦流泉裹雲屋一點遠岫低吟忩客來有酒輒均醉長嘯手拊高梧幢挽蔬唯便玉本脆碎鯉屢惜銀鋋雙伊余於世真長物掃迹自分逃崆谾驟揄揚之則過矣豈有骨相當竒厖左提右挈倘聞道一了快若船下瀧極知魯衛兄弟國邾小尚許趨風降嶤嶤岌岌正壁立濤瀨未敢輕舂撞寄致明兼簡余時升篔簹有利材要自為本觀緑虬挾春怒穴土氣已完達士審所施窮士審所安癯劉燭人鏡偽態了莫干常吹噓二余傳以摩雲翰大余㩦書來一見意已殫似為殊勝搖胸中衮濤瀾皴膚褫厚襲枵腹拾衆殘那知藝圃遊宇宙自爾寬黃間跳鏃易省括眼要端幸公調護之無使困所難鵝峯橫几上晚翠深作寒徜徉有真樂未應悔儒冠次韻明仲祝融散仙在西溪此老平生無町畦一日不見十日恨緑稻渺渺吞幽思細紅時澆壘塊胸跣行笑逆泠然風意消萬事如燎髮小醉扶頭須半月叩梧林谷為呼號隱几乾坤有超越自憐頑鈍不可鞭挽之欲置名流邊長言為我澡袢暑灑目萬線琮琤懸入白水懷士特溫其曉山隨意開夏氣含露澄扶笻過巇嶮飛仙亦凌兢松濤淨可潄嵐煙起如蒸巨崿轉鼎鼎危塍上層層悠然瞻眺地髣佛記昔曾是鄉雖窮深泥泥秀色凝高扉靜相對招邀足嘉朋宴席覆大斗吟忩曄華燈于今安在哉骨冷喚不譍軒軒鸞鳯遊驚颷失飛騰豈伊黃壤恨興言鯁煩膺含章不震輝憔悴非所應雖微三字顯要許二豪稱余衰怠好修故態了不懲倐爾念離索終焉愧瓌能噫嘻長風來躊蹰素蟾升及時痛自䇿迅彩不可慿胡明仲潭溪三日飲潭溪梧竹堆無地浮高蔭暑中猶未佳袒膊俯清深急雨翳幽芳空山落啼鵀村醪得舊燒時果出寒沉醺然三日醉是鄉絶呵禁巖風故吹醒逾逸嫌太甚人生唯一真擾擾萬緣滲斯遊不屢尋老境恐遂寢窺樽有餘波捫腹猶可飲淡蟾如曉色渺渺長空浸當夏景過清浮雲忽飛譖酣歌金石號慷慨君獨任㑭余酬對之袛作寒蟬噤吾唯善咍臺忘形卧相枕有懷溪石磊磊出溪光失溶溶呼童理新堰小駐萬折東素杙競駢立蒼皮堆已重誰裁一道天忽墮顧視中遠渌送鳬鶩餘兹上杉松微波且勿搖照我淡有容炎曦為變色爽氣排高空懷哉所親愛此適未遽同徜徉孰為伴惟有溪頭風時來翻素書頗似驚我慵騷騷復䇿䇿涉獵味正濃久而寂無聲無乃意自融却泛碧滄浪鱗鱗散遺蹤我亦隱几酣那能辨雌雄早飲柴椽百枝蔭方塘高梧老柳著兩行輕煙曳組適寒碧芙蕖釀出秋風香宿酲縈胸殊未快衝之欲引天潢𣲖戲投小餌向深淵錦鱗忽見空中挂篘清鱠雪更作豪坐客狼狽已半逃嗚鳴叢歌猶未徹兀睡聽作蜩蟬號次致明泉石軒詩韻天懷逈與塵囂背蓬萊屢踏金鼇背間披白夾過清湖爽氣涵空渺無外淡然愛此一泓竒散髮逍遙潄華滋尚嫌林影太凋薄斜陽射破碧琉璃遙知宣室虛前席良裘固非一狐腋他時歸夢想南飛瓌詞已為磨崖石借致明玉槌事藥復以小者易去因而銘之潤色瑳癯身橢飛石塵供藥裹以小代大無不可汝雖眇乎實磊砢摩頂至踵轉衰我彼方歸卧留莫果魁梧之才用則左㗲然長嘆口侈哆寄魏元履世情事虛文十幅了一書片言倒肝腑子獨不佞余班班眼中秀學膽誰似渠平生幾兩屩踏破牛斗墟小言謁侯門大言呌天都歸來闢存室默坐追亡逋床頭著韋編盤礴萬古初時拈紙上語破的妙有餘已甘酬對難舌本噤不舒矧余在半流所見方糢糊蝸涎不自潤詎敢相霑濡人生強多知於己固已疏睫邊遺太極意上町六虛獰猿縶尚跳况乃拊檻呼是神非吾神滓穢政可奴嘗聞不遠復佩作三字符煌煌杏壇春一枝明清湖蜂蝶未全知佳處自不孤惟子先著眼時來採芳腴何當共叩微歸性有順塗新涼新涼為招客勝集非預圖前峯雨未散泠風繞吾廬披襟沐清駛合席隨霑濡定知喧譊中欲此一快無興來擴以酒草具來須臾田翁偶過我添杯坐其隅為言秋暑劇稻畦日凋疏寧辭抱􅜍勞僅給園中蔬喜兹甘澍足普潤無遺墟遙山莽難分緑浪搖虛徐我病不任耕嵗收仰微租蒙成每自愧一飽便有餘連觴使之釂醉語雜呌呼野人無他腸我輩恐不如吳傅朋遊絲帖歌園清無瑕二三月時見遊絲轉空濶誰人寫此一假竒著筆春風吹不脫紛紜糾結疑非書安得龍蛇如許癯神蹤政喜縈不斷老眼只愁看若無定知苖裔出飛白古人妙處君潛得勿輕漠漠一縷浮力遒可罣千鈞石眷余弟兄情不忘軸之遠寄悠然堂謝公遺髯凛若活衛后落鬒搖人光翻思長安夜飛蓋醉哦聲若南山外亂離契濶三十秋筆意與人俱老大政成著腳明河津外家風流今絶倫文章固有機杼用戲事豈足勞心神傅朋王逢原外甥也次友石臺詩韻清湖嵇玉山縹眇飛雙屐泠風隨處流三伏無赫赫未成玄圃遊聊醉端川宅憶昨陪初筵杯搖劍峯脊杉篁漏疏櫺雲氣縈長帟主人意彌厚不吝園蔬摘我亦洞幽懷涸此一泓碧至歡召融融叢慮消刺刺聽君誦九流浩若崑崙擘摩天俊鳶飛響澗驚魚擲分攜今幾時浮埃翳瑶席有如爛柯翁萬古逢一奕醉鄉梯磴坐坐覺乾坤窄兹行不果從兀兀恨滋劇未應柳源近終作桃源隔留詩友石臺光動嶙峋石正令謫仙來著語無以易強吟意悠哉追風了無迹胡明仲羅養蒙為悠然集追用前四疊之韻筠州喜陪笑語新鑾坡自來清湖濵更招明月作三客此外正復難其人瑶觴十飛才小醉追逐牢愁出肝肺吾儕邂逅非作豪常恐真歡來不繼更闌已畨四疊歌却喚輕舟浮綺羅一聲橫笛不知處荷氣苒苒風頭多玉山未倒誰之恥霜露霑衣聊且已維舟落月界平潭翠亂紅披扶不起十七日集清湖石堤蟠素虬捍此百尺灣臨灣喚客飲四座搖潺湲殘歊紅蕩析凛若超塵寰却愁涼吹多奪我酣醉顔時方雨聲斷草木凄餘澘潤氣騰晚水浮嵐撲秋山領略得妙趣心遊勝躋攀那知百年憂共樂此日間篝燈夜分歸危塍轉彎環芊芊稻苖風緑亂不可刪不礙一月流水丸走其間殷勤傍扶輿宛若送我還曉起聞明仲謁家叔嘗過門追已無及繼讀觀霧長句因次原韻公才凛若干將鑄膽落詩流失輕倨弄毫邂逅即揮竒造化玄機悉披露凌晨訪客忽飛笻雙澗徐穿碧交互笑聲只在竹林東夢破急追無復處是時秋霧正含空潤氣一解驕陽怒霏霏半掩景賢峯翳翳全沒村中樹初疑爭先摩玉壘驚塵漠漠桑乾渡又如懷渴望梅林細雨濛濛江左路煩公一吐胸中豪與此氤氲角馳騖可憐南山玄豹姿終以斑斑作身誤何如霧隱長暗然豈用毛采夸夭嫮霑濡稻壟更澘珠聨絡松岡尚橫素南箕忽哆遂雄吞顧視恍若南柯寤向來昧昧六合間日月山河但如故世緣所遇孰非虛不具真眼那能覷醯雞􅜍裏有全癡陷虎機中惟一悟我雖不獲從斯遊兀坐深觀亦同趣况知陶令有名酒未覺許詢無勝具便思追逐胡公墩恐激長言又生怖願低筆力許我陪韓孟才懸亦聨句觀胡文定公手墨因求别本溫溫文定公至道夙所欽神超雖緬邈餘英壯儒林正容閲真翰默默流至音不事八法竒天成寫幽襟有如瀚海鴻隨波自浮沉又如太虛雲舒卷杳莫尋乃知晉魏還筆端有哇淫棄藁競韞藏非將玩球琳庶幾字畫間可以求其心清伊一派流滙作萬丈深溝渠有暴盈淟涊時見侵投膠了不難公以獨力任我慚步趨晚悠然寄孤吟流風在目前著鞭要駸駸願分墨本餘刻之蒼崖隂大塊有動搖斯文無古今公帖云世間一切如流水浮雲所過者化不足留胸中寒中偶書寒從何處來凛色照閩楚挹之霜松下清淡不成雨豪生小病之一笑窺寰宇天轉隱江湖吾心正如許病中追賦遊武夷建水日夜淺清灘自迢迢漁舠愕已無忽點淨練遙老身寄其上兀若棲危苕松風知我狂隨舷助傾搖探幽神益新得快意自消長林翠洞口微雲粉山腰那知碧虛遠一葦卧可超不須換吾骸吾慵登岧嶤病中追餘觀所得絶富饒病中賞梅贈元晦老友梅邊無與談賴有之子至荒寒一點香足以酬天地天地亦無心受之自人意韜白任新和風味要如此次韻致明聽琴病中作病翁不咄咄琅然寄枯琴倘無枯琴寄孰表吾之心忘形豈知病道在寧復今龍蟠老樟下觱發搖長音過鄴中逐鹿營營一夢驚事隨流水去無聲黃沙日傍荒臺落緑樹人穿廢苑行遺恨分香憐晚節勝遊飛蓋想高情我來不暇論興廢一點西山入眼明屏山集卷十四
