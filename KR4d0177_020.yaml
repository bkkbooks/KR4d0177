body:
  text: 屏山集卷二十宋劉子翬撰詩致中招原仲遊武夷病暑冠裳與體忘一廛幽僻得深藏微風時度澗光活殘日忽無山氣涼但想子綦方隱几終慚南郭謾連墻何時九曲尋幽事船尾應須著漫郎致中手談見知胡漳州而竒仲未有定論了無勝負著胸中三百枯棋破老慵雲陳春收花脫樹雹聲夜碎月銜峯危機每憚張頥虎窘步休誇獨眼龍無復漳州賞新妙只應公論付吾宗次韻茂元茉莉花詩二首翠葉光如沃冰葩淡不妝一畨秋早秀徹日坐傍香色照祗園靜清回瘴海涼倘堪紉作佩老子欲浮湘三尺婆娑樹千英一律收眼孤猶眩彩鼻熟不知香向月資清潤承風發素涼衆芳如不忌移植近瀟湘同才仲入山有懷竒仲客至那容懶牽羣入翠蘿山光知雨過野色見秋多妙語時相奪微吟只自哦吹塤來獨晚此日恨如何寄行夫兼懷如愚珙已把重陽菊吟懷不為秋江湖三俊逺天地一翁愁日近書來少宵長夢不休吳雲猶可望時上堇峯頭致中相拉遊武夷有六耳不同謀之語原仲和章意似未平也再次原韻年衰漸涸玉池津擬乞明窗一匕塵底用趨風防六耳須知對影已三人髙情政喜追靈運飽學那容欠大春右挈左提俱有賴應憐懷抱久傾囷呂居仁挽詞三首粹美元功畀風流相國傳有光文聖道無物纍心淵侃侃當春氣堂堂忽逝川東萊一點秀冥漠楚山邊皓首猶貪學謙虛德益豐潛神無朕際悟物不言中雖處持荷貴常安捽茹窮笑談驚委蛻儒事有英雄江左欣初見傾輸便豁然挽留嘗一粥契闊已三年老去無新得書來每自鞭幽明雖永絶凛若在君前竒仲和致中棋詩有玄中一著是吾宗之句局上深機未足窮玄中一著若為通五宗惟明不是物三語孰解將無同常恨老懷多憒憒每逢益友太匆匆金篦刮眼寧無賴况是墻西有德公竒仲和詩有吸盡西江説是公之句南鄰袖手只如愚東里談玄亦甚都可是據鞍方矍鑠須防鬻璞得盧胡春空潮響來何自秋浦天容落欲無萬古西江只如許何煩呼吸費功夫吳公路作功德院記成同居安入山書丹淨坊疏寵自吾君盍有豐碑載策勳方見隳崖礱翠琰忽驚落筆散彤雲言言未索西山氣噩噩新摛左氏文從此拱辰非厚夜月明鐘鼓九霄聞子靜閲僕舊舉子文有詩因次原韻雪縠烏紗氣似雲搖毫不瞬已成文兒時追逐無三捷老去荒唐更十分木裏液樠將底用韶邉朋肯豈堪聞却慚鋟板能流惡一付焚如政賴君寄秀峯忠老髙鐘號月掩巖扉遙想幽人不夢時曾聽微言知見妙應憐懶我用功遲幘疏種種寧相貸窗靜山山尚可疑倘有一單容過客眼中須接秀峰竒轉秩奉祠蒙朝佐子靜慶以四六戲裁長句一嶺無情阻面談嗚翰忽墮得雙函抽黃對白雖云妙刻朽噓枯秪益慚小轉只緣官帶右雄飛無復夢圖南借留賴有天台侣老矣真成七不堪致明贈茯苓如嬰孩狀以詩為報老松寒不死密壤聚流脂小劚凌蒼翠深藏發怪竒應憐霜鬢客為寄玊嬰兒屑餌消殘疢同尋汗漫期次翁來借諸家易解聞已有新説以詩借觀天庭吐氣作青紅驚邏猶煩小試中政使著鞭無暇日惟應讀易有清風晝評一卦紛然異夜夢三爻廓爾通聞説新箋極玄妙可無殘賸到衰翁寄子靜有約來何晚行吟遡逺風老懷清似水雙鬢亂如蓬晤語非無得疏慵政略同秋來湖上集只是欠單公夢如愚珙驚破池塘夢宵長不再眠寒聲搖谷口側月到床邉一自芝蘭逺都無翰墨傳老懷安得寫孤韻不成篇食鵝梨三首寒烽夜滅楚淮長客舸輕搖度碧光北果初來珍重意層層般紙透清香拂拂鵝黃初借色涓涓蜜醴為輸津泠然一滌心淵淨熱惱無因著莫人雕盤一卵寧論價新帶中原雨露來却憶春行梁宋野雪花瓊蘂數程開次李巽伯韻蠟封泥印了不勤索居十載常念羣戀鄉寧飲建溪水懷友忽夢龜山雲間中意度不沾俗老去詞華全付君阿戎來歸得新語戲筆報謝非夸文送暐侍者之湖南茗碗深澆破别愁摻裾猶得小遲留不將流落遇知己故向艱難作逺遊春動閩山迎兩屐夜涼楚月趂孤舟相逢應説龎公笑黑頞黃髯萬念休次六四叔青字韻寫出吳中勝平生歷歷經露窺煙渚靜山入柁樓青老氣何由逸奔暉不肯停北潭搖夢否淥面照軒􅎉題慎儀餘清閣并溪取次得竒觀更舞新甍翠木端政喜間身時可到忽驚醉眼晚來寬故添山色浮嵐潤不逐湍流獨月寒散帙南窗更清絶興來只欲跨飛翰春興弱淥才勝舫危青更著樓管絃非老伴風雨定花讐兀坐還無味微行却自由只嫌詩作祟呫呫不能休時中良弼茂元慎儀集水閣水色兼山影漂搖小閣西風來幽囀活雨過萬紅低炯炯杯中趣喧喧枕裏迷新年一聲笑四友在潭溪致中晚集笑語北潭晚微寒入綺疏雨聲留篆霧燈影躍潛魚病間欲踈酒老便惟讀書喜君新隱地山翠切吾廬酴醿四首蒙籠春幰頂天矯赤虬身雨蕊猶緘暖精神照晚春斑斑心點紫疊疊蕚承冰除却橫枝韻羣芳盡與能獨立幽亭晚春風玉一圍殘英不著地去作嶺雲飛霜㽔薰碧醥氣味已相傳終以香為纍無人解倒懸寄張子平老矣張平子飄零客此州清樽如有伴白髮不知愁雨燕捎簾入風花擁檻浮夢中家在否歸興莫悠悠次明仲涼字韻浮暑熏人只欲狂秋聲未肯抹橫塘倦看黃妳渾無味醉著白練如許涼掃砌政須修竹舞蔭花絶愛巨荷張紫髯不是輕風景更擬回鞭向葛強晚飲招提聊駐屐却去白雲堆老眼看山倦餘懷向酒開晚涼微雨送秋意一蟬催醉裏揮犀妙方知有逸才次韻長汀壁間韻竄鼠驚殘夢蕭蕭老屋虗風聲傳逺瀨寒意入秋蔬客路漂搖久歸身憔悴餘西窗滿殘照髣佛似吾廬問明仲遊武夷日兀兀聼涼雨開門水漲川獨行楓葉底秋興鴈行邉老去無多事間知有勝緣何時縱仙舸我亦願周旋次韻文殊五言小雨貽新句端知印印泥凝眸方過鳥倚杖忽橫溪老態猶堪強真豪已覺低鐘聲隔林寺慚愧有幽棲次韻梔坑七言酒香渾若過新豐心事悠悠冷笑中徹夜道傍梔葉雨幾年馬上桂枝風髙情未許愁能挽歸意唯應夢可通準擬今秋剩追逐暗泉鏘佩月潭東次韻明仲幽居春來十首醉毫叵我落烏絲况是桃源乍入時秪恐升平要華藻賜箋春動萬年枝幽居十絶巧凌春我亦刳腸強效顰憂樂懸知不同調山南山北寂寥人一幅烏巾雪髮盈村深時聼鵽刀聲浪將蘭艾評春事我自平生小屈平歸來十六見新元種得黃楠繞舊村豈是翛然便遺物吾衰不復夢修門蒲團宴坐若還家羅縠如空了不遮可是春風搖得我蘭芳輕噀淡黃芽莫遣瀟湘雙鯉來歸心正怕曉禽催咄嗟新轉渠渠屋寒士歡顔正爾開嘁嘁鳴山笻一枝逄春聊復詠歌之故園風光本具足浪蘂浮花莫作迷蓬鬆衰髮倦重簪一榻惟便獨寢甘却憶少陵詩句好依然雲木曉相參近鄰分得續隨栽準擬新晴手自培不奈餘寒侵病骨鋤耰無味却歸來豈慚辛苦把漁竿猶有機心傍釣灘文定書堂最深穩何如袖手試觀瀾次韻六四叔村居即事十二絶桃花偏傍謫仙居點綴髙岩今幾株力士鐺邉欠何物著鞭跨馬是狂圖飯了呼童疊石門雨餘幽事不勝繁花殘不用深惆悵梧竹新隂又滿園偶隨流水到僧家身世渾如焦穀芽午夢不知緣底破篆煙燒遍一盤花聞道清湖别有春花邉玉笋想長身怪來幾日詩筒少盡寫瑰竒賦洛神潭邉春水碧於苔為聼泠泠溪畔來不耐顛風阻人興漁舟欲上又吹開蠲病唯應一日晴小窗螢度暗還明韋編讀罷聞幽鳥演出精微是此聲酒惡時來潄淺溪玉池汩汩自生肥逰鯈豈解吾曹意聊復蓬頭坐釣磯春來大半在農疇邂逅相逄皆飲流貪看暮煙馳萬桞不知明月上前洲庾郎食事惟三九適口方知味味珍擬欲招邀無此客虎頭不是箇中人遼鶴歸來本姓丁咿啞幾見弄文繃人間過眼事如許何用封侯羡頡羮屋角仙洲入眼明清風澡滌醉魂醒麻姑未必堪搔背薄相由來是蔡經幾許椎埋盡把鋤而今户户偃犀渠太平無象從何見一夜春風長碧蔬凝雲堂詩次文賀州韻君家遙借我家山我亦時來一笑看縹眇雲扶千疊秀空濛翠滴兩川寒已將老目供秋晚未覺豪心怯酒闌文伯詩無飄泊歎盡將幽抱付遐觀次明仲勤字韻苦無聊賴憶披雲曵杖寧知四體勤握手便成忘適適縱談終愧自聞聞浮蛆釀熟貽彭澤斫鱠圖成想右軍莫為冷風發歸興石峯秋月許平分次韻明仲贈六四叔之作平生一笑輕離别林下相從各壯年絶愛步兵胸壘塊更欣阿大語蟬連杖藜只作尋常出巵酒何辭一再傳燕頷虎頭經賞識定應接武向甘泉次六四叔韻筍輿沾汗每蒼黃今日追隨得快涼水落不知沙徑改風微如靳橘林香我緣新病仍添懶君不時來有底忙只恐家山誚人去十年秋興在殊方祝道人日供梅蘭偶成小詩二首病眼亡聊秪強回道人得得供新梅谷寒未必春先到幾夜冰蟾照得開野客分花入户間此心今合付翛然平生費盡金鴉嘴不負幽芳十七年梅詩呈六四叔一枝新白破長林定想霜毫落有神蹩􅍷若豫將底用猶堪卧護北潭春寄致明并紀惠鴈觀梅之舊稚劉於我最多情此日詩筒不絶聲孤鴈相依真得地早梅一粲又傾城向來蘭好知誰許病後霜林懶獨行小几清香慰臨别極知了了萬緣輕拙句謝伯逹老友贈梅發言吾過矣衛生無術誰之尤魯兀遊心聊自遣樂春舉足豈無憂次韻上梅嶺鞭粳紅入臼剪萊玉登盤是處喜相挽我來如許難沙清才㶁㶁陟翠入磻磻勃窣乾坤裏伊誰不自安詞驀山溪寄寶學浮煙冷雨今日還重九秋去又秋來但黃花年年如舊平臺戲馬無處問英雄茅舍底竹籬東佇立時搔首客來何有草草三杯酒一醉萬緣空莫貪伊金印如斗病翁老矣誰共賦歸來芟壠麥網溪魚未落他人後滿庭芳和仲明木犀花秋入微隂涼生平逺小山愁絶天南似聞還斷飛策遍千巖葉底輕黃纂纂惱人是微裂芳緘翛然勝清真冷淡無艷寄塵凡澄潭欹兩岸波光搖動碧影相參任西風十里吹度松杉我自寒灰稿木怡神處不覺醺酣歸來晚飛花無迹明月滿空函南歌子和章潮州二首卜夜容三獻徴歡極一時風流太守未龎眉放出筆頭光熖壓金閨藻麗花駢蘂清髙雪亞枝曼聲恰與貫珠宜聼此直教拚得醉翻巵伎倆無多子逍遙自許時間愁且莫著雙眉恰有梅香一點到幽閨寵辱棋翻局光隂鳥度枝頺然一醉是便宜擬倩潭風吹緑漲瑶巵屏山集卷二十
