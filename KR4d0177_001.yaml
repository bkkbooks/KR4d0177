body:
  text: 屏山集卷一宋劉子翬撰論聖傳論十首堯舜道之不明也闡之者晦之也道之不行也執之者拘之也聖人既沒步驟聖人者日益衆此甲彼乙不能相統心心有主喙喙爭鳴承舛聽訛浸失其本聖人之道散於百家蕩於末流匿於學者見聞之外有密知其旨者發而揚之衆必愕眙非詆而弗之信也夫其弗信也非叛聖人之道也陷於所長而不能反也故博以求約也而聰或陷之於雜思以索理也而智或陷之於鑿文以表義也而才或陷之於浮説以明疑也而辨或陷之於夸用其所長陷於所短者由失其本故也不覩其本各守其偏聖人之道始離互攻其異不反其同聖人之道始孤不有卓然英睿出焉孰能引而歸之會而通之哉夫道一而已堯舜之心不間乎此視聽言動必有司也仁義禮樂必有宗也堯舜有傳道之名而無可傳之迹後世聖人豈喜託虛名而強追遐躅哉必有受也書曰惟精惟一此相傳之密旨也昧乎一則莫知元本滯乎一則入於虛妙悅於談聽而不可用豈所謂允執厥中耶易曰天下之動貞夫一者也隨動而一非舍此合彼也且性外無物安得有二一者道也能一者心也心與道應堯舜所以聖也一之所通初無限量斂之方寸寂然而已感而遂通未常變易意形而自絶思正而忽無緩而不怠急而不危應而不隨受而不蓄此堯舜之心所以常一也心之不一因有見焉見立情遷莫知主宰違從欣厭之所縈拂憂懼哀樂之所移換事有百千萬緒心亦百千萬變頃刻之間不能自定求其際天地亘古今豈不難哉堯舜禹口傳而心受也三聖既沒斯道散於百家蕩於末流匿於學者見聞之外數百年湯出引而歸之會而通之故懋昭大德建中於民湯沒又散於百家蕩於末流匿於學者見聞之外數百年文王出引而歸之會而通之故純一不已儀刑萬邦文武周公口傳而心受也三聖又沒邪朋邪詖翼詖幅裂鼎沸莫可誰何孔子出焉氣足以壓其聲焰量足以吞其區穴排異如摧枯拉朽引同如川流海會其言有曰吾道一以貫之此祖述堯舜之妙也故河圖昧乎太極則八卦分而無統洛書昧乎皇極則九疇滯而不通春秋不知探本則責人而不責己是非之藪也禮樂不知治躬則事外而不事內觀聽之具也書非得於精微則政事之編乎詩非止乎禮義則葩藻之辭乎發明異用理則同歸此惟一之旨所以為六藝之淵源九流之管轄也有先知焉知則無先有後覺焉覺則無後學者學為堯舜可不明其用心哉堯舜之心見於從事者兢兢致道而已孳孳為善而已惕然如有所警勉然常若不及終日乾乾無少斷續安樂和易此心發之鄙詐邪慢此心拒之故一日兢兢孳孳一日堯舜也一嵗兢兢孳孳一嵗堯舜也日復日嵗復嵗焉洞逹流通與道不隔則子為堯舜乎堯舜為子乎蕩蕩巍巍復在吾目中矣禹私於家者隔牆樊而分比鄰私於己者隔形骸而分爾汝陋矣哉聖人宅心廣大一視同仁裸衣枵腹食如己飫溫萎膏憒醒如已蘇決非強為博愛之名也有生之類實同體耳禹視天下之溺猶已溺之何其責己太深切哉滔淫之害天實為之惻然不忍斯民葬魚腹中極力牽援此仁心之常也若曰昏墊萬靈如己所致焦心勞思胼手胝足逆旅其家惟愛人利物是圖無乃差過乎然而萬世無異詞聖賢共推尊者豈不以偉人所行無可擬議理當然耶因知泣辜祝網惠困思飢視民如傷無異骨肉者聖人之心不約而同也嘗泛論之兩儀既判萬彚受形人得其中物得其偏反推其原皆同所自是以聖人撫世雖有差别莫不欲愛利之焉草木昆蟲欲咸遂其生日月山川隂陽雨露欲咸得其敘誠以覆載之間一氣所運皆同體也何必疴癢疾痛一膜之通而後為同耶剪爪斷髮體無覺知是與草木土石何異然不肯輕毁傷者體之所生也吹為風呵為霧唾為濕呼為響怒為慘喜為舒皆吾身之氣也何自而來哉均天地之氣也人莫不尊頭目而賤足髀也抉之則痛均焉必失色營護之是尊賤之名異而愛重之實同也今笞其兒則心怛憔以吾遺體也笞其婢僕則心慘憤以吾屬也有毁其一錢之錐必失色營護之彼非遺體也非吾屬也特認物為己物故傷物如傷己也乃至一怒而刀鋸百生一饞而葅醢千命容態怡然曽視一錢之錐不若是何心哉人心無不仁一念之差不量輕重惟欲適已故白起發一疑心坑虎士如蟣王愷發一快心截蛾睂如芻俑李斯發一叨心橫尸四海楊國忠發一疾心激禍百年其端甚微其流甚廣可不痛哉可不戒哉孟子曰惻隱之心人皆有之彼有戕鴆灰焚及其至親而不少悔是曽虎狼螻蟻之不若而不可謂之無惻隱之心者同之也同之者何冀其反也彼有而不知有也私心勝之也然則何自而反其同耶有生同體初未嘗不公也各公其公私乃生焉私立則異好惡相攻其來久矣千形萬量皆出一私不撤其私未有能合其公而反其同也噫愛人利物如禹者至矣禹之心廣矣大矣孰測之哉人心之疵莫重於愛禹不聞呱呱之泣私愛撤矣縱而為欲又其疵也禹卑宫菲食私欲撤矣觸而為憤又其疵也禹不以鯀誅而廢國事私憤撤矣鬪而為夷又其疵也禹不以苗民逆命而逞師私夷撤矣禹之心如虛空木石無所染涅無所動搖而所以異於虛空木石者惟愛人利物之心獨存耳大學之道貴乎能定能靜然慮心常存也大易之旨貴乎無慮無思然感心不滅也慮感之心愛人利物之端也禹之所造殆謂是與宗禹之道有如墨翟得其大端而不明其用當衰周之時人各私己聞見陋甚翟唱是説於拘攣刺促之中學者翕然從之至與吾夫子并馳於世皆曰翟之心也是禹之心也其弊也胎而未形夫子默知之而不之詆也慮其日滋禹道遂暗使後世謂聖人所行其波流如此或得而輕議之乃立言曰禹吾無間然矣蓋禹雖一視同仁而納五典於臯陶陳九功於虞舜其於藩飾等衰之别固已甚嚴若翟之薄死過矣故明禹致孝乎鬼神翟毁禮過矣故明禹致美乎黻冕大抵皆指其同推其異所以約其失而歸之正也其後翟道益猖風俗大壞孟子出而排之同於仇敵尊禹於三聖人之列而承其道焉噫微孔孟則禹墨同流玉石難分矣易不云乎差之毫釐謬以千里學者可不慎思與湯學有三上焉汲汲然其次悠悠然其次懵懵然夫懵懵者非不向學也心未逹也誘而逹之矢去川決安知懵懵不為汲汲也耶故悠悠者最為害道既已知之玩習為常始焉色受聽竦終焉意銷氣沮因循茍且一暴十寒雖皓首沒世猶夫人也吾觀古聖賢之心異運同轍然而進修之速未有如湯者湯之盤銘曰茍日新日日新又日新夫豈有瞬息悠悠意度哉樂善如貪契理如亟聞非如獲利捨過如遺蛻德必日新也日新之學非踐履純實不自覺知彼謂聖道一言可契非由階級不假修為以日就月將為初學以真積力久為鈍才是自誣也孔子曰有能一日用其力於仁矣乎憫學者悠悠之嘆也且有所思也有所欲也有所畏也有所矜也皆心之纍也思道則能化其思欲善則能淡其欲畏義則能安其畏矜志則能靖其矜轉纍為通惟其所向學者茍無是心何能亹亹求益哉望山者其高蒼蒼望海者其逺茫茫振屐而升蒼蒼彌高鼓棹而遊茫茫逾逺然後知向之所覩未盡也學之日新亦猶是已緝熙不已造次無忘舊習運運而消至趣循循而入欲罷不能莫知所以然而然耳觀湯之伐桀也排衆必往無少可疑既而勝之也則惟有慚德湯非慚於伐桀也慚於放桀而遂代夏也夫以應天順人而革命孰不泰然自居而湯愧恧之情默形於中不自藏匿而宣之於下以思自洗焉是其方寸之間常存警覺不敢自是故從諌則弗咈改過則不吝一言一動念慮少差隨即氷釋詩人美其日躋亦善知湯者湯因其所履著於銘言起居食息又以自警夫豈有瞬息悠悠意度哉雖然學者孰不欲一意於此勉強牽率而無日新之樂也至樂本全而不能久其樂者由世味分之也外樂之厚內樂之薄也故曰以禮制心禮者內外之衛也夫人心一也今曰有制之者是復有一心也蓋心之念有邪有正有妄有誠合而觀之皆一心也猶手有翻覆實一形也猶聲有笑哭實一音也心過則邪制邪為正心過則妄制妄為誠聖人不能使人必無過心而能使人常存制心制心勝則動靜語默惟吾是令過心不二制心亦無無意無我寂然常樂此湯君臣相告之言所以成其日新之德者也夫豈有瞬息悠悠意度哉噫湯生於衰世獨能上追堯禹下啓文武傳道於萬世者其用心如此文王天有力故行健地有力故博載日月有力故運照而不息惟人亦然矚洞幽眇目之力也聽别洪纎耳之力也握持運掉手之力也躍蕩趍蹌足之力也惟心亦然人知充其力於四體而不知充其力於一心心之力藏於恍惚發於精微失其養則凋耗弱懦不能勝微得其養則運量酬酢動無與抗心茍無力何事能集文王其聖流之冠冕乎何其力之大也商紂季世事之方殷以眇然之躬憂勤經理日昃而食不御焉他人觀之其中襟豈能頃刻靜謐耶然而不磷不緇養成聖德淵懿純一曽不以膠膠擾擾為妨自非􅋵之有道未易能也夫事物之交茫然自失小者出入而不純甚者放僻而不反於是有避世自全逺塵見獨者其心非不定也一有接焉又憒憒矣蓋力之大也由其心之精也以火鍊金則金精以事錬心則心精烏貴乎烈然謝事哉心之不精非特外物汩之也亦中襟受之也中茍不受彼將安寄均曰性也惟聖人能性其性彼不能者情雜之也均曰神也惟聖人能神其神彼不能者意雜之也情性神意混為一區若同而異若異而同遇事紛然迭為主宰烏知其為雌雄者蓋由錬之不精也是以方寸之地精之則為靈明虛淨之府雜之則為塵垢滓穢之囊慎其所養動無與抗故心有兼人之力者應對起居而不亂力又倍者喜怒哀樂而不亂又倍者死生憂患而不亂文王羑里之囚死生憂患之至矣而從容演易安時處順無異凝旒端冕南面而居蓋其平昔涵養之功正在事物變遷之際與之循習無所駭異也昔晉文公欲為襄公擇傅胥臣曰文王在傅不勤處師不煩非専教誨之力也彼言稟之於天從容自合云耳殊不知聖稟雖異未有不因涵養而成者譬之甘泉珍木滌其源則益清培其根則滋茂此文王之純亦不已也胥臣又曰若有邪質教將不入猶矇瞽之不可使視聽也既不知聖之所以聖又不知愚之所以愚絶學棄類傷教為大豫讀國語未嘗不嘆息於斯也且善潛心文王者莫如孔子孔子之聖固天縱之也而造次顛沛未嘗舍是自志學至從心十年一化大聖自修猶節節而進况他人乎周公聖人明為善之大端使人向焉而不誘人以利心茍有冀焉不如其已謙者盛德之事也易但言其終吉而已安而行之尊而光卑不可踰言之法也有曰自下者人高之自後者人先之意同言病行之有冀是計效課功也利心存焉出於矯激反悖其性有所歆慕益亂其真故無利心而為惡其惡可移有利心而為善其善日隳大躁靜其容大辨訥其口貪倚亷為地佞假真為媒非無善迹也利心存焉泯泯棼棼多見資吾術借聖言以濟其私者矣周公吐哺握髮謙之至也豈以此來天下之士而沽一時之名乎非也何為拳拳勤勤若是耶成其已也易曰卑以自牧謙之妙用也周公所行也豈有利心哉周公曰君子所其無逸孔安國以謂所念德其無逸豫凡人之心念念相承循環不已在於德乎則意消情淡常樂其全茍為不然則念念縱逸滋蔓難圖倐然生於毫髮之微紛然成邱山之積甚哉此心之難馭也時焉不存之則躁動輕擾惟欲飛揚日焉不存之則桀鷔橫肆莫可馴伏逐物從好急於兩絞故君子戒須臾之離造次之失他人則玩嵗愒日終身弗反焉原其所由皆自一念之逸譬之良牧夫其所以化頑耎暴御駻消很者必有術也善牧畜者謹轡勒於未放之時善牧民者嚴禮法於未犯之時善牧心者攝思慮於未萌之時良心之放必有端也慮端不能弭必形於言言端不能弭必見於動動端不能弭必流於過過深於動動深於言言深於慮是以意防慮如撥口防言如遏身防動如奪行防過如割其發淺其制易其形深其制難捻滔滔於潤土滅赫赫於焦薪此君子平居自牧常持以謙之功也有持謙之功者其慮必直其言必式其動必宜其過必白慮無枝蔓之謂直言無背面之謂式動無悔吝之謂宜過無藏襲之謂白迹其用心非一朝一夕也溫恭寅畏常有以制於冥冥其始也角鋭抗衡若競若爭其中也勢緩力行或從或違其終也廓然同粹然一欣欣而大順周公進於是矣負聖人之才成天下之業光明盛大如此而驕吝之氣不萌乎中豈矯抑而然耶其處之有素矣學者有意於周公由是而習焉可也或曰周公萬古一聖人也果可習而能與今技藝至微也力窮人習僅有毫髮之進其出倫絶類得之自然者終不可近况聖人耶則將應之曰子所論者才也才受之天不可過強道德本於性性可習也夫性一也狂聖同之惟氣質之稟則異異者可同而同者初不異也雖愚必明雖柔必強此點化氣質之妙也知其可必而取必焉此學問之功也氣質之稟小學問之功大惟學者確然不以周公為邈不可及而自止焉勉勉孜孜力鞭其所不至則氣質潛化於漸摩積習之中而聖性復焉然後知造物之無物而物物之自造也孔子望室而知四隅者必超室表舉輿而知輕重者必在輿外遊生死而知其終始者必踐形理也魂魄之變茫昧莫測豈可以情識猜揣哉知之必有道也畏生死者未逹也逹者不畏焉不畏者猶未能踐形也常流乎四勝之間何謂四勝或曰存亦樂亡亦樂是齊生死也或曰聚則有散則無是泯生死也或曰名立不朽沒而愈光是輕生死也或曰安時俟命力不可為是任生死也齊泯輕任是四勝也簾窺壁聽髣佛未真姑立言廣意以勝之終為生死所囿昔夫子讀易三絶韋編於是原始要終知生死之説其於乾坤之藴幽明之故鬼神之情狀如目辨蒼素手數竒偶也然當時弟子微言奧義問答多矣季路一發問夫子拒之學者遂謂吾儒所急修己治人而已三綱五常而已身外之事何足預窮哉是知聽夫子之言而不知求夫子之心也死生亦大矣聖人豈忽之哉負手曳杖逍遙而歌往來之際湛然如此非平日有見焉不能也所以不切切言之者懼學者守易曉之空言而不聞至精至賾之道也故曰朝聞道夕死可矣是夫子雖不切切言之而常誨人以生死之大方也噫聞學妙矣其踐形梁徑與學者何言之淺也登堂親炙占畢領會固曰聞所不聞矣沒身勉勵莫際其極不幸奄忽於桑隂未徙之間政恐有惜乎之嘆也夕死可乎因知聞學之妙非口傳耳受目睹心承必有豁然開怡然順者故子貢曰夫子之言性與天道不可得而聞也夫剖石者乘其璺開鑰者透其簧義有會理有解浮聰蔽聰雜見移見弗省是焉口勤誦心勤記目勤覘耳勤剽映螢雪錐股髀童髦兀兀方寸不暫開焉聞性何由發哉豫欲無言其言雷震未之或知其知川決引學者於中立不倚之地可矣噫踐形固非易事得正之斃君子之終他人固有未能從容於此者矣揚雄有投閣之駭范滂有為善之疑大賢猶爾况其下乎蓋方其平日志充氣盛自謂了了及卒然當變無以應之盡失其素守矣是以學者不可不自考於未然且莫大於生死莫小於違順莫重於生死莫輕於夢寐違順之來怵然驚怖夢寐之間紛然錯亂莫知所主况生死之變耶學者未須論此但當晝驗之違順夜察之夢寐若湛然如一無少動搖則生死去來直猶旦夜茍為未然可不孜孜汲汲如拯溺捕亡以冀有聞耶顔子易説多矣學者多尚王弼弼唱虛無之説范寧以其幽沈仁義罪過桀紂而遺書不朽爭咀味之豈其著撰亦有得三聖之微旨而合於人心之所同者耶將虛無之説足以蕩人雖萬世而不舍也易有平白坦易之塗躬行允蹈便造聖人深處而學者忽之且言易如虞翻陸希聲深矣皆託異夢寄古人以開其説豈易果難言必有神授而後至耶不必爾也惟遵平白坦易之塗足矣易固多術或尚其辭或尚其變或尚其象或尚其占皆用也盡其本則用自應何謂本復是已嘗竊為之説曰學易者必有門户復卦易之門户也入室者必自户始學易者必自復始得是者其惟顔子乎不逺而復稱為庶幾蓋本夫子嘗以復禮為仁之説告之矣顔子躬行允蹈遂臻其極一已既克天下歸仁復之之功至矣固有之仁本無彼此迷而不復妄自分隔且吾身在天地中一物耳天地在吾仁中亦一物耳學者曉此方是想像説得仁禮意隔情礙如何天下歸仁惟踐履實地自然洞徹為一顔子終日如愚論語所載惟發二問一為仁一為邦夫子答之皆極天理人事之大者原易之用內焉惟窮理盡性外焉惟開物成務顔子盡之雖無諸子之著撰謂之通易可也文中子言九師興而易道微九師之前未有為易之説者豈易道本於踐履非區區言説所能至耶是知復之一義為平白坦易之塗聖人善誘之上機學者用心之急務也雖然學易當自復始而復非易也愚夫昧易才士口易賢人玩易聖人忘易玩而不忘易之病也忘似昧聖似愚通易者知之矣余嘗作復齋銘曰大易之旨微妙難詮善學易者以復為先惟人之生咸具是性喜怒憂樂或失其正視而知復不蝕其明聽而知復不流於聲言而知復匪易匪輕動而知復悔吝不生惟是四知本焉則一孰覺而存孰迷而失勿謂本有勞思內馳亦勿謂無悠悠弗思廓爾貫通心冥取舍既復其初無復之者蕩蕩坦坦周流六虛昔非不足今非有餘伊顔氏子口不言易庶幾之功默臻其極今我仰止以名斯齋念兹在兹其敢怠哉曽子孝為百行之宗行純則性通行虧則性賊二者常相因焉本同故也孝以敬為本而敬者修性之門也自天子逹於庶人孝之事雖不同同本於敬事親而不敬何以為孝乎成百善戢千非惟此心而已敬心而發孝於其親矣推於兄弟恭而友者是其應也推於夫婦和而順者是其應也推於親黨朋友恭而睦同而信者是其應也推於事君治人忠而恕亷而勩者是其應也是數也一不應焉非孝也借曰孝焉敬心必不純也海之支流必鹹玉之棄屑必潤中存是心發無不應也是知孝子之心萬慮俱忘惟一敬念而已視如對日星聽如警雷霆食如盤誦銘寐如几宣針坐如立記過之史行如隨糾非之吏不期肅而自肅焉念之所通無門無旁塞乎天地橫乎四海莫知其紀極也昔人有發塜而夢通齧指而心動者在其知覺中有如影響至於鬼神之祕禽魚之微草木之無知皆可感格非譎異也自然也敬心既純大本發露虛明洞逹躍如於兢兢肅肅之中此至孝之士所以行成於外而性修乎內也曽子之於孝也立身揚名惟此一節而於聞道最為超警生死之際粲然明白蓋由始則因孝心而致敬終則因敬心而成已驗其平日服膺念兹在兹而已啓手足則見於戰戰兢兢之時發善言則存乎容貌辭氣之際皆敬之謂也戴經所記奧義甚多首文三語已盡其要學者非弗知也然皆有愧於曽子者行之弗至也恭於昭昭者孝之名也謹於昏昏者孝之實也求其名匹夫匹婦能焉核其實聖人以為難矣曽子曰養可能也敬為難敬可能也安為難安可能也卒為難斯須之敬人能勉強至於能安能卒非確然自信毅然必為未有能樂其常而至其至也此無他疑情未除也學者之害疑情為大彼窮搜博覽惟恐不聞者疑情未除也朝咨夕叩請益不休者疑情未除也博量揣摸求合乎似者疑情未除也情既有疑則中不安不安則輕聽而易移輕聽則不能尊其所聞易移則不能行其所知二者交亂其間方且以禮法為拘囚専精為滯著求其有始有卒難矣曽子遊聖門最為年少夫子與之言道唯諾而已夫豈有毫髮疑情哉宜其成就巍巍度越諸子矣子思聖賢之言有六似學者不可不察也明易者似膚淺發微者似迂濶循誘者似祕吝廣譬者似支離直指者似陵施樂告者似強聒察其似領其要可以因言會道矣子思之學見於中庸一篇發明後進其心甚切章微析妙惟恐人不解了學者不能聞一而知舉隅而反泥於言語之偏中學幾於暗矣且未有天地便有此中人孰不稟是以生哉方其一性不虧真誠自守混然而已知者夸愚者賊然後中之名立焉外徇物內忘己然後中之本著焉情封欲閉篡其靈明久而習安認贅為嫡是中也豈遂銷滅破壞而不復存哉弗知有耳故以中為難知耶則昭昭乎日用之間以中為易知耶或沒齒終身而不自覩焉何哉以其近也目察秋毫不見其睫以其近也執柯伐柯猶以為逺以其近也近而弗察逺慕高竒或探妙於形聲之外或談微於意類之表是猶駕艅艎而索舟策飛黃而問駿豈不惑哉自昔聖賢講論發明無非此事口傳心受初甚祕密發端指縱使人反求諸己焉敬以立之誠以明之擴之逹之充之足之日就月將自強不息及其至也心融神會囊綻氷釋默爾自契焉世衰學弊子思懼斯文之遂絶也顯然論著筆之於書其言曰喜怒哀樂未發謂之中發而中節謂之和夫喜怒哀樂人皆有之窮以未發之前則茫然自失孰主張是耶孰施為是耶子思抽關啓鑰發其祕奧使學者洞然開曉如得其遺物自懷袖間豈不樂哉然喜怒哀樂與生俱生子思姑約此以明中非舍此而中可得也唐李翺自謂得子思中庸之學著復性三篇會理者稱其卓絶然差之毫釐異乎吾所聞矣其説曰人之所以惑其性者情也喜怒哀懼愛惡欲皆情之所為也情者妄也邪也妄情息滅本性清明又曰循理而動所以教人忘嗜欲歸性命之道也迹其推衍大約皆以滅情為言其言非不高妙然非子思中庸之學也中庸之學未嘗滅情也夫情與生俱生果可滅耶情可滅性可滅矣今持一葉以示嬰兒與之則笑奪之則啼此喜怒哀樂之端也情之所發也與生俱生而欲滅之猶惡水之波而涸之其源益流惡木之花而􅎒之其根浸傷聖人不過節之防之止之不使其爛熳害性而已善養性者不汩於情亦不滅情不流於喜怒哀樂亦不去喜怒哀樂子思所謂中也即喜怒哀樂以為中不可離喜怒哀樂以為中亦不可如金石之有聲如飲食之有味非合非離中即契焉故喜怒哀樂未發謂之中子思姑約此以明中非舍此而中可得也李翺滅情之論是并聖人於木石之倫棲學者於枯稿之地非子思所謂中也中契則性自復七情之生如臂運指如將將兵惟吾是使莫敢肆逸發而中節順理而和造次顛沛於庸言庸行之間動容周旋君臣父子兄弟夫婦朋友之際事事物物無非中者情何滅云孟子學者必有用心誠為入門偽滋情真滋性也虛為入門積生意化生神也克己為入門心勵心也致知為入門物無遺照也恕為入門求同於人也靜為入門撓而不變也敬為入門內外肅也慎為入門戢未形也聖人標指固非一途前學以流布後學以是進修孟子乃斷然言曰君子深造之以道欲其自得之夫以聖人標指拳拳服膺自應有至何復名自得耶自得者得之於心也心無所得而蹈規守矩終出勉強不能從容優入聖域是學也父兄至愛不能發其端師友至密不能進其道必也靈襟中啓獨見內融洞洞然屬屬然如平昔之傳聞想像一旦親睹焉庶乎其可也夫學者之心發於憒憒其見必卓開於冥冥其詣必至故拙魯愚鈍為道之資智巧聰明為性之障真志立於懦真習養於徐真用發於常真樂生於淡軒軒之志久必墮皎皎之習久必迹揭揭之用久必變沾沾之樂久必渝是以學貴終始也千了萬通愈失真宗惟循惟默乃能自得回之愚參之魯在孔門所得最深皆用心於無所用若退而進者也去聖已逺自得之學湮沒無聞非惟學者之失也亦教者之過焉六經之言毫髮分辨聖人之意極口宣揚諄諄屑屑無舉隅善誘之方將以利之反以害之學者亦曰如是足矣理盡於此矣拾前人之咳唾遵舊轍以驅馳故思學廢於箋解省學廢於譏議悟學廢於揣度通學廢於偏黨默學廢於領略敏學廢於疑二六學廢而道衰矣孰以孟子自得之言啓之哉孟子有自得之言無自得之迹但言居之安資之深左右逄其原而已不可以意義形容也檠唐大礪金砮可以射矣而飲羽之鏃非勇引蹶張所能習必自得於弓矢之外焉精毫染嚴程度可以書矣而草聖之筆非黝襟胝指所能造必自得於筆墨之外焉孟學孔於百年之後超然領會獨發奧藴傳一心之妙用發陳編之光燦神而明之使吾教益尊不膠於言語畦徑之末真聖門之輔佐諸子之英雄也使登乎孔堂其藴藉和粹誠若劣於諸子然其見處超詣直自不羣姑舍是之言非夸大也亦胸中自負不碌碌耳噫聖賢相傳一道也前乎堯舜傳有自來後乎孔孟傳固不泯韓子謂軻死不得其傳言何峻哉逹如堯舜禹湯窮如孔孟人類超拔固難儷也道果不傳乎顔曽傳道者也軻死千餘年果無顔曽乎時無孔子顔子沒於陋巷而少正卯為聞人時無孟子匡章陷於不孝而仲子為亷士人豈易識真哉蓽門圭竇密契聖心如相授受政恐無世無之孤聖人之道絶學者之志韓子之言何峻哉屏山集卷一
