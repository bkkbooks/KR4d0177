body:
  text: 屏山集卷六宋劉子翬撰雜著示六經堂學者汝心之休處此如遊汝心之流處此如囚此堂何有維經與史隱索周施於兹備矣誦書琅琅其神乃揚雜慮橫心聖言則忘講書默默精義乃得借聰於人終焉必惑視彼迅晷若弗云來今汝不勉則何有哉時習之說反身之樂瞻忽茫茫匪伊情度字朱熹祝詞冠而欽名粵惟古制朱氏子熹幼而騰異交朋尚焉請祝以字字以元晦表名之義木晦於根春容曄敷人晦於身神明內腴昔者曾子稱其友曰有若無實若虛不斥厥名而傳於書雖百世之遠也揣其氣象知顏氏如愚迹參并遊英馳俊驅豈無他人夫誰敢居自諸子言志回欲無伐一宣於聲終身弗越陋巷暗然其光烈烈從事於兹惟參也無慚貫道雖一省身則三夾輔孔門翺翔兩驂學的欲正吾知斯之為指南惟先吏部文儒之粹彪炳育珍又華其繼來兹講磨融融熹熹真聰廓開如源之方駛望洋渺瀰老我縮氣古人不云乎純一不已悵友道之衰變切切而唯唯子德不日新則時余之恥勿謂此耳充之益充借曰合矣宜飬於蒙言而思毖動而思躓凜乎惴惴惟曾顏是畏遺訓吾聞之糟粕捐淳精聚誠意畢芻狗除此言雖小可以喻大孰為學問之粹而益於吾身哉木稚而曲其老不舒人稚弗攻其成必愚故善學者必謹其初凡日用間業業乾乾散佚必恭執事必處中惟不自輕雖奴隸亦尊唾地如汙其畏如是寢則易安食則知味頮面奏圊脫襟屣履每每存之斯無過矣自朝至昏以一條貫焉勿謂末也本實由之毋悅於新毋駭於竒驟得必夸久而寖微習而察焉豈曰無徴出指於西底止必秦其次也頃刻之功初若不足外務奪之或斷或續及其至焉皆其所積故君子許其進而惰夫疑以自絶原有生之初愚知混混學如蛻焉其質乃變變非他知實由昔見存之則誠體之則仁孰明此哉聖心之純性本渾全或誤於末聞知誤勿執冥之則真斯言不守何多求焉棟宇雖充不如掩編如人有車身必自足弗軸弗輈則何以行凡初有聞果然自足嵬岸恣睢自離於曲可口之實出於凡木人或有言志善忘惡彼真不賢可助余之朂見賢可信信之不疑勿窺其小疵謂不足以為余師我信乃自益我疑乃自隳師乎師乎惟己之為溫故知新吾昔所聞與今聞合豈不欣欣如膏熾薪心源益明古人得善惟恐弗居如救火捕亡其敢緩諸茍曰此日如巳聊以優游則知終身無復好修惟人中扄泯泯棼棼以敬直之如風掃蚊一道通明振古如兹曰余衰矣尚識前言子其循之學必有聞跋浩然子吾黨有浩然子著書九篇劉致中以示胡原仲原仲轉以示余余讀之恍然惘然如叢脞如涉獵要其歸宿則弗畔焉三復而拊編嘆息也異哉有意求合於易耶易之為道非言語之可階非思慮之可緣百家傳注之學支離矣繫辭曰以言乎遠則不禦以言乎邇則靜而正變動不居周流六虛觀此氣象則易果為何物耶隂耶陽耶剛耶柔耶何爻之可指何象之可名耶在八卦之內耶超八卦之外耶非吾聖人發之所言之韙適得怪焉故夫子欲無言則曰天何言哉又申之曰天何言哉天下何思何慮又申之曰天下何思何慮申之者確之也自然黜聰去智默而識之於太極之始其背馳哉雖然學易者必有門户復卦易之門户也入室者當自户始學易者當自復始克己復禮顏子之復也夫膠膠擾擾者無非逐末復德之本也焦焦戚戚者無非妄為復則不妄矣是知復之一義為聞道之要言進修之捷徑學者踐之真積之久將有捷裂泮渙沛然流出於胸臆間所謂易者是自知之矣且隂剝陽復理有自然故曰剛反動而以順行非角力交戰之謂也世有求復孜孜勉勉弗能自克何其難也一性既蕩六官競馳本末易位誠妄相寇悠悠有生習以為常如久客之人安於途旅不知故鄉舊家有田園之可以棲息親舊之可以娛嬉一旦挽之使歸望望然而去之明了之士倘能識其本反其誠欣欣怡怡如疾風揚翎迅流縱航亦安而行之此順行之復自然之理也浩然子所謂回光背鏡其近易之復耶其得於復之順行耶如其然余將從之遊道同而相樂其意如其不然余將從之遊質其異而啓余之未達試梁道士筆善將不擇兵善書不擇筆顧所用如何耳南渡以來毛頴乏絶幔亭黃冠以筆遺余玉表霜裏視之皆觸籓之柔毳也束縳精妙驅使如意亦管城之亞匹焉耳因念神州赤縣半沒埃穢中或言南兵剽輕不足仗者而春秋吳楚之霸六朝晉宋之捷不聞借鋭於他方選徒於外境昔人云京口酒可飲兵可用豈用之自有道耶書生過計推此理於試筆之間庶幾㕙䨲之裔不專美於舊談組練之軍或有為於今日題尤貢明墨蒼官之英孕此馨德未獲麋捐聊守其黑沽之哉沽之哉吾將從管城子遊發潛光於六籍蒼庭筠傳此君之先出自震澤有號蒼筤子者與蒼頡同時頡觀鳥跡制字蒼筤子有記載之功帝皆賜姓命以字為蒼氏蒼筤子生篠禹修方貢以其材也上之其後有國封孤竹君生籊籊逸去釣於衛詩人詠淇澳以美之天下想見其風采籊生簳簳生庭筠母慈氏庭筠在䙀褓中已有竒骨濯濯如傅粉然及長清癯玉立七賢六逸皆從之遊王子猷最喜之嘗曰不可一日無此君世因以目之不名也此君性强項未嘗折節下人得黃老深根固蒂之術蟠隱林麓間與徂徠十八公新甫柏直臭味之同素相友善帝嘗特起三人俱至上林愛其風操遷直御史府拜十八公為大夫獨此君不受爵帝館於竹宫留以自近焉嘗訪飬性之道此君曰直心虛己至道自凝帝飲其言又嘗撫其腹曰此中何有曰空洞無物當容數十百人耳帝為之笑有說之者曰君有長材典樂府則簫韶九成直史館則汗青有日入武庫則羽鏃宣威薦宗廟則簠簋甚飾蓋迎刃而解盛蔑以加者也時方多難何不捐軀出力掃氛祲箠四境以成不朽之名而反韞其貞幹甘與草木俱腐耶此君曰鳳鳥不至吾已矣夫與其排雲呌閶闔披腹呈琅玕孰若樂行憂違確乎不可拔也遂使營嶰谷將老焉此君常齊居每歲惟五月十三日霑醉醉則外其形骸或為人徙置他所不知故當時為之語曰此君經年常清齊一日不齊醉如泥有時倒載過習池茫然埀墜俱不知晚歲益枯槁言無枝葉以蘭焚漆割為戒竟保其天年云帝思之命墨工圖其形像以張座隅仍賜號曰靖節處士諸子皆嶄嶄露頭角曰萌最爽美陸沉於世為識者賞味爭挽置之俎豆於諸公之間猶子曰篔苦節肉食者憚之其他支派繁衍青紫曄然居湘中者斑斑以文采稱居渭川者千畝致富時比之封君居武夷者幹弱而毛髯人以為蛻骨仙云贊曰善哉白樂天之言曰此君有賢人之槩四焉其本固固以樹德其性直直以立身其心空空以體道其節貞貞以礪志夫豈溢美之辭哉嘗聞斯人深造理窟或叩擊之默其妙詩云言念君子溫其如玊余宜其有為之執鞭而欣慕者矣髯戲有相者諗病翁曰僕閲人多矣寧馨殊姿噤吟怪形田面之龎鼎角之清固難以一二論也若翁者雖乏鳶肩燕額之竒亦無麞頭鼠目之陋然而􅀈滯言蹇局窮拘羇則多髯之纍也夫髯多則貌古貌古則神厲神厲則語不和語不和則交寡合交寡合則動無成宜乎翁之沒沒也亦盍鑷亂芟繁稍自矜飭乎溫而儼然霽而􅏌然肅而偃然發而管然夫如是則孰不爭先覩子為快焉左持右挈或挽或推謦咳之間山移海回慢子者加其敬笑子者止其咍運何塞而不開名何顯而不來竊胡為而安此翁曰嘻鄙夫樂隨正士自守子徒欲軟美求容而不慚我行之益醜也吾聞之君子修已者非無榮名之患而無素履之難我則不偶夫髯何罪且髮膚之傷前哲埀戒豈其敝之輕若辨髦相者曰天生百骸所以立我覘聆鼾號附臿挺朵顛連絡結龎􅀈侈哆爬義負荷揮隨踏柁惟人具焉闕一不可若夫髯也存乎亡乎皆可以生矣前則繞涿之譏後發毛蠧之誚苟利夫子必請去之何相撑距而自奪其便乎翁曰子觀夫有形之形而未識夫無用之用也易稱須賁其義尚矣扶疏郁紆可象之儀也勃拂䰐鬖可畏之威也緣飾英姿發揚徑氣偉人特士造物多以畀焉故黃者紫者鬱然者皎然者似蝟者如㦸者帛纒者綵編者埀至帶者儼若神者白晳甚美者布置勝人者於此不凡者能令公喜者是以蓬頭相商疏眉輔漢于思强宋絶倫霸蜀美鬚夸齊長鬛勝楚或抵几而奮或論事而張其剛毅挺挺有如此者或手將獻規或口銜伏誼其忠烈炯炯有如此者是既然矣子獨何患乎且貴賤禍福天實為之子乃謂去窮有政攀榮有梯謂機捩可施謂坱圠可移不已甚乎人各有能有不能若乃􅀈䙾俯顏嚅唲强哂偊旅望塵咿呦乞憐雖位三槐食五鼎馬千駟祿萬鍾澤九族宥十世吾弗能也相者趍隅如慚雅譙病翁掀髯為之一笑閒境志閒境志者肇闢乎方寸之間而莫知其涯際限之所接自有宇宙便有此境若甚遼邈曾不跬步至焉無炎凉之俗無風波之途如化國其日舒長如桃源與囂塵背如混茫之世無為而常自然真雅懷素志之棲寓埈行逸軌之遊歷也境內之人心和而氣平神靜而體舒不拘拘跂跂不營營汲汲閉聰明之牖息思之機灑濃厚之情停飛動之根喻良弨之解檠譬遒輪之繫柅然而篤於修勵者譏其墮役於智巧者誚其拙湛於靡麗者疑其矯非夫特立髙尚之人莫能居也昔許由嘗卜鄰焉其視天下輕矣伯夷季札因之以逃國顏闔子仲因之以辭祿位韙哉卓乎莫可尚已若夫坐忘寄傲之流閉關却掃之士徜徉乎竹林蓮社之間放浪乎草堂松徑之側曲肱箕踞長嘯微吟送日月於枯棋泯乾坤於一醉皆乘堅䇿駿有意臻其籓域者也乃有黃冠羽服壞衲方袍逍遙其間自立門戶曰清都曰净土蓋閒境之别名也自世途歆艷斯境榛塞或純盜虛名或指為捷徑一出焉一入焉誠未足與議今之人遊談賦詠挾以為高慷慨激昻若心將往者狐疑猶豫終莫能至焉豈以其淡泊無味寂寞難安故喜言而畏蹈可暫而莫久與余嘗熟遊送之者皆自崖而反也因述其旨趣以導夫來者修祖居上梁文有酒盈樽歸意不忘松菊惟鄰是卜吾儕皆有室廬眷此新居實循祖創面勢不改規模稍增闢洗硯之荒池易藏書之壞壁崇卑合度豐儉適中要須窗列遙峯何必門容駟馬爰居爰處無震風凌雨之侵載笑載言有臨水登山之樂鄰翁助力家圃徴材因舊則役不告勞從簡則用無浮費屬兹考室聊著斯文兒郎偉拋梁東庭樹春回泛暖風不費主栽栽種力山花野草自青紅兒郎偉拋梁西一帶人家盡枕溪間伴漁翁携釣去却隨耕叟荷鋤歸兒郎偉拋梁南因寨名山鎖翠嵐勝地已聞棲隱客連營不復駐征驂兒郎偉拋梁北一水來朝縈帶碧稍增石堰聚游魚更搭松橋通過客兒郎偉拋梁上擾擾塵寰聊一望倚樓詩興入雲高揮毫欲蘸銀河浪兒郎偉拋梁下接畛連畦多美稼為揀長腰百斛粳來向吾廬添小酢伏願上梁之後起居燕寢和樂安平百葉傳經綴高風於闕里全家遁世想遺跡於鹿門屏山新居上梁文望淵明之三徑久隔妖氛嘆揚子之一區已成焦土屬寇攘之甫定宜爽塏之圖更親仁善鄰重違梓里架巖鑿壁别有桃源矧兹鴈序之還尤急板輿之奉巨木浮波而鱗萃衆工執斫以雲奔豈無輪奐之雄我弗為也姑選林泉之勝吾將老焉戒事既勤落成伊邇盍有文辭之紀助兹閭里之謡兒郎偉拋梁東溫詔新開大國封萱樹長依春草緑蟠桃偏映壽杯紅兒郎偉拋梁西學士從戎萬里歸羽扇一揮攘醜虜蝥弧再舉定狂齊兒郎偉拋梁南鳳水縈紆接劍潭五袴至今歌惠愛折轅猶是警貪婪兒郎偉拋梁北一壑一丘吾願得莫遣移文誚隱淪何妨宴坐觀虛白兒郎偉拋梁上萬卷詩書樓閣壯為語諸郎更苦心仙燈㑹照青藜杖兒郎偉拋梁下鄰里欣欣陶美化好寬貸責活疲民莫閉囷倉圖善價伏願上梁之後人安土著歲樂金穰干掫不施豈獨吾儕之高枕帡幪所及俱回寒士之歡顏招劍文送劉致中五山之精六氣之英錬為神器電曄霜凝噫此非所謂干將莫耶者乎其隱於豐城也扄以堅珉閟之深壤劍且靜矣何自而氤氳氤氳發為光怪上摩星斗而駭動人耳目哉蓋物必有用用必因時射彩騰輝不能自遏非若瓦礫無知朽腐不靈終沒沒以無聞耳然殊珍上瑞初不苟合孰能感而致之自非厚碩忠信無愧幽明如張茂先者焉劍胡為而來哉惜其逢辰不競怨禍方新忠藎云亡王室淪沒嗚呼是劍也苟得其時使劉李用之必揮拂白蛇之卧使朱雲請之必齮齕佞臣之頸付之荆楚之客必喋血虜庭加之晋鄭之敵必三軍白首豈不壯哉觀其凜凜之風熒熒之質必不繞指柔必不自挺出必不為屬鏤以害忠良必不為含光以夸幻惑必不銘金字以䜟姦雄必不飾犀文以資玩好必不潛於魚腹以成窟室之凶必不舞於鴻門以快沐猴之怒倘不遇焉寧霍然變化蜿蜒於深淵寒瀨之中若將終身耳用則見不用則隱視彼良庖之刀族庖之刃刓蔽折缺歲月而頻更猶冀磨礪鈍澀以希一割之效者豈不萬萬相懸哉昔吳王闔閭鑄劍二陽曰干將作龜文隂曰莫耶作漫理茂先得之於異代欵識宛然跡其顯晦莫知所自豈在在處處隂有神物護持耶自吳至晋數百餘年而劍一出出不數十年而化去自晋至今又幾千矣異彩熒光一何遼落也豈象緯之學精研者寡莫能指縱耶將乾坤偉人世不常有無以召之耶抑神寶去來自有定數非可以歲月期耶方今風塵霾晦威柄倒置政須此物以畢能事吾聞白水之濵鵝峯之下有異氣焉亘天拂雲久而益耀方與博物之士仰觀俯察表而出之庶幾絶代之珍不陸沉於今日仍招之以辭曰寶劍來流天精百神觀三年成寶劍來光陸離瑩鸊鵜􅎒鯨鯢寶劍來撫七星蔑流英掩青萍寶劍來駭風胡譽傾城價論都寶劍來奉君王定四夷臨八荒寶劍來應時昌時乎時毋深藏溫公隸書銘公硯已瘞姦魂夜悸公墨霑池潛來湘纍假其餘聲所感如此矧公真筆劍㦸交倚挂之髙堂浮慮盡死我觀公書識公胸次天地輸誠風霜薦厲吐而發之兹其餘事公之立朝營營仇敵不勦其剛不披其殖障海一簣排風孤翮始訾繼斥卒伸其直世衰道圯喏喏唯唯有筆如掾微公莫使我銘其尾吁嗟已矣屛山集卷六
