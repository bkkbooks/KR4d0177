body:
  text: 屏山集卷十二宋劉子翬撰詩法石見李漢老參政我識今朝李翰林十年隔絶飛寸心素書每逢雙鯉得雲路欲倚長梯尋翰林昔參建炎政想見中興人物盛方圎齟齬不足論角巾雅有江湖興玉堂草詔褫凶魂丹陛陳謨發天聽介圭便合趣公還只今密勿才稀并自憐隨牒東南奔假道因得登龍門怪余髯面益老矣一笑問勞情彌敦僧坊蕭蕭逺闤闠豈料飄零獲清對牛行公舊居名尚憶王相宅曩日交遊幾人在濁酒青燈夢寐間九州四海煙塵內區區王事今有程暫見復别難為情長亭喚馬一悽斷璧月曉墮桐花城歸田聲色家有穽軒裳仕之囚𡨕行不知迷今將返吾廬愛慕洗餘習清虛樂孤遊亭亭隱仙巖迎人入雙眸稻色黃莾莾溪光碧油油佳樹殘照滿高穹亂雲流乍參樵牧羣辭氣不婉柔性有書史癖時逢甲兵休斯懷倘遂全曩志不必酬省拱辰山豺狼已煙銷言歸省先塋豈無消息至怵惕意自驚兵戈道孔由不折寸草莖神物隂有護凶威肅其獰敬瞻壠闕雲墮淚眶睫盈如承慈穆顔如聞謦咳聲道餘孤風存澤本遺愛成昔我罹禍苦結廬傍佳城哀慕寧有極忽忽時序更慚愧舊巢烏常繞松柏鳴士特贈筆書成癡傳成癖平生識字真無益筆扛鼎思湧泉何如蹶張強弩弦管城雅貺情雖重感此囏難拙於用君不見翠華南渡江江路八百里胡兒飲馬鏡湖邉不逢漢兵胡自止只今城闕多旌旗報國擬將雕面兒長星吐彗南掃北轉禍為福須乘時虎頭心事不能已勸君莫弄毛錐子諭俗十二首故園喪亂餘歸來復何有鄰人雖喜在憂悴成老叟為言冦來時白刃穿田畝驚忙不知路夜踏人尸走屋廬成飛煙囊橐無暇取匹夫快恩讎王法誰為守艱難厯冬夏遷徙遍林藪深虞邏冦知兒啼扼其口樹皮為衣裳樹根作糧糗還家生理盡黑瘦面如狗語翁翁勿悲禍福較長久東家紅巾郎長大好身手荒荒戰場中頭白骨先朽西村人漸歸撑住燒殘屋東村但蒿萊死者無人哭昔兹號富穰被禍尤殘酷二三里中豪喪亂身為僇遺骸悵莫掩飢鳶啄其腹豈無平生時意氣凌鄉曲錐刀剝微利舞智欺惸獨錦囊收地劵奕葉相傳續只今鄰叟耕嵗嵗輸官榖爾曹何顓愚人生固多欲何州無戰爭閩粵禍未銷或言殺子因厲氣由此招蠻陬地瘠狹世業患不饒生女奩分資生男野分苖往往衣冠門繼嗣無雙髫前知飲啄定妄以人力僥三綱既自絶餘澤豈更遙王化久淘漉刑章亦昭昭那無舐犢慈恩勤愧鴟梟寃報且勿論茲義古所標愚氓擾潢池艱難亦常態簪紳有包藏事異吁可怪豺聲久伺亂鯨戮終何悔遊言張凶熖巧諜移機會初如卵殼微跐踐悉糜碎養成羽翮雄飛掣韝繩外剪鉏淹嵗月螫毒彌疆界向來詰端由罪白不容蓋南冠囚載路東市誅其最隆寬俗與新僥幸汝勿再野人厭羮藜家有庖丁刀徒誇批導手肯念耕稼勞隱然肉山雄畏彼尺箠操春泥卧寒野夜月犁東皋辛勤力以盡轂觳禍豈逃誰無惻隱心鮮能勝貪叨蓋帷猶示恩况異犬馬曹扇馬嚴內仗貂璫侍宸閽哀哉里閭間刀閹逮雞豚放麑識忠藎母卵著格言矧利肥甘軀絶其孳息源難消愛欲心物物天性存逆情氣必戾順化生乃蕃誰開口腹謀無乃傷仁恩粵人多悍驕風聲亦惟舊兒童僅勝衣挾箠相格鬬藝精氣益橫質化心忘陋家饒喜稱俠世亂甘為冦豈伊天性然習俗所成就吾聞互鄉童翺翔聖賢囿隱豹弄斕斑攻駒發馳驟佩觽爾何知義方得無謬村南井欲乾曉汲盈瓢濁飲濁不足言奈此田畝涸咿啞龍骨響煥爛陽烏虐良農無他營辛苦事東作春苖何蔥芊秋刈何稀薄我雖食有餘念彼心不樂乞靈走羣祀晚電明霍霍屯膏竟未施天意自難度震雷霹枯松頑龍失其據浮雲三日雨盈畝復他注商羊舞未休旱魃消何遽稍寬人心切仰荷天恩布稻畦裊連顛挼穗給朝飫菜畦擢新萌蕩滌死羣蠧嵗儉民怨咨時豐家悅豫青青寒莠色亦復貪雨露茲鄉山水佳昔乃為盜窟吾廬已煨燼荒草牆兀兀牆東大梨樹惟此為舊物火燒枝葉盡老本更竒崛衆鳥罷高棲空庭失清樾鄰兒利薪㸑往往肆戕伐豈知昻霄勢長養自毫末寒堤孤碓在廢圃鳴泉出衡茅且經營霜霰莫倉猝未須葺吾廬且復修吾倉求安當卜居求飽當聚糧營生力有限先此計頗長去年稻盈畦避冦不得將新芽雨後白卧穗霜中黃鰥惸有飢色冦釁餘稻糧解衣易升斗粳粃隨風揚休嗟昔艱難喜茲嵗豐穰鄰翕為人耕貯粟不盈箱溪頭廩與囷纍纍已相望縣牆挂德音盡弛今年租旄倪發歡謡助達和氣舒皇恩施甚厚疲瘵望少蘇吁嗟吏舞文詔紙墨未渝借貸盡白著勾稽窮宿逋掊克倘歸公民貧猶樂輸量權徴倍耗夤緣竊其餘寧逢盜剽攘厭聞吏追呼盜姦久必戢吏姦無由鉏雷霆不言威肉食忍自誣故態勿狃習窮閻勿侵漁勿謂天聽高勿謂黔首愚清江行漁翁一棹老清波稚子學語能漁歌日暮沙頭寒爇竹雨餘船角亂堆蓑鬻殘小鮮仍自鱠湖海茫茫醉鄉內夜闌酒渴潄寒流月照蘆花上蓬背聽詹溫之彈琴歌鳴琴藝精非小道可惜溫之今已老玲琅一鼓萬象春鐵面霜髯不枯稿自言寡知音求我為作歌號宫韻角可聽不可狀錦腸繡舌空吟哦吾意其一氣之清濁兩曜之晦明山河之結融雷霆風雨之震驚包羅具七絃開闔造化由人心又疑夫堯禹之躬行丘軻之立言瞿𣆀之同歸百家諸子之紛然更厯千萬古此意不滅絲桐間滌除浮慮清蕩摩愁襟開琴之氣象廣如此欲媚俗耳知難哉寒缸燒涸夜向闌罷琴歸矣我欲眠夢跨冰輪出瑶海一笑碌碌瀛洲仙鵝峯居士以地黃遺病翁因為作引君不見咸陽之原涇渭之間靈苖叢生緑芊綿春風莽莽膠晴煙天馬嚼齕黃金涎渴噴清浪香浮川年深駿足宵騰邁目有神光破昏昧方經誇異倘不誣伊人服之功必倍君家種藥南山隅紫花褐實連庭除長鑱斸掘動雲壤婉婉盡拔生龍鬚飲之清醥觀其德宛如君子彌溫克浮沉詎恤世論量蒸曝益見中腴澤我年三十號病翁空齋藥杵聲瓏冬未能醫國慚君賜舊書且讀蠅頭字萊孫歌屯田詞考功詩白水之白鍾此竒鈎章棘句凌萬象逸興高情俱一時耆卿骨朽士特死澗谷錯莫無晶輝後生俊秀何其寡吾宗喜有萊孫者雙瞳點漆面如水一見使我心神寫讀書已通經學賦已知律只今年十三吐氣成五色驪珠出海夜生光突笴流弦追莫及人材有價誰能私不妨乃翁聊譽兒囊中彩筆今付汝往繼二妙聲名馳夢仙謡并引劉致明夢與七客遊仙胡原仲與焉其事甚異致明清修純實非夸誕人也因為作謡以記之他時二人凌虛誦此謡當懷所謂病翁者耶鵝子峯前波色清劉郎看山無俗情癯儒自昔有仙骨夜夢體飛如葉輕雲中不識朝天路雙童導我凌空去側身度巖隈盤盤復回回翛然意往形不礙石窟蘚竇俄天開乘槎夜泛牛女渡鞭鸞曉入金銀臺花深不逢人時聞佩環聲仙翁睡起方結襪見客坦易無崖垠擊蒙冀埀矜叩妙獲一言七情汩心心憒昏窒欲如水澄其源臼中㕮咀藥手撮仍見分旁有泠泠泉三潄乃盡吞駐紅却白非難事貪生慮死真愚計當時同遊七姓俱但記古月成胡字塵緣未斷不得留海風吹過蓬瀛洲覺來忩户𡨕濛曉玉鏡晶晶墮松杪雲際會劉致中紅綃千樹桃雪縠萬株李柘葉青青如鼠耳橫山渡口浪成堆認得劉郎船子來物情時事不須説且喜新嵗同􅋦杯少年鼻哂輕流俗斂鋭收豪今碌碌敝裘常帶客塵緇雙鬢不如春草緑東風吹愁入我心使我嘯嘆成悲吟問君底事久留此曷不聨鑣歸故林懷舊歌黃茅生煙暗村落浩歌無復當時樂鄰家酒熟逆鼻香一醉乾坤墮𡨕漠尋芳屢過埀玉軒義魚夜上浮清閣鬬牌擊鼓多伎倆我獨旁觀惟大噱驚烽入座歡難保幸得身存他勿道吾宗潛武卧空棺袞臣兄弟埋荒草當時醉舞向花下緑鬢朱顔各鮮好隙駒風燭尚須臾數子凋零不待老死生細事從渠夭莫學兒女相哀憐一忩容膝可終隱冦盜擾擾今連年王師誅鉏有漏網死灰熖熖猶思然憂煎過計秪自惱且但努力耕吾田夜過王勉仲家宿酒數行為作此歌遙林帶雪迷村疃伶俜一馬行無伴故人家住丁坂頭停驂邂逅成清欵犯寒知我猶空腹地爐然薪架紅玉花瓷湯酒欲生香竹外庖厨聞刴肉夫君不有中饋賢咄嗟辦此何神速酒酣意氣悲荆棘尚憶朱甍舊時宅豺狼得志竟何成至今人骨如霜白亂離少有闔門在漂蕩俄驚五年隔數畝荒田已失耕一間茅屋仍留客客情主意歡難盡短臘窮冬春欲近明朝分手更愁人且覆清觴莫留賸夏日吟君不見長安公侯家六月不知暑扇車起長風冰檻瀝寒雨重櫩邃屋晝生隂反易天時在談吐又不見五陵富豪兒炎天多快意雪縠曵輕明珍盤嚼甘脆蛾眉皓齒發清歌灑酒筠枝集蠅蚋何如野客歌滄浪萬事不理心清涼流金鑠石未為苦勢利如火焚中腸萊孫求墨并以詩與之何年老烏龍排山折其角漁人網得之澄淵起雷雹異物世常猜神光夜潛覺流傳嵗月深質稿紋斑剝漆簡射晶熒玄圭靡雕琢孰謂喬松煙能成此堅確晴忩試墨池雲霧生掌握只恐化蜿蜒飛騰入𡨕邈萊孫真可兒句法有家學贈汝囊中珍慚余鼻端斫劉致中惠瓜炎熇氣如焚塊坐惟兀兀劉侯惠甘瓜胸次㵼溟渤豐膚素浪浮翠理霜刀刜因思少年時窺園步清樾百金酬地主熟蒂香可揭鄙懷須一快聊效野人齕種瓜雖賤工愛護渠敢忽薅藝治其煩灌溉滋其竭自然子母繁翠蔓相連結種瓜誠有道養民豈無術噫余夙昔知此意未及物白水見梅憶士特去年看梅時中郎共開樽今年看梅時獨招中郎魂悲歡聚散誰作惱擬欲問春春不言送謝中瑩相别夢悠悠相逢歡草草送君躍馬臨長道十年憔悴向塵埃一假精神摧不老與純臣原仲溫其煮魚羮衆賔會高堂嘉魚脫重淵雙鰓尚呀呷緑藻仍牽連厨人起揎袖刀杌鳴鏗然斷尾頳縠碎批鱗玉花翩雲雷蓊深釜清泉已遙傳投蔥裂素絲裁薑落金錢陶甌舉筠箸更覺真味全細紋松江鱸縮頸槎頭鯿吾儕但知飽美惡無棄捐何論調羮手聊復試小鮮餘柑炎方橄欖佳餘柑豈苖裔風姿雖小殊氣韻乃酷似騂顔澀吻餘髣佛清甘至侯門收寸長粉骨成珍劑猶聞雜蜜草少轉森嚴味竒才用不專雖用何殊棄端如效苦言逆耳多嫌忌棄果事可傷違言德之纍悅口易逢知感茲發長喟打魚歌西溪觀魚仍開樽鳴榔隱隱沉煙村吾人豈有竭澤意澒洞四際魚龍奔驚潛初見穿亂藻亟遁轉覺迷深源向非驅迫羣黨聚罩䍡徒使波濤渾巨鱗足供數客飽銀刀瑣碎不足論吁嗟神物未變化暴骨砧杌寧非寃江湖萬里厭遊泳失地斗水能為恩臨流解網意亦厚誘以芳餌仍爭吞因悲搖尾向數罟豈異俯首縻華軒慨然投簪起太息歸思已逐𡨕鴻鶱潭溪十詠悠然堂吾廬猶未完作意創此堂悠然見南山高風邈相望賔至聊共娛無賔自徜徉海棠洲煌煌海棠洲錦樹臨清灣常恨灣頭風吹花走潺湲潺湲去不息花亦無由還醒心泉藤蘿撥不開石竇一鏡明攜瓢酌清甘漻然瑩心神我病不能酌時來聽泠泠懷新亭茅簷入竹低曠野時寓目寂寂農家春新秧滿田緑何時稻登場秋山響蓬朴宴坐巖青青椃樹林下蔭蒼蘚石幽人宴坐時懷抱忘其適不見暮樵歸寒山雨中碧山館春林繞舍青門館終日靜吾心樂有餘所寓皆勝境更鑿庭下池溶溶浸山影涼隂軒北忩何所見疏竹雜遙岑涼颷思有無虛簷動蕭森此興何由盡移床入翠隂橘林木奴困新移憔悴雪霜侵呼童剪其顚割愛慮已深會待春氣回青枝補故林蓮池蓮池一畝餘瀰瀰吞衆流花繁不近堤欲往無方舟不及池中魚隨波自沉浮南溪聊為溪上遊一步一回顧悠悠出山水浩浩無停注惟有舊溪聲萬古流不去兼道攜古墨來墨面龍紋墨背識云保大九年奉勑造長春殿供御龍印香煤旁又識云墨務官臣庭邽監官臣夷中臣子和臣卞等進蓋江南李氏物也感之為作此詩長春殿古生荆薈猶有前朝遺物在錦囊珍重出玄圭雙虬刻作蜿蜒態枯皮剝製弄幾刓斷玦精堅磨不殺吾聞李氏據江左文采風流高一代當時好玩不獨此器用往往窮奢汰徴工選技填御府不惜千金為賞賚治兵唐推英衛精治民漢許龔黃最惜哉取士不知術妙手獨得庭邽輩真主驅馳八極中荒王逸樂孤城內汗青得失更誰論尤物競為人寶愛嗟余視此真糞土事有至微猶足戒投文欲往弔江流幽魂未泯應慚悔入開善雙童肩竹輿兀兀如乘舟及茲朝暑微遠訪招提幽蒼山望中橫清泉腳底流所歷已殊勝况乃窮林邱僧房在在涼逢迎足茶甌岸幘幽鳥鳴橫琴素煙浮倦借一榻眠吾生復何求薰風溪上來虛簷散颼颼開懷若傾倒忽去不可留人間苦炎熱物外常清秋功名非所期聊尋赤松遊寄茶與二劉然松煮鼎山泉冽槍旗一水分優劣鳯餅推開雪照人花瓷啜罷甘潮舌大劉談天紫髯張小劉逃禪清興長會須酌此同翺翔或凌剛風九天上或泛弱水三山傍劉兼道獵劉侯好獵親馳逐指呼雙犬如奴僕朝衝唐石亂雲來暮聽潭溪流水宿何如著鞭走大梁我亦與子同翺翔今年獵叛醢彭越明年獵胡豝德光屏山集卷十二
