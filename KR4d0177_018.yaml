body:
  text: 屏山集卷十八宋劉子翬撰詩汴京紀事玉璽相傳舜紹堯壺春堂上獨逍遙唐虞盛事今寥落盡卷清風入聖朝朝廷植黨互相延政事紛更屬紀年曽讀上皇哀痛詔責躬猶是禹湯賢聨翩漕舸入神州梁主經營授宋休一自胡兒來飲馬春波惟見斷氷流內苑珍林蔚絳霄圍城不復禁芻蕘舳艫歲歲銜清汴才足都人幾炬燒空嗟覆鼎誤前朝骨朽人間罵未銷夜月池臺王傅宅春風楊柳太師橋御路丹花映緑槐曈曈日照五門開五王欲與民同樂不惜千金築露臺神霄宫殿五雲間羽服黃冠綴曉班詔許羣臣親受籙步虛聲裏認龍顔宫娃控馬紫茸袍笑撚金丸彈翠毛鳳輦北逰今未返蓬蓬艮嶽內中髙篤槈清香步障遮并桃冠子玉簮斜一時風物堪魂斷機女猶挑韻字紗萬炬銀花錦繡圍景龍門外軟紅飛凄涼但有雲頭月曽照當時步輦歸雲芝九幹麥雙岐盍有嘉生瑞聖時玉殿稱觴聞好語時教張補撰宫詞橋上遊人度鏡光五花殿裏奏笙簧日曛未放龍舟泊中使傳宣趣鄆王天廄龍媒十萬蹄春池蹴踏浪花飛路人爭看蕭衙內月下親調御馬歸盤石曽聞受國封承恩不與幸臣同時危運作髙城炮猶解捐軀立戰功梁園歌舞足風流美酒如刀解斷愁憶得少年多樂事夜深燈火上樊樓倉黃禁陌夜飛戈南去人稀北去多自古胡沙埋皓齒不堪重唱蓬蓬歌河漢如雲掃泬寥登東寒鐵響清宵竹窗驚破髙人夢門外駸駸萬馬朝輦轂繁華事可傷師師埀老過湖湘縷衣檀板無顔色一曲當時動帝王寄尚明學士短褐沉潛不近名只今長樂鄭康成酒中賢聖無多酌琴裏宫商一再行翰墨放懷新水石烽煙回首舊蓬瀛四愁不為思君作懷抱何因得暫平讀韓子蒼吕居仁近詩詩人零落嘆才難二妙風流壓建安已見詞鋒推晉楚定應臭味等芝蘭鴻軒意氣慚交吕鳳躍聲華敢望韓咫尺煙塵不相見他時惆悵隔金鑾題將軍巖昔年棲險人何在髣佛樓臺杳靄間事去長空飛鳥沒時清宴坐一僧間霜秋石壁黃金樹月夜雲濤碧玉灣杖策時來訪竒絶漁樵幽興自相關遊武夷山回薄湍流漾翠岑夷猶一舸縱幽尋幔亭落日笙簫逺毛竹連雲洞府深似有碧雞翔木杪誰將丹鶴寫巖隂神仙可學非身外多少遊人浪苦心致中惠瓜瓜疇暑雨亂花飛美質蠲煩喜及時蘇并筠籠香發越金刀玉手翠離披侯家昔見連阡盛賈肆徒誇厚貌竒珍重故人多少意臨風宛若對氷姿得天台命二首奉祠得請向天台清夢先尋紫翠堆借問劉晨今在否雲間應見耳孫來暖風環佩滿芳洲貝闕珠宫憶舊遊此日劉郎心似水桃花空繞暮溪流遊密菴三首半參樵徑繞危岑倣佛精廬若可尋怪底扶笻筋力健暖風晴日送登臨病身偏與靜相宜著意悠悠定自癡兀坐南窗了無語篆花縈處一星移幽興無邉未遽窮泉聲隨屐下寒空一秋夢桂仙洲碧盤礴才能半日中訪原仲山居寂寂臨湖屋湖風為掩門鳥聲幽谷樹山影夕陽村好事長留客雖貧亦置樽平生枯淡意去此欲誰論與致明對榻勝會嘗連榻還欣與子同一燈寒夜永殘夢雨聲中道舊驚身老談元了性空卜鄰今有約泉石興何窮登原仲茅亭茅簷聊徙倚落日見樵蘇過鴈飛何急寒山逺欲無劇談容漫叟逸興慕潛夫寸祿甘華髮人生底事愚送瓜與胡原仲呼兒急走送筠籃敵暑惟應此物堪一握青瑶含秀潤滿襟寒雪沍清甘搔園底用修鄰怨剪棘聊應益盜慚他日倘收遺瓣種離離虎掌偏山南菊青叢馥郁早抽芽金蕊斕斑晚著花秋意秪應宜淡泊化工可是惜鉛華輕煙細雨重陽節曲檻疏籬五柳家暮醉朝吟供採摘更憐寒蝶共生涯黃彥逹之衡山有詩留别因次其韻窮臘氷霜千里客此行何事更間關永懷契濶徒酸鼻無力吹噓秪厚顏鉛槧一囊身計拙烽煙匝地世途艱曵裾端向龍門去清夢猶應憶故山懷逺樓北樓南煙岫遮水光秋色淡無涯風驚枯葦連汀雨霜著寒楓滿樹花故人悠悠絶雙鯉别恨耿耿聞悲笳索居懷抱向誰寫古調一吟青鬢華梨尚想飛花照綺疏離離秋實點煙蕪丹腮曉露香猶薄玉齒寒氷嚼欲無舊有佳名留大谷誰分靈種下仙都蔗漿不用傳金碗猶得相如病少蘇築室旋剪荆榛出舊蹊架巖鑿壁啓幽棲已通鄰圃盡栽竹更搭飛橋南過溪蓮社昔誇廬阜勝漁舟空向武陵迷宦遊若勝歸田樂肯把軒裳換一犁絶句送巨山二年寄迹閩山寺一笑翻然向浙江明月不知君已去夜深還照讀書窗送原仲惆悵回車不可攀故廬猶得及春還遙知去路風煙好看盡閩山看越山致中惠瓜因成二絶句故人夙有瓜畦約走送筠籃百里間翠甒瓊罌才一握極知風味勝黃斑蔗漿溜溜香浮玉蘇米沉沉色弄金那似甘瓜能破渴一盤霜雪沍清襟勸六四叔卜居便合誅茅隱舊陂亂來吾里獨熙熙年豐禾黍侵山土地僻杉松傍澗欹涉世有求俱甕算歸田得計莫狐疑竹林杖屨從兹始二阮風流倘可追贈王周士逐客初從瘴海歸平生未識想英竒致身不負管城子報國聊將雕面兒舌在壯懷猶未已窮途俗眼少相知虎頭合是封矦相笑挽天河會有時杖藜亂後惟憂死無心問歲華故園依草莾今日見梅花閩俗嘗三飯僧房但一茶海瀕猶未穩更擬訪仙槎有懷十首滿空寒雨雜飛煙湖上先生擁褐眠借問茅齋容客否夜燈相伴讀韋編胡原仲結茅同隱水雲間何日柴車不往還憶得松林長嘯罷歸時明月遍秋山劉溫其山空墜石咽寒溪雨濕浮雲晚更低不見蕭屯劉處士年年清夢繞瓜畦劉致中當年册府仰才華一跌青雲萬里賖白首却來蓮社裏幅巾緇褐誦楞伽鄭尚明風驚枯葦白花浮欲下橫橋晚更留惆悵不逢吳季子一溪寒水帶煙流吳公路青錢學士妙文章便合含毫侍帝傍寂寂閩山餘舊隱憶君時到讀書堂張巨山松底柴門盡日關主人西去幾時還長鑱委地黃精老時有寒猿嘯硯山傅茂元馬蹴浮埃去路長相逢端欲問行藏未饒赤壁風流在且向何家醉碧香周元仲翁侯滿腹是精神三謁金門計未成却跨蹇驢遊霅上秋風雄劍匣中鳴翁德功曾訪髙人上翠峯至今清興逐松風籃輿夢想行山處白葛花開細雨中密菴山寺見牡丹倦遊曽向洛陽城幾見芳菲照眼新載酒屢穿卿相圃傍花時值綺羅人十年客路驚華髮回首中原隔戰塵今日尋芳意蕭索山房數朵弄殘春送六四叔之茶陵底用匆匆便據鞍離觴縱滿不能歡瀟湘萬里客愁逺鶗鴂一聲春事闌此去宦遊當益顯時來功業自非難似聞幕府資竒畫好借雄風弄羽翰蕭屯訪致中曉色隂晴久未分亂山何處是蕭屯荒荒日轉漁樵路靄靄煙生桑柘村勝地逢春聊駐馬主人好客為開樽平生夢想歸田樂正喜吾儕得踐言李似表見訪石磴荆藩隱薜蘿豈知迢遞枉鳴珂交遊耐久如君少邂逅成歡此夕多千斛敢求身後傳時似表兼史一樽聊和飲中歌雲鵬欲舉那留得南浦傷心又緑波致明擕酒來雲際有客擕家釀敲門訪病翁一春寒食過幽寺晚晴中嫩竹扶簷緑殘花蓋地紅牢愁賴君破歸意莫匆匆次韻六四叔蘭詩疏疏緑髮覆清潯漠漠微香起夕隂無復風流追九畹空餘煙雨暗深林誰分秀色來幽室獨寫遺聲入素琴還似髙人逺塵俗爭輝玉樹亦何心讀李忠愍文集英姿直節想堂堂不忍偷生向擾攘二帝蒙塵方幸虜六臣奉璽更朝梁身輕欲抗豺狼怒名在終同日月光曾與先君共褒録拊編交感淚浪浪同詹明誠傅茂元遊晞真館有詩因次其韻橘柚埀紅古觀秋歸途邂逅得尋幽晴沙散策隨山逺夜月回船信水流勝處無詩端可恨他時有酒更來遊相倍二妙平生友老矣襟期共一邱入白水次韻劉溫其詩南山北山舊經行諸劉相看如弟兄一枰圍棋果敵國五字琢句真長城濁醪粗飯有餘樂小几疏簾何太清我來徑醉未歸得卧對屋角巖泉傾宿士特山堂懷似表襆被重來宿山堂故宛然池清秋過月林靜晚生煙仙李朝雙闕詩翁閟九泉無因訪存沒搔首暮山前過致思新齋酷愛鵝溪水潺潺傍馬流落梅寒崦靜啼鳥暮村幽我病今朝已君家有酒不新齋最竒絶猶得少淹留約致明入開善不至二首喬松翠竹鎖禪關乘興時來興盡還懊恨劉郎招不得瘦笻獨自入寒山偶臨沙岸立多時淡淡煙村日向低幽事挽人歸不得一枝梅影浸澄溪宿回向寺清秋聊命駕細雨獨行山淺淡煙雲裏回還紫翠間病多新覺老心懶舊能間宿遍山南寺何曽興盡還次韻趙清獻隂字詩石磴雲房隱澗隂昔年清獻此清吟鳯池人物終難繼花縣風流直到今三尺翠碑遺墨在一林寒竹暮煙深平生景仰髙名久敢負他時直愛心次韻溫其種竹詩種竹應須我輩人茅簷對此可忘貧欹風帶雨看無厭淡夜寒梢畫不真青女侵凌餘瘦節籜龍盤屈更分身會裁一管招鳴鳳千畝何須羡渭濵次韻溫其見寄長句拂衣歸去隱巖扄世事悠悠亦飽經午夢溪聲搖户牖夜吟花影轉廂營已甘衰病安堯壤豈有聲名動漢廷好事髯翁每見過幅巾藜杖喜逢迎周元仲將出山有愁别園林後夜春之句因作此詩以留之山館春來特地幽岸巾何日不同遊花隨石壁髙低發水繞茅簷左右流叵我三杯真性適咍臺一枕萬緣休山中樂事端如許為底周郎不肯留伯勝文本袖詩見訪輒成長句奉酬盛意懶逐交遊户晝扄客來曵履亦逢迎舊知吾里多豪雋親識君家好弟兄瓜芋滿畦聊卒歲琴書一榻寄平生驊騮厯塊終千里俗眼悠悠未可輕呂尚書挽詩二首昔在賢關日雄飛接俊髦家因登第起名為諫君髙荷槖論思舊牙旗出入勞傷心肥水變遺恨激秋濤國步多囏棘忠誠誓翼扶據鞍方矍鑠罵賊已含糊義在光惇史人亡失壯圖因公感家世憤氣欲吞胡和邱斯行牧牛頌軟草豐苖任滿前蒼然觳觫卧寒煙直饒牧得渾純熟痛處還應著一鞭夜涼茅舍蕭蕭暑雨餘夜涼清若在氷壺一窗月上杉篁影便是人間水墨圖寄題鄭尚明煮茶軒三首六言過耳颼颼未歇裝懷憒憒俄空他日寧逃氷厄會須一訪髯翁黿鼎從渠染指麯車絶念流涎猶有清饞未已茶甌日食萬錢一點春回枯枿萬家譟動寒墟鳳餅龍團玉食傷心半入穹廬寄題陳良臣頤軒四首六言七事疑生何晏三爻夢感虞翻獨養靈龜不昧有人髙卧頤軒啼鵑底用流血渴水猶貪飲河勿謂山雷象淺人生口禍常多竒峯一疊兩疊亂澗清流濁流那識髙人勝處閴然心地能幽道醇泮宫識面德潤梓里知名相從固應未晚畏君難弟難兄胡文定公挽詩三首今代儒林伯聲名舊藹如不為簮紱纍常樂燕間居悟主承三接尊王著一書天胡奪遺老素業未全攄有意扶名教躬行語默中楷模陶士器藥石補天聰衡嶽鄰新卜伊川道已東傳經知有子接武大明宫奕葉論深契平生仰大儒淹留趨絳帳寂寞奠生芻忽見摧梁木悲歌碎玉壺尺書埀奬意提耳愧朱愚屏山集卷十八
