body:
  text: 屏山集卷十七宋劉子翬撰詩次韻蔡學士巖桂才應摛藻大明宫戯詠巖花屬意工酷愛清香凌鼻觀更欣佳句愈頭風移來已覺池臺勝賞處何當杖屨同不解小山招隠意巖幽歸夢遶青叢得冲佑命㡬年歸夢水雲間猿鶴重尋已厚顔慚愧君恩猶竊禄官銜新帶武夷山與温其對榻細雨南窓夜青燈對榻眠升沈嗟薄宦聚散忽流年失路誰推轂他時看着鞭竹林須欵集君亦暫流連和士特栽果十首桃手種桃花滿北山花紅艷艷照春灣不知何代兒孫老却見漁舟乍徃還李仙枝移傍小巖幽答遝名推第一流曽向清波湛寒碧甘𤓰五色但輕浮梅園林漸見緑隂濃漠漠輕煙細雨中底事望梅能止渴好將清影暎髙峯橘南北由來地氣偏凌寒松栢但蒼然踰淮種橘今為枳豈比中人性易遷櫻桃一樹含桃火爍空而今春獻隔離宫只應壯士憂時淚洒向枝頭㸃㸃紅石橊庭榴結實墊芳叢一夜飛霜染茜容萬子同胞無異質金房玉隔謾重重橙橙橘甘酸各效能南苞錫貢不同升果中亦抱遺才嘆有客攀條氣撫膺枇杷萬斛金丸綴樹稠遺根漢苑識風流也知不作清時瑞朽腐那闗故主憂來禽粲粲來禽味獨奢孤根誰徙向天涯好尋青李相遮映風味應同逸少家椑柿秋林黄葉晩霜嚴熟帶甘香味獨兼火傘頳虬浪褎拂風標那似邑中黔與原仲至交溪橋倦憩春橋午囘環翠碧重亂溪流背海新栁色欺松厭市常思野為官不及農喜逢湖上客談話得從容山源汩汩山源水分流去若馳有聲知尚淺得勢轉徂卑葦棘連荒浦魚蝦聚小泜起予湖海興惆悵念前期春望杳杳盡寒色乗髙望更迷曉晴山氣上春漲野橋低幽鳥啼無伴閒花發欲齊㡬多沈寂景醉筆為提撕書齋十詠筆架刻畫峰巒勢尸功翰墨餘鎖窓閒晝永髙卧數中書剪刀錯落雙刀合晶熒百鍊光剪裁皆在手終不露鋒鋩喚鐡號令行惟信人誰不我承舉烽諸國叛敲鐡小童譍紙拂拂兒雖草創日用最相親莫遣維摩室潛生庾亮塵圖書慚非蘇子佩聊置簡書間尺牘予慵理何勞汝汗顔壓紙獅子鎮浮須假重刻石作狻猊偶以形模好兒童競見知界方抄書防縱逸界墨作遮闌妙用誰能識心端筆自端硯瓶小瓶防硯渴埏埴自良工懷抱清誰見聊慿一滴通燈檠伐木收竒幹安燈創小檠勿誇能自照得助益髙明榰案木匠餘留片木榰案定欹傾不是乖繩墨人間地少平有酒誰家好事許相過有酒何妨醉面酡兄弟偶同詞舘逸林泉偏傍故園多晨鐘屢趂伊蒲飯晩艇時聴欵乃歌莫遣是非來到耳只應憨睡奈閒何過東陽小箔鳴機㡬萬家時清猶想舊繁華樓臺夜映雙溪月簫鼓春迷後坂花囘首十年真夢寐停驂四顧但風沙却過蕭寺無人語獨對枯林數暝鴉題葢竹廟雙猿嘯月寒巖幽陳侯故家官渡頭隂隂老木旗旌暗渺渺驚灘雲霧流九旅已荷本朝渥三鴈更忻同日侯我來瞻拜想遺直嘆息此道今悠悠遊北巖濺濺小水暗通池熠熠髙花亂出籬知有精廬潛寂寞更忻蠟屐共襟期茗芽未辨三湯試麥餅先嘗十字炊㡬許幽竒待知己品題政在一篇詩訪原仲布衣自昔有遺才白首窮經隠澗隈門掩青山朝暮色客來濁酒兩三杯鴻㝠豈復驚塵網鶚薦虚聞達帝臺我亦放情依一壑雲間杖屨喜相陪北風鴈起平沙晩角哀北風囘首恨難裁淮山已隔胡塵斷汴水猶穿故苑來紫色䵷聲真倔強翠華龍衮暫徘徊廟堂此日無遺䇿可是憂時獨草萊同原仲茂元致和入開善寒聲蕭蕭霜葉秋石路磽确穿林幽雲横逺岫若平斷風約小溪如倒流偶經名藍亦終日喜有勝士同兹遊移床果茗咄嗟辦曵杖欲歸仍更留原仲温其彦藻彦符致明集敝廬清樽勸客且留連亂後相從亦偶然三徑生涯鄉社裏一秋心事菊花前向來憂喜皆陳迹老去光隂逐斷弦懷抱故人今有㡬只因情話可忘年過天竺寺一徑聨鏕去身疑在畵圖林隂穿欲盡山靄近還無下榻聊盤礴裁詩屢囁嚅道人留客意片月出雲孤山館偶題水遶山堂竹映橋偶來塵意已潛消最憐曉日浮波影滿壁煌煌玉電搖悠然堂和致明絶句清霜一夜倒蒹葭放出湖光徹逺沙漠漠浮煙收欲盡晩風輕浪蹴銀花雜題四首積雨生秋意浮隂放晩晴鐘聲寒野逈橋影小溪清殘霞銷暝色新月長圓輝黄落樹滋本夜眠人息機簷溜停清㵼林聲息怒號水浮秋色逺山帶夕陽髙宿鴈猶驚渚昏鵶已着林野平雲散亂江動月浮沈道中㣲風收宿靄細路遶平皋石亂春溪急山寒曉月髙鳥聲時出樹花氣欲侵袍行役兼清賞驅馳未覺勞次彭資深韻林下相從多勝友誰如吾子妙才華曵裾所至成師席射䇿由來有世家意氣胸中千里駿文詞筆下九光霞郵亭一見傾懷抱投分金蘭不足誇奉酬少稷道舊之什少日胸懷輙自竒與君談笑叩天扉南宫試藝聨裾出上苑尋芳結騎歸亂後交遊今孰在向來心事已多違雙魚忽得平安信囘首家鄉夢欲飛宿雲際偶題榖雨都無十日閒落紅棲草已斑斑曉煙未散屋頭樹春漲欲浮天際山翠葢縈風沉逺坂漁舟驚浪落前灣鐘聲認得林邊寺歳歳籃輿獨徃還贈詹朝倚之子詞鋒孰敢爭他時雲路定飛騰客懷未免悲彈鋏文社遥知喜得朋舊隠生涯三徑菊夜窓絃誦十年燈長篇寄我情何厚欲和陽春愧未曾雪曉天㝠漠霰初飛皓皓山顔復水湄莫遣瑤林生染汙却憂雲路隠巇危寒侵夜褐樽前覺春入晴簷枕上知憶得梁園探花早十年淚眼看旌旗隆祐太后挽歌辭三首三朝欽母訓四海被仁風倉卒垂簾政艱難取日功仙遊暌懿範孝慕慘皇衷寢隧休華飾靈輀必返嵩諡易徽名正恩加戚屬優素心潛道妙盛化秉坤柔握璽終存漢為梁實配周願書班馬紀萬古播芳猷儉約身為率憂勤夀豈延鐘殘長樂夜目斷永陵烟歸馭應奔月餘勲賴補天傷心南渡日一棹溪江船徐大著挽詩二首韋經傳素業漢䇿射巍科史擅三長譽書讎九寫訛甑塵終寂寞雲路久蹉跎迅景崦嵫廹知君恨獨多方同傾葢樂遽起絶絃悲道向清朝屈心惟靜者知阻修綿酒奠誰續錦嚢詩宣室空思賈凄凉又一時次韻劉憲詩二首吾宗三鳯久心降一見端如渴飲江好客襟懷真絶倒封矦骨相自耆龎知名夙昔慚驚座袖手雍容笑斵窓豈謂詩盟容我輩啞鐘無韻若為撞已築髙城受虜降盟言端的有如江翠華囘蹕清馳道繡指觀風絶犬龎凱奏花鄉初卷甲詩成草聖屢題窓還朝有䇿裨聰聴納諫那憂以杖撞次韻温其雪侵凌臘尾近春前凍色㝠㝠不見天一洗氛埃終自潔暗催花栁為誰妍單衣窶巷無朝爨垂箔髙門有醉眠聞道江頭消息好玉旌瑤幟滿樓船次韻原仲幽居貴賤營營各有謀柴門晝掩靜幽幽讀書無效空千巻學稼雖勤少一邱感慨舊餘王粲賦棲遲今倦長卿遊幔亭莫失春風約我亦身如不繫舟次韻原仲竹夕煙浮野圃春竹過鄰牆石澗深深影風軒逺逺凉禪心敲有韻翠袖倚生香不有氷霜勁蒿萊到汝長書事三年玉帛走稽山萬騎凌江稍北還絶塞風煙連魏闕千官戎服立朝班皇圖鳯厯謳歌裏紫色䵷聲倔強間露布更傳原上捷王師早晩下潼闗客路客路經春雨淹留未得歸徑泥黄染屨林霧白侵衣直氣何由吐愁心只欲飛東風如解事吹夢落漁磯哭吕居仁暝目荒山裏攜家萬里來旅塋猶借地兒哭不勝哀裂甑妖難測藏舟事可猜大賢應有後天道信悠哉贈詹道人道人山北住鄉曲舊知名語妙初疑簡神藏久益清夜衾寒楮白歸舄兩鳬輕心靜皆仙境何勞欵玉京燕子燕子何光彩飛飛引衆雛營巢終老草解語只含胡賀厦恩非淺焚宫禍亦殊寥寥鴻鵠志嗟汝豈能俱秋意又見庭梧一葉飛物華心事兩差池百年未半老相逼四序平分秋獨悲過岸山川雲漠漠殘燈院落雨絲絲客懷料理須杯酒哭向窮途定自癡屏跡屏跡山樊避世喧晩風落日靜柴門寒泉遶竹通幽圃小徑穿田入别村散䇿㣲吟霜葉脱鈎簾宴坐碧雲翻閒中興味知何晩絶口名途不更言哭士特二首自古才難得斯人又早亡青蠅頻去國白首嘆為郎不覩遺書奏徒懷挂劍傷楚魂招不得南斗夜無光世緒風流逺鄉評譽望清苦心㡬傳癖老筆擅詩名已訝祥占鵩終憐夢泣瓊五峯雲外碧一慟見交情讀士特詩集誰將家集到書帷故喜風騷擅一時快讀秖愁雌霓誤流傳不但落楓竒唱酬濫許聨東野叙引仍欣得牧之生死窮途天不恤虚名安用日星埀燕子燕子營巢得所依銜泥辛苦傍人飛秋風一夜驚桐葉不戀雕梁萬里歸下灘亂石槎牙瀉怒濤滿船性命等鴻毛莫誇好手翻成誤寄語舟人穏着篙絶句五首目送孤鴻獨倚樓晩風吹淚更横流蕉花落處蠻烟碧六十三程是白州雙魚來自瘴江濵一讀家書一愴神見說炎荒風土惡可無神物䕶忠臣干戈擾擾恨何窮南北東西任轉蓬世事不堪長齟齬胸中賴有氣如虹喜聞歸騎已揚鑣載酒相迎不憚遙我是武夷東道主便同蠟屐上岧嶤竹遶茅簷水遶堦東風漸欲放春囘丁寧紅紫休争發待取山南刺史來寄蜀二首盜隔枝江逺人來蜀道稀亂離非復昔富貴不如歸戎馬心何壯家山願莫違阿圓從小慧解嘆白雲飛有客傳歸信愁懷得暫寛兒童占鵲喜鄰里借書看離蜀秋方半浮湘歳欲闌柴門頻洒掃夢想見征鞍野墅野墅驚秋晩殘年忽忽過海潮通井淺林日到窓多酒盡鄰翁餉詩成稚子哦人生行樂耳軒冕奈余何秋宵秋宵如許永兀坐思悠哉手誤挑燈滅情長皷瑟哀清號生竅穴皓色轉崔嵬醉覺雄心在流光且莫催春圃六言絶二首侯騎不侵南海好山多近吾廬醒歌醉眠任我朝奏暮召從渠南堂面山已勝北檻俯澗仍幽千巖莫非石友萬壑總是清流屏山集巻十七
