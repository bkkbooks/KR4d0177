body:
  text: 跋家藏劉病翁遺帖病翁先生壯嵗棄官端居味道一室蕭然無異禪衲視世之聲色權利人所競逐者漠然若亡見也熹蚤以童子獲侍左右先生始亦但以舉子見期而熹竊窺觀見其自為與所以教人者若不相似暇日僭有請焉先生欣然嘉其有志始為開示為學門户朝夕誨誘亹亹不倦其後先生屬疾熹適行役在外亟歸省問先生喜甚顧而語曰病中無可與語幸吾子之來歸也自是日奉湯藥先生所以教詔益詳期許益重至為俱道平生問學次第傾倒亡餘一日從容因出詩一篇見授先生性不喜書常時詩文率多口占使諸生執筆獨此與贈劉致明丈長句皆手書之其意可見也既又發故篋得碎紙數十皆平日省躬自勵之言稍以先後次為一篇命熹與同舍生黃銖筆之復取閲視手自更定數十字間不一日遂啓手足諸子姪乃共發其先所緘封遺書數副皆熹未歸時所留處畫庶事遍及遺孤復有片紙屬熹為作張公書末有勉力大業之語熹始得拱受而寶藏之以至於今不敢失墜然而躬行不力老大無成不能有以仰副當日付授之意抱此衷愧恨每念將無以見先生於地下今病已力何所復云始取遺墨聯為一編而序其本末以示子孫且以示諸同志使於前修景行之懿知所跂慕而又視熹之慵惰亡聞以為前車之戒也熹字元晦亦先生所命其祝詞具在以非臨終手筆别附他卷先生沒以紹興十七年丁卯後五十二年慶元己未五月丙申門人朱熹書
