body:
  text: 屏山集卷八宋劉子翬撰啓賀魯漕除直祕閣啓伏審拜寵楓宸升華藝閣屬公朝信賞之日增外臺待節之榮某官夙受眷知特膺時選方六龍之南駐視百粵為近籓協濟軍需實煩心計事尅期而取辦固非一端下不擾而告成斯為盡美休功藹著優渥宜頒清遊始歷於瀛洲迅召行趨於天闕某言念崇墉之邇俯慙趨謁之遲面賀無因心馳徒切到任與張守啓恭承朝命來佐郡符當大賢懷紱之初屬賤子彈冠之日叨恩有自託庇惟新某官操履端修器資閎遠有慷慨憂時之志抱縱橫應變之才早拜寵於楓宸仍踐更於棘寺釋之持議可重振於家聲由也片言實兼資於儒雅猷為藹著委任彌隆一麾臨荔子之邦千里被棠隂之化舊深仰德今幸依仁飛誠輒見於手書展禮將期於面覿謝鄧倅啓桑梓之封疆密邇久託為鄰萍蓬之蹤迹蹉跎未仰德表撝謙不間瑶翰先臨仰慙推恕以待人詎敢設辭而文過恭惟某官詩書雅胄簪槖名家才猷擅當世之竒議論發古人之奧屢專煩劇益藹聲華旋擢佐於郡符念未偕於人望士元試政已觀展驥之能景倩還朝行起登仙之嘆某退藏舊隱政竊餘輝修誠輒見於手書載贄終期於面覿賀李丞相年啓伏以履而後泰易推爻象之占正次於王史謹春秋之法某官三朝實德間世宗工申申燕居雖暫安於湖海几几赤舄終行歸於巖廊履此休辰宜膺殊福某一去門闌之久薦觀歲籥之更莫獲稱觴徒增善頌賀李丞相冬至啓史書雲物紀麟筆之五年復見天心驗犧經之七日某官精忠許國巨業濟時遇事見哲人之難以身任天下之重險夷一節出處兩全商鼎鹽梅夢昔形於帝賚周詩袞繡人咸跂於公歸履兹長至之辰宜納朋來之慶某職居佐郡禮廢稱觴輒布露於尺書莫趨陪於丈席賀新憲啓光膺宸詔榮領憲權當抱鼓之屢鳴恨繡衣之來晚某官當朝雅望濟世通才披淵衷特逹之知屬要路踐揚之夕猷為藹著委寄彌隆當兹多事之時出領持平之任論刑推恕寃伸畫地之囚稔惡必誅威懾潢池之盜方依鴻庇尚阻鳬趨徒引領於行臺敢馳誠於尺牘其如祝頌曷慶敷宣賀謝參政啓顯奉明綸入參大政人惟求舊宜居輔弼之聯民具爾瞻益見廟堂之重某官襟懷玊粹識量淵深騰聲譽於妙齡揭儀表於當世涵泳聖賢之道臻厥大醇發揮盤誥之文極於深厚久翺翔於禁從暫偃息於侯籓辰告屢聞民謡藹著世屬艱危之運朝思開濟之臣帝曰俞哉誰如公者趣賜鋒車之召峥膺宗伯之除位髙而色彌恭才大則任斯重果符睿㨂擢二政機忠讜在朝可沮淮南之議威名繼世佇收淝上之勳協濟中興益觀遠業某儒宫晚學海郡微官當整斾之來歸獲望塵而贄見屢陪末席欵奉清言側聞宸命之頒實倍常情之喜長裾可曳莫趨元禮之門闌短幅交馳深愧子雲之筆札回耿龍圖啓伏審髙軒壓境方竊喜於望塵專價踵門猥先蒙於折簡禮乖常分愧集微躬某官識量淵深風神粹美道術逢原而自得聲名欲隱而彌彰秀發妙齡顯躋華貫風雲際運熙朝獨步於要津父子傳經後學飽聞其餘論久翺翔於禁橐暫均逸於祠宫壯猷一鬱而未施雅志雍容而有在艱難避地仲宣聊寓於荆州密勿綢繆賈誼行歸於宣室瞻承伊邇慰懌何量賀宣撫李相公啓拜命行朝宣威南裔輿情均慶否運潛消竊以黠虜不庭兵無虛歲中原失御禍遍九州方困慿凌靡皇經理眷乃長沙之地莾為羣盜之區天誅以遠而未加凶熖莫懲而愈肆阻湖湘而自固據城邑以相殘固欲安之每軫淵衷之念其誰任此僉云舊德之宜某官佐佑三朝儀刑百辟總戎疆場遠過於長城決䇿廟堂匪資於他相念艱難而守節不變處進退而唯道之安久均逸於殊庭爰專征於外閫兼制嶺南之地更分麾下之兵幕府肇開坐致英髦之集戎旗所指遙知氛祲之清乘兹破竹之機孰壓建瓴之勢益隆勳業再任鈞衡固中興不拔之基為四海更生之福某猥居官守側聽除音知公論之攸歸竊私喜而不寐徒得君重諌密簡於帝心無以公歸願亟符於民望賀翟參政啓顯奉綸恩入參機政人心胥穆國勢增隆竊以季梁在隨強敵聞而不伐王導輔晉有識知其無憂歷觀世道之興衰實係人材之用舍天其靖亂時則得賢某官造道閎深挺材剛特飛英聲於四海結睿眷於三朝鼇禁再登共識王言之大虎符屢剖獨推治行之髙持橐有年挂冠未老起佐多艱之運薦膺求舊之圖三聘肯來人快爭先之覩一言默契上興見晚之嗟益聳民瞻進陪國論經濟諒行於素志扶持立底於昌期某未覲光儀逖聞明命進由儒術佇觀致位之榮闕寧愧書門之誚謝李參政舉知己啓夙荷見知常許成風之斫遽蒙論薦過形推轂之言揆實無堪近名增愧竊聞君以任人而逸國由得士而昌矧兹多事之時尤資羣䇿之助洪惟上聖務濟丕圖念皇祖之貽謨閲近臣之奏藁謂孟軻之言一善如宋王何若陳襄之引羣賢有溫公者遍咨邇列咸舉所知慨嘗膽以思危賴同心而底治想其風采方傾惓惓如飢渴之懷辱在搜揚宜得犖犖真英雄之士如某者自守拙直無他技能早惟經笥之耽晚悔儒冠之誤夤闕末宦奔走四方嘆州縣之受恩敢囏難以辭事豈期慰薦俯及庸虛某官黼黻皇猷權衡士類雅抱每存於謙挹清流皆喜於攀依品題所加名譽增重攬英髦而列上仰副旁招置愚陋於其間恐塵清舉出於過覆何以仰承某敢不蚤暮以思視履惟正途雖窮而益勵時苟至而則為奮不顧身誓不羞於前烈伸於知己輒自見於一言賀吕相公啓伏審某官顯奉制函入持魁柄凡搢紳有識之士莫不傾耳拭目以俟復平之期若閭巷無知之民亦皆延頸跂踵而起更生之望蓋以狄人之內侮實乘中國之久安二聖蒙塵纍年於此至尊嘗膽惟日以之思得非常之材叶贊中興之治某官閣下氣鍾英特德藴忠忱學博綜於古今識遍周於夷險值艱難之厄運荷密勿之深知肱股之力為多社稷之功莫大旄頭盡落無復彗於紫薇羲馭再升遂安行於黃道薦膺圖任益罄謀猷用能身任安危不以賊遺君父將壇暫建捷奏交騰周公東征既有四國是遒之詠宣王北伐可無萬邦為憲之臣還冠邇聨適觀遠業人神必將開泰夷夏咸以歡呼整頓乾坤實賴經綸之手光輝竹帛載惟雅頌之音某久託帡幪猥叨齒記念先公之在日嘗辱交遊偕同産以登門仍加慰薦况遇旁招之日適兹自效之秋其為歡欣實倍倫等到任與祖漕啓守拙杜門久卧桐孫之圃叨恩佐郡朅來荔子之邦仰由推挽之私更記帡幪之庇某官道窮閫域文富波瀾持身凛剛毅之風接士見溫恭之色早冠天庭之第獨深宸扆之知旋駕稅於杏壇薦參籌於槐府清聲藹藹要路駸駸獨當艱棘之時出領轉輸之寄蓋六龍駐蹕地益重於全閩而四牡觀風恩獨榮於故里俯憐疏逖曲賜吹噓某敢不益勵操修恪勤職守匪悅干時之譽庶逃竊祿之羞賀漕侯郎中啓睿恩中發使指外移顧休寵之惟均視光華之益遠某官材推英特識妙機深早馳譽於簪紳久踐揚於中外暫輒荆襄之節來持閩部之權易地皆然無施不可登車攬轡夙有志於澄清爾界此疆固靡聞於惡斁即觀奏計别佇圖功某自揣疏庸方祈覆護阻趨門而面賀徒伏紙以神馳賀新漕徐學士啓光奉宸恩遠將使指軺車壓境列郡趨風某官德宇閎深才鋒淬礪夙著清朝之譽薦膺當寧之知擢自州符峻持漕節屬寇攘之甫定念兵食之猶繁餽餉連年豈有紅朽之粟流移失業更多白著之科事固從權民實重困經畫政資於善計艱難庶底於昌期某託庇之初效官有守輒修辭於慶牘莫旅進於賔墀賀新任梁提舉啓光奉宸綸出將使指重摘山之寄委增衣錦之榮觀某官材應時需識周事變騰一時之妙譽結當寧之深知適兹艱難屢司繁劇巳懋飛芻之績更宣持斧之威事有甚難每責成於倉卒才無不可故所至而優遊暫弭節於周原行召還於宣室某效官有守趨賀無因嘗叨半面之知喜託二天之庇賀知泉州通交代啓萬里還期殊乏觀風之效一麾得請俾為將母之行已蒙吹借之私更忝交承之幸恭惟某官氣涵剛大學造精微皇皇王國之羽儀抑抑士林之軌則早逢盛際薦歷要途譽望甚隆共仰卿才之美行藏自信益知吾道之尊頃借重於侯藩復就移於使節上心簡在輿論攸歸攬轡登車暫展澄清之志簪筆持橐行趨禁近之聨某夙荷愛知尤深願頌門闌伊邇即諧道舊之歡景仰匪遙顒企告新之政代與趙提舉啓提舉博士器資凝遠業履光明清名夙冠於士流古道益尊於師席身膺臨遣增重使華幹山海之羡饒供國家之調給政資儒雅庶逹經權休聲已著於外臺召節行歸於中禁代與江給事啓宫使給事學窮損益知逹經權早登清要之途特注顒昻之眷優遊瑣闥備殫獻納之忠偃息藩方綽有循良之譽久兹均逸未副僉俞代與李丞相啓巖石具瞻久仰威名之重龍門阻越未親顏色之溫敢通咫尺之書少布腹心之藴恭惟宫使僕射相公道推先覺望重本朝孟荀為儒者之宗伊吕乃聖人之偶羯胡外侮艱危永賴於壯猶炎運中興螭廷首登於一相運化鈞陶之上救民水火之中險阻薦更忠誠自信出處動四方之耳目話言為今日之典謨卓爾元勳渙乎百世暫均休於祠館俄借重於侯藩周公居東既有四國是遒之詠宣王北伐可無萬邦為憲之臣佇冀衮衣之歸式符寰海之望某猥以凡末誤膺使令雖智力之自殫嘆事功之難立荏苒歲月之久蹉跎毁譽之間代賀范參政啓肅聞明命登用真儒國是所歸人心胥悅恭惟某官秉心端慤履道深醇皇皇天陛之羽儀侃侃士林之凖則頃從瑣闥進直北扉雖驟膺神聖之知實久繫中外之望審成敗安危之會罄論思獻納之誠伍符尺藉異太阿之倒持悍將強藩無四牡之項領由播告之旨不匿故遠近之聽咸孚是宜益聳民瞻越陪國論真才既不次而用素藴必度宜而施裁議於中何愧唐朝之內相指縱有自終為漢室之宗臣某奉祠屏處聞報後時望兩地之深嚴莫修慶禮承二天之庇奬彌劇歡情屏山集卷八
