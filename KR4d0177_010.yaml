body:
  text: 屏山集卷十宋劉子翬撰賦聞藥杵賦病翁製藥齊閣中杵聲琅琅然聽而樂之因作是賦窈窕兮曲房空桐隂碎兮𤣥雲濃藥杵兮晨舂重扄靜兮隱壠冬廓落兮小軒明麥風過兮緑紋驚藥杵兮暮鳴千巖迥兮散丁登觀其票姚沉著晶熒歘霍舉雖一握之微勢有百鈞之落如唱兮復應將定兮旋躍乍降乍升時散時合幽深如寫其凄厲激烈若舒其謇諤喧喧兮方震於廂榮闃闃兮忽沉於寥廓厭市煆之音陋鄙村舂之韻濁矧羣蛙之閙地徒蟈蟈而郭郭斯蓋古今未賞而病翁之所獨樂也翁方抱沉疴隱空谷坐胡床據槁木思物底於無厲殆口嘗於衆毒因神丹之揉練發員機於磨觸琅琅之中獨聞和焉自一而生盈萬而復徒耳煩於里巷亦腕脫於童僕衆嗤其强聒不休翁好之常若不足或曰聲以律和樂由心樂音效故桓筝融笛嵇琴阮嘯各寓興以怡神雖異趣而同調彼鐵中錚錚耶又何足資夫玩好翁曰木風嗚嗚如塤如竽誰為吸呼石流濺濺如絲如弦誰為擊彈不約而合乃其自然聲雖流而常寂聽若遇而非緣苟有當於余心又何必八音之變而與夫九奏之繁哉且賞音於淡者與道默契有見於獨者與衆必戻亦各從其志焉翁豈恤呶呶之議溽暑賦病翁筋骨支離當暑彌劇望雨於南齊之上拊檻而歌曰使天霣珠不可以清煩裾使天霣玉不可以消炎酷想墨蜧之躍淵快商羊之舞陸已而飛霾斷野細電搖嶽簾綃蟄潤柱礎流渥心煩寃而若糾思淫裔而增濁疑環居乎曲突乍窘跡乎重橐客有問曰溽暑何氣哉翁曰隂陽之爭氣也席威者窮而未沮鼎盛者出而見閉也隂出為垢陽來為復自一卦推之消長盈虛曾不離乎六也㽔賔之日隂一在內陽五在外而六者之運如星循於次如輻旋於轂向之微者益大大者日益蹙也肇於豕蹢極於龍戰貫魚以柔順履虎而驕僣蓋弱則隨强則暌隨則睦而安暌則競而危兩雄不並居終必為之變也方其爭也竒偶互生剛柔雜襲奔騰海逝蹇嵼山立勢均力等屹若勍敵初如秦晉交綏而返斾又似漢楚相持而堅壁彼瀜瀜潰潰者鑠為大焦熙熙曜曜者煦為蒸濕也其氣烟煴滃上聲濛上聲底滯膠􅀈淟他典切涊乃殄切油湙濡汨音日汙浥音葉被金石而消䎡音暖襲草木而萎薾天地汩音骨其清明日月昧其晶曄薄而為雷則隱轔呼入聲碌入聲喑噫嗢音揾咽旋空欲震鬱而不泄激而為風則䬎古獲切䬉呼獲切蓬勃燥冒翕忽揚汙發穢原谷呀呷厯庚而伏凡四五旬時猶未歇也客曰然則氣之為沴音殄厲者耶翁曰不然夫惟爭也四時之序乎萬化之機行也子獨不聞烹飪之事乎實水以釡傳火以薪熚炥烜列兮滋熾汹湧潏溢兮驟驚既山鳴而澗吼亦霧蓊而雲蒸靡堅革熟鼎俎之味成焉故水火不爭為㸑者怠麴蘖不爭為醪者壞輔弼不爭為國者敗斯言雖小可以喻大也客曰問一得三䝉昧曉然惟清論之慰沃斯煩歊之可捐者耶哀馬賦叛軍繼踵入閩驅竊戰騎過山嶺悉多殞敗余感之作哀馬賦嗟哉何閩山之險絶乎方井陘而曠趙視劍閣而夷蜀峻嶺標樹橫巒掛瀑岧嶤嵂屼縈紆阻復勢將平而驟起塗稍順而仍曲穴壁寄棧㳂崖轉躅晝倚石以傳飱暮捫蘿而假宿非戀土之邦人嗟此來而何欲棲危走險禽疲獸伏墮峻木之升猱礙層霄之飛鵠矧萬馬之南奔列長鑣而競逐訝四達之通逵忽絲連而線屬搶攘迫塞互相擠觸前顛後升平坑翳瀆􅋦哀結憤而叢徂萃萎者十幾五六焉幸而生者皆垂頭顧影低摧局促鹿駭麏驚鴟蹲蝟縮脊伶俜而卦露尾焦蕭而帚禿鼻咯乾埃肺傷芒穀望長坂以悲嘶想清波而浮浴癬癢瘡煩揩墻攄木集彼蚊蠅紛紜緣撲競咂穢而吞腥肆脣刀而飲鏃忽振體而驚飛去來遙而旋復慰已貪婪忘余楚毒當附驥而乞憐知汝曹之碌碌困甚隤豗憂同觳觫駕鹽車則躡足於黔中之步售屠肆則比價於遼東之肉悲夫吾聞之秦趙亘野燕齊迥陸數騎風馳萬夫鱗蹙旝影動兮鋒已交鼓聲酣兮戰方熟莫不虎熊龍姿雲鬃電目負甲士之千鈞望沙河而一蹴既却鋭以摧堅咸蹂都而踐國蓋時清則龜龍麟鳳呈祥表瑞獻圖負籙俾之排難濟艱雖獲千角而網萬翎曾不及夫一驥之足噫今日治耶亂耶胡棄兹而弗畜彼踶齧恃性駑駘共族渴飲天河之浪飢耗太倉之粟徒韉飾文繡轡搖金玉偶備數於六間氣驕矜而動俗責致逺之竒功必輿傾而載覆事既失而懲愆亦何勞於鞭撲悼汗血之云亡捐百軀而安贖舟臨川而墜楫車向塗而裂軸激壯士之興嗟誠可悲而可哭夫子曰傷人乎不問馬余何眷眷於此哉恐國威之未振驕虜之南牧也詩凉月凉月未出山浮雲半空白徘徊步軒窗宛若待佳客經林漏飛輝映溆生華澤及兹秋景清吾廬更幽寂殊觀發祕藏妙聽生寥閴營營息初機炯炯懷新得豈無平生心所樂已非昔天旋河漢動夜久鄰機息凄凄感庭蘭嵗莫霜霰集呼兒溫濁醪獨酌醉永夕渡淮鳴鼙渡長淮霏烟散清晨皎皎初日光照耀草木新橫林渡餘碧疊嶂開嶙峋移橈失向背烟波浩無垠兒童相櫂歌余心亦欣欣輕帆互相踰畫鷁映流津徘徊望洲渚悠然獨懷人樵漁有棲遁寂寞誰問鄰暮風翻洪濤魚蝦亦有神四顧天地黑孤舟恐漂淪山隂作地勢東南盡清江吳越分修途雜川陸游役念良勤相從二三子心期同所欣逢幽不暫憩何由解塵紛抗跡蹈竒石揚情矚流雲崇林擁密翠細草潜幽薰蘭亭訪舊逰昔嘗覽遺文有生憐共盡興懷豈惟君逍遙千載上逸興故不羣風流詠觴樂寂寞今無聞醉歌贈金元白南逰㑹稽今十年重來風物皆依然一時冠蓋零落盡故人獨老空江邉西陵倉曹實冗散出無車馬衆所憐江亭曵履偶識面凛凛瘦骨餘雙顴談兵自是一敵國屢薦不用寧非天胸中跧伏萬貔虎靜若女子容娟娟我家光祿新出塞羣彥入幕君宜先自言衰髮已種種豈復有意仍騰騫强飯亷頗思故國據鞍馬援忘華顛只今左臂雖小病尚想攬轡能周旋興來且酌杯中酒邉庭消息君知否經天太一臨坎位干戈喪亂已經久南閩兵敗上將戮太原城破羣胡守嗚呼國步危若此每惜壯士時難偶猝嗟未是真英雄綸巾羽扇聊從容何當矍鑠渡河去一洗塞北烟塵空獨坐獨坐髙堂上游觀思無極重門雖晝關逺岫如不隔長林葉布隂淺澗流波激欣欣物態榮淑氣生原隰幽禽感時鳴繞樹飛還集常恐逐驚飇無階戀儔匹興懷念良逰嵗月更相及佳人獨棄余何以慰岑寂褰裳迷所向望逺時佇立心知徒百憂沉思不能釋次韻盧贊元再喜雪使君新詩來不絶燦燦珠星聫璧月黃堂旌斾曉排衙喜見賔僚重賀雪寒儒茅屋補更穿雪餘仍值江風顛擬招鄰叟共一醉斗酒十千愁費錢南枝又見新梅蕚試尉春衫冷難著飄零節物易驚心常恐星星侵鬢腳東閣何當呼侍兒蟹螯不妨左手持參陪後乘盡珠履誰賦劉義冰柱詩霖雨霖雨遂兼旬瘴霧盈川谷霏隂入户浮潤氣滋帷褥溟濛飛澤逺散漫何時足驟響决流渠驚洪發平陸翔禽困滯翼穴獸思馮木衡茅日萎壞環堵無完築曨蔥晚色霽草樹晞華沐長雷夜復興濯濯鳴髙屋撫枕不能寐沉憂萃心曲阻風晚嵗多悲風江湖浪峥嶸扁舟渺無依日暮猶狐征重岡擁滯霧迥隰飄浮霙繫舟古岸邉纜斷舟復橫天寒鴻雁稀滯留知旅情頺崖震林谷客子心夜驚披衣待清曉缺月西南明逺逰多所懷益遣歸思盈聞筝作月髙夜鳴筝聲從綺窗來隨風更迢遰縈雲暫徘徊餘音若可玩繁絃互相催不見理筝人遙知心所懷寧悲舊寵棄豈念新期乖含情鬱不發寄曲宣餘哀一彈飛霜零再撫流光頺每恨聽者稀銀甲生浮埃幽幽孤鳳鳴衆鳥聲難諧盛年嗟不偶况乃容華衰道同符片諾志異勞百媒栖栖墻東客亦抱凌雲才建康六感吳龍翔大耳兒虎視捉刀人風雲競追逐逸軌誰能遵大皇負英材沉潜欻求伸一呼定南國再戰威强鄰抗魏既搖嶽攘劉亦披鱗組練繞平隰艨艟蔽通津偉哉人物盛成功豈無因代祀已飄忽風流久彌新停橈眺迥陸裂蔓登層闉卧龍昔來逰萬古懷清塵晉日昃無全照南遷事倉忙龍謡方協瑞星禍已告亡凌遲百年運凛凛危莫將向來問鼎人項背常相望環宫白羽列面闕鳴弦張膺圖未躋泰卜世豈在長獨憐短轅公推刃殺忠良百身嗟莫贖一慟鬢成蒼時移事亦更為宋復為梁惟有采石潮年年到前岡宋寄奴真偉人落拓龍潜地據筵呼五木已有吞世氣世期值陽九天綱日淪替偏邦或跨州卑號猶稱帝匪乘艱棘運英姿疇能濟南戡奠番禺西狩澄涇渭功雖與世隆道亦因人廢緬懷揖讓風黃屋身如寄頺波日奔迫夜壑遷神器巢由獨賢哉髙蹤邈難繼齊堯宫不剪茨禹室無崇壤巍巍天步隆萬代猶可仰荒哉二三君經營務華敞落柿滿清江飛斤殷遙響疏淵引瀾澳築圃遷林莾筋力斃民軀資財傾國帑雄心獨未倦矯首生遐想時值陵谷變無事猶悲曩殷憂易興懷逸樂難終享過客問青溪荒畦棘花長梁開圖屬英睿失國由昏愞斯人異前修撥亂旋致亂輕刑下益肆厚爵臣彌叛聰明馳萬幾精苦徒宵旰鳳冕敬方袍鸞旗游彼岸悠然棄從懷臨機復難斷那知千佛力不紓一冦難酒色覆商周神仙蕩秦漢趨亡固多軌荒迷卒同貫微聖常鮮終撫册三慨嘆陳悲風嘯荒垣歌斷庭花曲璧月夜沉輝瓊樹春銷馥郊圻逰從盛想像猶經目麗景明新妝清波映鮮服承恩屬令姿被選皆華族朝從結綺逰暮向臨春宿意髙時忽謝步逺塗方促榮華事不長哀樂情難足悠悠六朝事轉盼風驚燭永懷興亡端斯文慚麗縟夜飲良宵樂未央促席團圞坐佳人意殷勤唱歌屬余和幽期貴闊略醉語多叢脞沉沉玉巵酒量淺難負荷豈不懷極歡恐重賔友過褰帷望明河山月􅋦半破回軒互追奔傘拂簷瓦墮逰朱勔家園晨暉麗丹楹翼翼侔帝居向來堂上人零落烟海隅聫翩際時㑹振跡皆刑餘閨帷尚帝主皂𨽻乘軒車流威被東南生殺在指呼樓船載花石里巷無袴襦至今江左地風雲亦嗟吁叨榮已過量受禍如償逋荒凉此門路尚想冠蓋趨客舸維岸栁鄰人罾池魚徘徊極幽觀曲折迷歸途夜月扄綺户春風散羅裾繁華能幾時喪亂實感余曹鄶余何譏此曹真人奴孤翼吟哀哀孤飛禽聲鳴何悲酸含情若有訴口訥無由宣瞻雲憶舊侣悠悠隔山川勿言異類微聚散同悲歡零霜解疊翼錯綵銷文翰殞身未足辭失意誠可憐羣飛盡投林凌空獨翩翩豈無棲巢枝託跡長不安啄食朝競場流飲暮爭源鳴弦應機發薄命當其先長翮易奮飛窮途少周旋風雲肯借便一舉誰能攀早行村雞已報晨曉月漸無色行人馬上去殘燈照空驛寄懶菴山暝雨連夕今晨天氣清遙懷懶菴人髙卧掩柴荆幽寂性所嗜蕭然寄平生惟應田叟來對床話躬耕老農山前有老農給我薪水役得錢徑沽酒醉卧山日夕忘形與之語妙理時見益志士多隱淪欲言慙未識次六四叔韻吾家小步兵辭林獨輝映携詩過山堂句挾風雲潤思嵇逺命駕訪戴屢乘興訂古釋羣疑談𤣥發清聽年均愧質滯禀異驚才峻賴兹時發揮藥石攻余病提携蘭畹曲笑語柴門靜歸軒驚急響行炬飄遺燼平生共飄流晚嵗同棲遁語言聊寫懷補綴酬斯詠題懶菴二首幔亭隱淪翁作菴更名懶紛紜萬念繁要以一理遣我衰百無長此興復不淺他時倘卜鄰心賞符二阮地偏賔至稀晝靜門常掩深房紙瓦明宴坐蒲團穩庭花落禾掃徑草繁不剪林泉倦出逰况乃市朝逺種菜傍舍植柔蔬携鋤理荒穢桔橰勤俯仰一雨功百倍朝來緑映土新葉搖肝肺牛羊勿踐畦肉食屠爾輩晨興晨興訪蕭寺爽氣清如沐坐看雨離山飛隂斷平陸歸途阻夕漲竚立驚幽獨曵杖聽殘鐘却寄僧房宿袖刺袖刺謁諸鄰徘徊寄心賞潭潭廣厦深咳唾生餘響兹邦懷地寶比屋誇雄敞如何蓬廬士貧賤安所養同翁士特李似表謁㢲伯少卿因作醉歌翁劉異氏居同里奕葉論交今久矣隴西京兆實姻連我既識翁因識李㢲卿自洛始遷閩寄食僧房仍密邇盍簮雅好有新舊傾蓋髙情無彼此酣歌擲劍悲羣公胡為局促荒山中曲肱放浪雖所樂樂此亦知吾道窮自聞胡馬再南牧九州何地無兵戎世衰成敗不以正姦宄得意為英雄儒生守經昧時變憤切氣欲摩蒼穹斯言撥棄勿復理把酒論詩差可喜圍爐夜語忘刻漏吹燈曉色盈窗几歸途草棘縈風袍主人謝客僕御勞雲山悵望一回首虎豹出穴哀猿號下灘作青山鎖連環白書走鳴瀨迷津毫髮間舟與危石㑹回淵聚浮沫斷璧餘澎湃玩竒心若驚覽景目不逮悠然一回首孤驛已茫昧停橈念經厯履地猶旋憒悲風嘯枯林暮野雲相蓋隔船聞和歌沽酒慰疲怠偶步鬱鬱思淫滯振衣聊萍逰雲晴霄宇麗緑暗川原幽佇步時引顧心期歎無儔路逢荷犁翁笑我獨何求趨塵顧叩之棄去不少留心知所言非齟齬自慚羞歸來面空牖默坐窮其由達人隆廣度曲士遵偏謀臨岐每易惑怨已識未周行藏命也夫吾非斯人流屏山集卷十
