body:
  text: 屏山集巻十六宋劉子翬撰詩景陽鐘二首景陽鐘動曉寒清度栁穿花隠隠聲三十六宫梳洗罷却吹殘燭待天明一刀殘月淡觚稜遙映林梢曉色升寂寞小簾風露冷玉盆脂水已生冰春夜二首葉葉風鳴幕梢梢雨打窓煙銷寒寳鴨膏淺側銀缸樓逈星河轉宵殘鼓角催重門和月鎖寒夢遶花囘賦雙溪閣用蔡君謨詩聲字韻雄觀今古快幽情突兀層樓出市甍二水交流何處盡孤舟不見亂山横丹爐寂寞仙遊逺劍氣蕭條客恨盈向晩移樽話流落可堪時聴皷鼙聲泊舟莽莽荒茨岸囘囘亂石灘雨寒收市早風急泊舟難㝢縣兵猶鬬乾坤網正寛慇懃囑龍劍莫久卧波瀾劍潭贈李似表夜窓把酒對鵞峰分手悠悠各轉蓬艤棹相逢煙浪際有家皆在亂離中胡兒久占清河地壯士誰收赤壁功他日着鞭先後耳飄零不用嘆途窮舟中寄似表溪流元自急積雨更兼旬曲渚方移棹髙城忽背人艱難爭避地去住不由身客食憐詩李相期一問津次韻張守同徃華嚴淺水荷花開傍橋晩鐘樓殿碧山椒林松遶路行不徹野鳥避人飛更遙喜有髙情共邱壑應須長嘯混漁樵老僧好事能延客未覺山房苦寂寥出郭詩呈張守出郭籃輿載酒随林邉蕭寺趂幽期雲依石度遙看久路遶田分欲去疑落日悲風滄海外黄花翠竹晩秋時慿詩一寫登臨勝為報壺山太守知次韻張守壺山詩松根繫馬望巑岏乘興攀躋不作難日出漸看林霧散潮來先覺海風寒遙連釣石多紅樹半出僧垣盡緑竿不見雙旌來視稼憶君對酒豈能歡次韻方學士萬巻樓淵然推量徳為循酷愛收書定可人劉向討論稱好古退之學問美藏身箕裘有子能傳業俎豆於今嘆不辰我亦平生譏傳癖可憐朱墨費精神次韻吳教授題子應山齋芒鞋竹杖日随身所向逍遙樂任真強健掛冠非矯俗榮華得路轉迷人愛山兀兀常心醉與世悠悠只貌親最晩論交欣得子一樽猶足慰漂淪張守唱和紅字韻詩八首午枕囘清夢疎林逗逺風茶甌烹葉白果飣剥方紅小壘常稀訟隣邦近息戎民謡知善政佽助亦何功一巵那惜醉引劍坐生風怒髪冠衝緑憂顔鏡損紅莫輕秦黷武舊恥漢和戎慷慨今賢守燕然擬勒功漂流今海角胡騎忽秋風舊隠懷空翠征途厭軟紅時平猶倦仕力小况從戎欲遣愁城破須論酒子功燦爛燕公筆飄然邁祖風髙吟時舉白戯語或題紅訝敏文翻水誇嚴律比戎詩壇如第將蘇李謝前功海市從蕭索杯盤樂土風郡樓山向背村塢樹青紅玉麈嗤夷甫牙籌陋阿戎王侯真夢耳穴蟻更論功㣲吟時擁鼻瀟洒晉人風客至添樽緑官閑省印紅易徂嗟嵗月迭盛嘆華戎願草浯溪頌中興旦暮功斷虹明晩井煙靄半随風岸桞霜收緑庭榴日貸紅酒酣腸有海棋戰手興戎賡唱逢勍敵方知比興功濟難資長策常懐國士風秦強因將白魯弱更蒐紅嘆已懷孤憤憂時咏小戎儒冠須勿溺邂逅亦成功次韻張守述懷避地漂流更海隅一身難料豈知餘晩樓獨上非吾里㡬日西來絶羽書敵未息兵由運數力難康世昩孤虚郡侯豈弟憂民切魯史無因諷失魚同張守謁蔡子強觀硯論琴偶書共造中郎室明窓玩好竒硯珍鐫子石琴古斷孫枝篆鼎飄香逺茶甌轉味遲自慚塵土累清話得移時次韻林吉甫遊天台聞說星郎隠翠峰鵷鸞囘首大明宫倦逰壯歳抛朝紱歸夢清江憶釣筒賢聖相期黄巻裏是非都付濁醪中更聞蓮社多幽侣我欲時來問苦空莫田打麥蓬蓬響莫田兒童拾穟笑爭先市頭米價新來減一醉瓷甌五六錢石磨盤石輪囷隠澗幽煙籠月照㡬經秋可憐琢作團團磨終日隨人轉不休寒澗林間幽鳥啄枯槎落盡寒潮一澗沙獨木橋西遊子宿酒旗斜日兩三家秋望輝輝江日已沉西隠約餘紅泛渺瀰却上松岡望秋色偶逢僧話立多時兩山渡南渡北兩山遙隔岸行人手可招日暮海門煙雨黒一川舟檝趂歸潮游鯈禹鑿天門浪渺茫游鯈也解化龍翔風雲得路誇頭角歳旱爭尋窟穴藏和徐從道韻二首髙軒遙肯顧掃室慣逢迎酒喜頻中聖官慙四至卿憂時論曲突感物咏長檠古道難開口微君孰與明拂袖歸來日柴門稚子迎貧甘守藜藿名不愧公卿寳劍空藏匣良弨惜解檠中興誰草詔君盍在承明蔡子強挽章擢秀詞林少也竒星軺榮耀更分麾世傳清徳名方盛生不長年理可疑蘇晉逃禪心淡泊孔融好客酒淋漓眼看玉樹埋塵土零落交遊我獨悲聞笛倚樓何處笛飛響徹雲霄曲怨吹難盡風囘聴忽遙戎兵臨絶漢閨婦起寒宵一弄梅飛雪華年鬂亦凋投壺暇日賔朋集投壺雅戯同旁觀驚妙手一矢廢前功禮盛周垂憲詞夸晉起戎區區論勝負轉眼事還空思賢堂懷薛令創始人何在空堂草棘侵衝門狐竄急穴柱蠧藏深羽化王喬舄塵昏子賤琴獨嗟民困甚誰繼昔賢心燒惹草熒熒焰隨風烈烈聲欲臨横澗斷忽上晩風明踸踔無潛迹䝉茸有怒生尚餘飛燼煖培耔及春耕潮江晩潮風應蕭蕭百里秋寒聲初戰峽怒力暗移洲捲岸舟船盡涵空日月浮吳兒輕逐利亡命雪山頭洛陽橋跨海飛梁疊石成曉風十里度瑤瓊雄如建業虎城峙勢若常山蛇陣横脚底波濤時洶湧望中煙嶼晩分明徃來利渉歌遺愛誰復題橋繼長卿途中小市猶依海横橋欲跨汀雨餘榕徑冷春晩苧田青薄宦低豪氣浮生惜壯齡急流歸亦好憂患飽曾經次張守韻四首久分閩地竹屢賜漢庭金才刃硎先發恩波海并深宼銷乗間禍民有不欺心祗恐鋒車起雲霄路莫尋促席山堂夜寒燈吐碎金酒分鄰甕美栗爆地爐深疎懶難堪事紛華易壞心自憐貪寸禄雙鬂老侵尋瓦白霜封縞波清月漾金柝沈秋壘靜人語夜堂深故國歸何日寒衾事滿心庭松憐手植擢榦已彌尋泣懷三獻玉亷拒四知金勢利焚和猛詩書汲古深貴無長得意閑有自由心岣嶁丹砂在盟寒儻可尋同李漢老登髙齋飛梯百級轉層巒政喜登臨着眼寛海上波濤連閬苑日邊塵土暗長安亂來世事終無定春盡羇愁豈一端賴有謫仙能喜客時陪杖屨得雄觀過舟峯庵杖䇿到舟峯開軒對緑叢禪心清似水客鬢亂如蓬鼓角譙門日鸎花上巳風逢人相借問何地隠龎翁悼李奉選拔由親衞時危逺出征氣驍嘗忽敵身歿始知名故妾辭空帳殘兵𨽻别營傷心豺虎窟冐險爾何輕聞韓侯至今代淮隂將宣威瘴海東夜營兵氣黒寒磧戰聲雄有㓂常親討無官可賞功屹然沈鷙貌識汝未侯中次韻張守梅詩破雪梅初動南枝更北枝傍墻應折盡背日較開遲曉角驚殘夢春愁占兩眉狂風將落蘂故入畵樓吹次韻陳成季郡㑹疾雨狂風恨若何芳晨坐覺等閑過惜花意欲春長在對酒年來飲不多雅㑹欣聞珠履集新詞好付雪兒歌風流閣老推前軰喜客温顔似醉酡古松手植知何代樅樅萬葢齊韻清琴易寫榦直鳥難棲慘淡連雲塢鬅鬙䕃石谿刳明雖小用曾照路人迷出郊路轉嚢山北扶輿憶舊過乾坤征戰久遊宦别離多瘴樹餘紅葉春江又緑波平生豪横氣未老半消磨偶書風急胡塵暗九州岸巾長嘯一登樓故園却憶桐孫在薄宦端為茘子畱湖海以南兵尚鬬干戈不息禍難休似聞推轂皆飛將盍有清談謝傅流送惠州使君范智聞喜聴清談滿座傾不堪行色動雙旌長亭把酒分攜易暮角催人太瘦生地逺守臣知妙選時危壯士恥南征羅浮説與潮陽近盍擬離騷弔二英栁體為常輕定復飄間梅遮杏得春饒别離處處添愁色風雨年年換舊條拂瓦半枯陶令宅沿溪不斷霸陵橋凄凉又見千門緑野老當時恨未消鹿鳴燕詩送諸進士講藝欣聞暫息兵槐花秋晩詔羣英胡塵不隔蟾宫路鏡水初題鴈塔名禮盛邦侯開宴豆道隆鄉老萃簪纓更期妙手皆穿的薦士呉僚亦與榮至日客中雙鬢老塵埃海角仍逢至日來近臘風光初染茘新陽氣力僅浮灰豆糜厭勝憐荆俗雲物書祥憶魯臺搔首故園心欲斷少陵頼有掌中杯曲倚器成因揉木偃月勢相侔適用形雖巧論材性本柔倦凭觀秘籙趺坐接禪流莫效愚溪戮時多曲似鈎宵長宵長慵早寐念念客愁新燈影明髙屋蛩聲動四隣滿懷平日事雙鬂倦遊身避地從漂轉西風羽檄頻試弓結束擬從戎秋堂試寳弓角寒開拒手弦勁響流空巧易穿楊技神誇飲羽功挽強吾有待狐兎莫爭雄次韻張守梅詩草棘蕭蕭野岸隈暗香消息已傳梅雪欺籬落遙難認暖入枝條併欲開愁向天涯今度見老随春色望中來似聞詩社多何遜盍試招邀共一杯次韻張守立春把酒酬佳節遨頭樂未央池冰猶澁舫岸栁已籠牆曉院簾幃巻春盤餅餌香慇懃分彩勝為掩鬂邊霜九日登北山戯馬英雄安在哉閒因九日上崔嵬歩窮巖壑身忘倦望盡乾坤意始開已向晩風催落㡌可無新菊共浮杯佳時急早須行樂老境侵人咄咄來荔子挺秀窮荒嘆未遭昔人吟賞著風騷縱班盧橘材非偶不近長安價愈髙烟雨萬株遙若畵塵埃一騎笑徒勞琱盤此日無遺選品格妍􅑦敢自逃龍眼幽株旁挺緑婆娑啄咂雖㣲奈美何香剖蜜脾知韻勝價輕魚目為生多左思賦咏名初出玉局揄揚論豈頗地極海南秋更暑登盤猶足洗沈疴次韻張守酴醿二首榮華休羨黒頭公且對芳辰賞麗叢十萬青條寒掛雨三千粉面笑臨風莫將擬雪才情賦盍與觀梅興味同只恐春歸有遺恨典刑猶在濁醪中退食黄堂喜自公不妨幽興囑芳叢雙旌不出閒春晝大筆㣲吟綴祖風老矣交朋今日少飄然遊宦異鄉同杖藜約我過南浦賢聖時時為一中荔子炎蒸午枕夢滄浪落落星苞喜乍嘗筆下丹青千品色釵頭風露一枝香鷄冠借喻何輕許馬乳爭名固不量直待當時妃子笑驪山千古事凄凉次施子韻之子才非碌碌流一官將毋海濵遊妙齡意氣看長劍久客風霜嘆敝裘完璧有懷空慕藺著鞭他日定先劉岫窓故隠今何在草棘連雲淮楚秋次韻張守秋懷四首杖藜乘興出佳處毎闗情白石溪流淺黄花籬落清林煙經雨薄野月傍山明賴有杯中物愁懷得暫平徙倚山堂晩悲秋萬古情雨蔬猶擢秀風沼自揚清野逈歸牛小沙寒白鳥明凄凄楓栁樹汝意亦難平失計縈塵網栖栖厭不情興随鳬舄逺官比綺曹清大案韋編古深房紙瓦明聖賢聊晤對事業只平平歳事何倉卒㣲吟寄客情野耕方刈熟隣釀已沽清歸鴈年年急寒烽處處明予衰倦流轉夢想玉階平屏山集巻十六
