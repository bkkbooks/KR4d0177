body:
  text: 屏山集原䟦屏山先生文集二十巻先生嗣子玶所編次已定可繕寫先生啓手足時玶年甚幼以故平生遺文多所散逸後十餘年始復訪求以補家書之闕則皆傳寫失真同異叅錯而不可讀矣於是反復讎訂又十餘年然後此二十巻者始克成書無大譌謬熹以門牆洒掃之舊幸獲與討論焉竊以為先生文辭之偉固足以驚一世之耳目然其精微之學静退之風形於文墨有足以發䝉蔽而銷鄙吝之萌者尤覽者所宜盡心也因書其後以告後之君子云乾道癸巳七月庚戌門人朱熹謹書
