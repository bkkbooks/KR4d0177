body:
  text: 屛山集巻十一宋劉子翬撰詩弔史禽殫繁弱棄兔盡韓盧烹英雄起乘時時徂力難争精魂閉尺穴壮骨颺飛塵凄凉千載下間氣凜如生嬴秦失其鹿圖王各峥嶸斯人顧盼間漢楚分重輕臣雖替末路君亦寒初盟豈不念疇昔百戰同艱辛誰云漢網疎豪俊屢拂縈髙蹈欣繫鮮括囊聞飲醇雙樹猗猗暎門樹團團若雙盖微風薄層霄髣髴鬬清籟逍遥歩其下秀色吾所愛秋来霜葉紅飄落不相待懐致中夢覺殘夜永山寒氣逾清林幽萬籟息月出虚堂明披衣坐復起懐人思空盈經時不對面素榻浮埃生遥知念盍簮臨風亦關情褰帷望岐路慨然欲宵征無人導我先何因識門庭仰憑鴻鴈飛書詞寫深誠詞多意莫宣益遣幽恨并棄竹夫人愛憎情易遷感物思鬱紆念昔未棄捐嘗侍君子居煩襟一披豁雅抱何清虚蹉跎怨時暮凉徳竟見疎飛霜皓中庭枵然委牆隅的皪珠幃深熒煌錦茵鋪豈不懐舊恩君心已非初當年紈扇謡抱恨同區區江山突星石士特欲易為獨醒有詩因次其韻羣石翠參錯兹峯峙雲林突星名固夸流傳經古今幽姿儼向背異態生晴隂怒若抽翠筍端如立瑶簮不有融結竒寧知化工深翁郎丘壑人籃輿越秋岑崎嶇喪亂間逢幽亦登臨把酒視雲漢浩歌散愁襟着鞭雖後余歸蹤畧相尋獨醒訂訛謬懐人識君心政恐五字詩光芒射奎參玩味不可忘寫之朱絲琴秋懐哲人嘆逝川志士悲廪秋流光不暫停忽忽嵗欲周凉飇襲逈野飛霜皓盈疇華林失鮮輝奔谿殺湍流萬化倘日徂吾生難獨留而我苦不樂徬徨復何求世途多軌轍今行非昔謀徒遵耿耿意齟齬固莫投時乎不再来豈余敢懐尤王道炳日星厯騁疲軻邱歸與既改斾浩然亦回輈寂寞寗子歌棲遲長卿逰客嘲徒自觧天問終不酬長揖未免烹説難竟遭囚行藏或大謬聖賢共悠悠含思疚憤積念往川途脩煌煌青春姿蹉跎恐兹由諒非宏達觀那能齊百憂四不忍草邉飛騎如烟滅拉獸摧斑食其血此時疾首念鑾輿玉體能勝飢渴無危城屑麴驚雲擾簠簋無光天座杳奮戈倘未雪深讎我食雖甘何忍飽黄河鑿鑿冰成路人語寒空氣成霧此時泣血念鑾輿玉體能勝凛冽無蒼黄天歩蒙塵去畫衮飄零傷嵗暮飛書倘未伐姦謀我服雖華何忍御平沙月轉旌旗影擐甲為衾戈作枕此時飲恨念鑾輿玉體能勝暴露無問安使者空相繼清蹕不回宫殿閉請纓倘未縛酋渠我榻雖安何忍寐漁陽疊皷風沙戰潑水淋漓舞胡旋此時太息念鑾輿玉體能勝寂寞無六宫遭亂多奔迸不復梨園歌舞盛着鞭倘未蹂龍庭我瑟雖調何忍聽雲際贈施子驚沙慘淡連雲起曳杖悲歌行復止春城是處聞鼔鼙好風依舊開桃李對花惆悵忽逢君把酒無懽如啜水六年喪亂兩相見世路艱難嗟若此江邉盜賊真逰魂挾虜聲援圖併吞金陵失守數騎入㑹稽移蹕千官奔只今州縣多阻絶消息時聽行路說百川背海欲西流八柱榰天愁更折苻堅陣亂邱山摧夜聞鶴唳猶驚猜莫輕赤壁一炬火曹瞞氣焰隨飛灰功名邂逅有快意豈在今日無人哉天方稔禍秘豪傑故遣君軰多沉埋亦知興衰運有極天時一半因人力男兒遇事不作難看君赤手排荆棘望京謡雙鑾北狩淹歸轂寂寞梁園春草綠猶傳故老守孤城官軍不到黄河曲連雲樓櫓已灰燼更倚窓扉防箭鏃招兵大半出羣盜繡䘿䝉衣屢飜覆前宗後杜力誅鉏白刃如霜挂人肉州橋燈火夜無光夾道狐狸晝相逐往時汴泗絶行舟市糶十千塵滿斛衣冠避胡多在南胡馬却食江南粟謀臣武士力俱困海角飄摇轉黄屋盤庚五遷方擇利昆陽一戰何當卜寧聞强虜亂中華漢祚承天終必復夕烽明處望千門孤臣祗欲吞聲哭詩寄懶菴兼簡士特温其原仲致中昆季懶翁疎散無與儔結菴名懶山之幽蕭然杖屨巖壑裏似是當年嵇阮流云何出處戾初志束書負劍俄西逰悲猿攀車鶴卧轍去意勇决誰能留菴埀鐵鎻人跡斷破窓鳴紙風颼颼曵裾我昔翁門客豈知繼踵居翁室閭里應記往還頻猿鶴乍驚賔主易爾来庭户已更創尚榜翁名志陳跡傍菴小樹昔親栽鑿沼今遷在簷北我山亭闞舊牆東此景新成翁未識遥知捧檄遵歸途摘山官况今何如書来頗厭作吏冗俸禄僅可供妻孥趨庭日一見官長脚靴手板常睢盱簿書有程那得懶却視故隠真蘧廬寄聲頻慰吾人望往時交友皆無恙鵞峯諸劉更互来清湖居士時相訪中郎司户又繼歸酒社文盟氣增壮我慚淺拙難强陪每憶翁才真軰行拂衣早赴竹林期莫遣移文重前謗逰龍潭四客同笑言一僧陪杖屨徜徉山水窟適意忘晨暮疎鐘巖北寺細竹溪南路中流石參錯不礙潺湲注泓澄小龍潭潤氣金碧聚時驚木葉墜俯見魚蝦度斯逰非預期偶爾造佳處㓜輿邱壑情陶令琴觴趣淹留慰所願惟以賔友故夕陽淡寒山遲回不能去田家長空淡淡如雲掃暮過田家風物好耕犁倚户寂無人飢牛卧齧牆根草沙頭沙頭鸂鶒寒相傍老樹槃跚枝拂浪前村急雨漲灘流日暮漁舟撑不上臨池歌劉致思倦逰復卧故廬有意學書来求石刻因慨然念昔經行秦洛趙魏間未甞不回驂駐軫搜訪古跡故宫遺址豐碑斷碣厯厯相望也吹埃剔蘚考年代之所志訂古驗今識興衰之所自至乃壊壠荒榛微陽霧雨雖暴露霑沐僮僕色難而余躊蹰不忍去竒蹤偉筆多致墨本甚者缺裂模糊不可辨了亦皆摸脫以歸登登之聲殷乎山谷積歸所獲車載牛負不可勝計喪亂以来汛掃焚書何止七厄哉今披箧視之十得一二有副本者輙以與致思致思明爽甞留心字學運筆流快風行草偃固足以軒輊流軰然未能窺前人籓域者功虧一簣耳夫洞石仆木非蹶張挽强者所能用志不分乃凝於神梓慶削鐻痀瘻承蜩皆此道也致思充是而學焉余不知其所至矣因作臨池歌以堅其志切切偲偲亦朋友之義也君不見鍾繇學書夜不眠以指畫字衣皆穿當時尺牘来鄴下錦標玉軸争流傳又不見魯公得法屋漏雨意象咄咄凌千古斷碑零落翠苔封直氣英風猶可覩元常獨歩黄初際清臣後出今無繼風神迥出本天資巧力亦自精勤至羨君好尚何高竒寒窓弄筆手生胝向来失計墮塵網銳氣直欲摩雲飛男兒舌在心何怍却擬臨池尋舊學要須筆外見鍾顔㑹自蛟龍生掌握銀鈎石刻余何愛勸以短歌君勿怠他時八體妙有餘此歌倘可君紳書和李㢲伯春懐山寒古寺清斷續春朝雨遥憐逺客情寂寞誰晤語平生氣軒昻失意今易與有酒即佳晨無兵皆樂土微吟對節物林静幽花吐悠悠念鄉邑耿耿悲豺虎知有濟時才縱横在談塵功名恐未遲老翮期更舉明皇九馬圖書生兀兀園不窺見馬豈辨騮與騅開圖九駿立突兀摸􅟥知是真龍兒奔雷蹴踏原野動曵練參錯風沙隨華纓金絡豈不好矯首奮迅那容覊吾聞取驥如擇士競愛妥帖驚權竒士懐倜儻衆論斥馬有顦顇羣駑欺六閑豢養固恩厚横氣摧折常鳴悲丹青倘不逢妙手萬世豈識真龍姿因思中原政格鬬鐵騎倐忽銀山移着鞭安得致此物掩畫四顧徒歔欷怨女曲空原悲風吹苜蓿胡兒飲馬桑亁曲誰家女子在氊城烏烏夜看星河哭黄金為閨玉為宇平生不出人稀覩父憐母惜呼小名擇對華門未輕許干戈漂蕩身如寄綠鬂朱顔反為累朝從獵騎草邉逰暮逐戎王沙上醉西鄰小姑亦被虜貧賤思家心更苦隨身只有嫁時衣生死同為泉下土出門有路歸無期不歸長愁歸亦悲女身軟弱難自主壮士從姑不如女防江行五首朝来殺氣秋千里無立草翩翩黑幟飛結壘天長道獵罷楚天寒黄雲淡如掃漢家飛将雄夜戰蕪城北雙刀斫盡刓月暗穿圍出低頭拔胡箭却向胡軍射寒烽隔水明虜意猶叵測君王自臨戎萬騎隨清蹕士氣薄層霄欃槍夜無色江邉五色旗分揔期門士驚砂雜雪飛日暮孤城閉寂寞良將風誰識投醪意樓船動滄江江晴鼔聲發男兒取封侯赴敵如飢渴腰懸孛堇頭長歌獻金闕和安汝功採紫竹杖篇赤藤表珍竒桃枝寄吟翫髙情在邱壑微物懐深睠徴工匝逺林彌山選一榦雲根傍崖蹙椹色涵霜變匪憑精刃揮根柢難立斷慇懃為摩撫曄曄光浮爛觸石聲涵鐘撢波影摇電矧余疲曵姿假力斯過半皇皇駟馬威秦趙昔臨按胡為歩槃跚猥逐漁樵伴千金一顧重朽質增華煥不經提携手棄擲亦何筭夙懐用舎情感兹長發歎贈宗周賔我車南君車北相逢總是天涯客擁爐談笑一燈殘出門風雨千山隔湆淡灘南来甌粤無平陸林巒起翠波騰綠扶輿政恐犯霜露買舟倘可休僮僕清灘白晝雷霆作亂石驚湍犬牙錯平生珍重千金軀舟子一篙那可託飄摇葉様勢轉急釡竈傾頺不能立眼看白浪散銀山蛟螭百怪堂堂出人皆乘險欲趨舟我不安行悔何及吁嗟世路風波猛巧穽危機暗馳騁江湖溺舟猶自戒勢利溺人終莫省矯情鎮物未足言書此聊為後来警廵寨偶書窮冦轉趨海吾邦備宜先連年戍役煩徴兵及漁佃扶戈或推齒嬰胄仍華顛未知戎伍肅朱旗亂長阡林端晚燧發石際飛梯懸﨑嶇樵牧地萬竈生浮烟我行視營柵兒戯端可憐倚兹形勢險冦至常遷延羣兇昔吾軍赤指抨鳴弦防胡屢瓦觧合冦俄星連猶多燕趙兒意氣非當年駢車載珍寶結騎馳婵娟時危天稔亂事豈汝能專怒風飛驚濤河梁失歸船四顧天地黑攬衣思茫然次韻蔡學士梅詩梅梢破白香清切晴雨含春不成雪瑶池髣髴萬妃逰縞裠練帨何鮮潔凌晨燦爛忽驚眼客中又過嘉平月年年見梅非昔地海角尋芳更愁絶多情欲伴曉雲飛有恨只教啼鳥說兵厨况是酒如澠東閣喜聽談吐屑飄零使我懽意盡山城暮角聲嗚咽庭邉一樹春最晚照影遥憐水方折暫忙不到今幾時南北枝頭開又歇新辭婉媚發春妍未害廣平心似鐵禱雨蟹泉厭旱訟風伯苦雨誅雲師天公良獨難爾民多怨咨夏潦包原隰苗端漲清漪冬暄但流塵土堅不􅋦犁隂陽有乘除此理固可推惟神執天權憫物思濟之穴泉類蹄跡幽靈隠其涯髣髴小雙螯控御蛟龍隨名居列曜尊箕畢可指撝顧匪郭索倫甞辱左手持滂沱為一縱豈惟潤東菑灝灝燠氣清浮浮瘴烟披將聞鼔腹謡寧求折肱醫寸澤埀二惠此功神所尸遥知青青麥春風滿陵陂吾儕飽湯餅敢後椒漿期負暄宵寒卧增裯晝寒起增衣何如負暄樂髙堂日暉暉引光扉盡闢追影榻屢移妙趣久乃酣暝目潜自知初如擁紅爐凍粟消頑肌漸如飲醇醪暖力中融怡欠伸百骸舒爬搔隨意為稍回驕佚氣頓改酸寒姿薰然沐慈仁天恩豈余私願披横空雲四海同熙熙矯首望扶桑傾心效園葵子魚舊聞通印名海錯珍莫踰火氣爍鱗鬛鹵香泛庖厨泥泥子盈胞鮮美禍所區生如粒芥微多若囊粟儲他年想吞舟勿輕此錙銖一咀命千百雖甘汝安無窮冬孚乳時罩䍡海為虚含凍體猶僵得㵼味已渝虐戯等刳孕滛刑幾戮孥人深襁褓恩在物愛豈殊閩風易殺子盥水沉其軀詎有惻怛心旁推及豚魚相殘人獸均自殘獸不如哦詩化蠻獠因警饕餮徒郡圃觀酴醿憶昔尋春西洛橋酴醿結洞横朱架翠帷銀網一畨新百萬花頭相枕藉飄揺羽客静疑仙窈窕素娥嬌欲嫁細㽔摘貯綘紗囊撲鼻清香奪蘭麝論花每恨流品雜韻絶江梅此其亞紛紛紅紫已空條耿耿冰霜猶照夜只今漂泊一身存海角逢春足悲咤銀苞翠蕋宛如昨瘦骨蒼頭忽驚乍當時我最推少年想見同逰更衰謝洛陽園苑狐生虜騎時来北邙下浮生榮悴均有老萬古興衰那足訝南鄰地主好襟懐官事稍閑須命駕急須喚酒賞餘妍惡雨狂風不相借木犀古風化工吝幽香斑斑被花木氤氲寒巖桂髙韻盖羣馥無人盡日芳守志何幽獨士介恥求知女貞慙自鬻凄凉楚山秋樛枝吐金粟淺水暎輕明微飈發含蓄樓端静忽聞馬上遥相逐踟蹰為延竚但見林巒綠缾罌誰折贈清芬閟廬屋久處不自知乍至彌鬱郁客悲芳嵗暮夢遶寒溪曲長吟小山詞古意恐難復食蠣房蠣房生海壖堅頑宛如石其中儲可欲雖固必生隙嵌嵒各包藏碨䃁相附積終逢霹靂手妙若啟扄鐍鍜灼諒難堪曷不吐餘瀝南庖富腥盤豈惟此稱特吞航大絶倫梯臠萬夫食針鱗九牛毛小嚼亦千百光螺暈紫斑蠞膏湛金色水母脆鳴牙章舉懸疣宻烏粘力排奡貼石不可索妾魚戯浮波媚鮜雌雄匹蟹躁輙横鶩鼈縮常畏出車螯不服箱馬鮫非駿跡江瑶貴一柱嗟豈棟梁質骨柔競愛䱠多鯁鯯乃斥蚶虹鮭赤文肉黑魚之賊鰷鱨鰋鯉鰻鱣鮪鰍魴鯽鱅庸而􅵐小𤨏冗難盡述包涵知海量長養荷天徳貪生族類繁失地波濤窄網罼人創禍甘鮮已為厄紛然均可口流品當别白微物倘見知捐軀不足惜春寒偶書浮雲匿晨暉雨雹驚春晝天公號令乖隂晴變何驟小徑踐芳泥通渠走寒溜風顛萬木偃氣凛重幃透鵷鸞䕶巢翔奈此羣雛㓜擁爐烏薪然雙手慵出袖褰幃望空明屋角見遥岫良朋不可招塊處慚孤陋青青桃葉長奕奕蘭花秀長吟曷咨嗟佳晨去難又茘子歌炎精孕秀多靈植茘子佳名聞自昔綘囊剖雪出琱盤尋常百果無顔色閩天六月雨初晴星火熒煌耀川澤欻如彩鳯戯翺翔爛若彤雲堆翕爀中郎栽品三十二陳紫芳紅冠流匹鹽蒸蜜漬尚絶倫啄鮮空羡南飛翼我聞宣和全盛時貢輸不減開元日涪州距雍已云逺况此奔馳来海側繡衣中使動輶車黄紙封林遍阡陌浮航走轍空四郡妙品人間無復得似聞供御只纎毫往往盡入公侯宅驪山廢苑狐兔静艮嶽新宫鼙鼓急繁華今古共凄凉遶樹行吟悲野客西風刮地戰塵昬一聽胡笳雙涙滴屏山集巻十一
