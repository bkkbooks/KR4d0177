body:
  text: 屛山集别集類三宋提要臣等謹案屏山集二十巻宋劉子翬撰子翬字彦沖崇安人劉韐之季子嘗通判興化軍移疾歸里築室屏山以終此集乃其嗣子坪所編而朱子為之序序末署門人朱某葢早年嘗以父命受業於子翬也集中談理之文辨析明快曲折盡意無南宋人語録之習論事之文洞悉時勢亦無迂濶之見如聖傳論維民論及論時事劄子諸篇皆明體達用之作非坐談三代惟鶩虚名者比古詩風格髙秀不襲陳因惟七言近體派雜西江葢子翬嘗與吕夲中逰故格律時復似之也王士禎池北偶談曰屏山集詩往往多禪語如牧牛頌云直饒牧得渾純熟痛處還應著一鞭徑山寄道服云聊将佛日三端布為造青州一領衫又云此袍徧滿三千界要與寒兒共解顔此類是也又述子翬之言曰吾少官莆田以疾病時接佛老之徒聞其所謂清净寂滅者而心悦之比歸讀儒書乃見吾道之大云云是子翬之學初從禪入當時原不自諱故見於吟詠者如此云乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部四屏山集目錄别集類三宋巻一論聖傳論十首巻二論維民論上維民論中維民論下巻三論漢書雜論上巻四論漢書雜論下巻五記友石臺記䝉齋記序送張當世序送翁徳功序巻六雜著示六經堂學者字朱熹祝詞遺訓䟦浩然子試梁道士筆題尤貢明墨蒼庭筠傳髯戯閒境志脩祖居上樑文屏山新居上樑文招劍文送劉致中温公𨽻書銘巻七表代直閣南劍謝表代賀天申節表代寶學白州謝表代寶學漳州謝表代寳學謝復宫觀表代張丞相辭免不允謝表代翁殿撰遺表劄子論時事劄子八首代張丞相辭免劄子三首巻八啓賀魯漕除直秘閣啓到任與張守啓謝鄧倅啓賀李丞相年啓賀李丞相冬啓賀新憲啓賀謝叅政啓囘耿龍圖啓賀宣撫李相公啓賀翟叅政啓賀李叅政舉知己啓賀吕相公啓到任與祖漕啓賀漕侯郎中啓賀新漕徐學士啓賀新任梁提舉啓賀知泉州通交代啓代與趙待制啓代與趙提舉啓代與江給事啓代與李丞相啓代賀范叅政啓巻九祭文祭翁殿撰文祭翁郎中文墓銘致仕祝君墓誌銘墓表處士劉公墓表處士祝君墓表熊氏令人陸氏孺人墓表巻十賦聞藥杵賦溽暑賦哀馬賦詩凉月渡淮山隂作醉歌贈金元白獨坐次韻盧贊元再喜雪霖雨阻風聞箏作建康六感夜飲遊朱勔家園孤翼吟早行寄懶菴老農次四六叔韻題懶菴二首種菜晨興袖刺醉歌下灘作偶歩巻十一詩弔史雙樹懐致中棄竹夫人江山突星石秋懐四不忍雲際贈施子望京謡詩寄懶翁遊龍潭田家沙頭臨池歌胡兒莫窺江和李巽伯春懐明皇九馬圖怨女曲防江行五首和安汝功採紫竹杖篇贈宗周賔湆淡灘巡寨偶書次韻蔡學士題梅禱雨蟹泉負暄子魚郡圃觀酴醿木犀古風食蠣房春寒偶書荔子歌巻十二詩法石見李漢老歸田省拱辰山士特贈筆諭俗十二首清江行聴詹温之彈琴歌鵝峯居士遺地黄萊孫歌夢仙謡雲際㑹劉致中懐舊歌夜過王勉仲家宿酒數行為作此歌夏日吟萊孫求墨劉致中惠𤓰白水見梅憶士特送謝中瑩與純臣原仲温其煮魚羹餘柑打魚歌潭溪十詠兼道携古墨來墨面龍紋墨背識云保大九年奉勅造長春殿供御龍印香煤旁又識云墨務官臣廷邽監官臣夷中臣子和臣卞等進盖江南李氏物也感之為作此詩入開善寄茶與二劉劉兼道獵巻十三詩觀二劉題壁白水訪劉致中昆仲携笻續賦家園七詠題靈鷲窓和温其對月之作讀平險銘寄李漢老同胡原仲呉公路遊清湍亭賦詩得流字和熊叔雅四詠次韻李漢老詩次韻致明七言謝方徳順古風少稷逺訪敝廬仍㽜佳句書此寫懐抱不足為報也柳源觀瀑戯胡明仲次韻明仲遊將軍巖寄彭子静必源以古風見投詞意甚逺因為賦風吹原上苗勉其植學待時也少稷賦十二相屬詩戯贈一篇夜行潭溪上念原仲致中喬年茂元伯逹皆有入山期以詩趣之再和六四叔所賦十二相屬詩讀曽吉甫詩次韻明仲遊棲雲閣同汪正夫望鄱江呂居仁惠建昌紙被任伯顯昨寄日柿不至續以膽瓶為貺寄茶與汪正夫雲巖竹源二禪招客寄茶與曽吉甫竹源之集竒仲不赴巻十四詩題大義泉同范智聞賞月向元伯寄陶爐感白髮遊松菴宿省軒過報徳菴出山次韻茂元獨速歌張巨山賦梅因成四首和似之秉燭觀梅行夫寄黄山榧子劉道祖江程萬邱順甫講易孟子韓幹畵馬次明仲矼字韻詩寄致明次明仲畦字韻詩入白水懐士特温其胡明仲潭溪三日飲有懐早飲次致明泉石軒詩借致明玉槌事藥寄魏元履新凉呉傳朋遊絲帖歌次友石臺詩韻胡明仲羅養䝉為悠然集追用前四疊之韻十七日集清湖曉起觀胡文定公手墨寒中偶書病中追賦遊武夷病中賞梅贈元晦次韻致明聴琴過鄴中巻十五詩金陵懐古㑹兵别安子允望楚井泉巖桂園蔬十詠次韻盧贊元喜雪府㑹次士特韻次韻士特贈别訪士特舉和六四叔詩因次韻分韻賦古松得青字六言二首池蓮四詠雨歇新灣汴堤天逈葉集之舉士特唱和因次韻銅爵中渡江上送曽彦思减罷赴闕過楚懐王廟雙廟一樹偶歩離居有感程嬰墓晩宿畵船宮亭湖安仁道中酴醿夜坐靖康改元四十韻春雨瀑布海棠花策杖送杜季習四首劉處士墳山禮亭喜誅大將疊嶂梅花和李巽伯野歩李伯時畵十古圖鄭尚明作詩詩詞多振絶因為同賦送原仲之荆南和士特南浦詩巻十六詩景陽鐘二首春夜二首賦雙溪閣泊舟劍潭贈李似表舟中寄似表次韻張守往華嚴出郭詩呈張守次韻張守壺山詩次韻方學士萬巻樓次韻呉教授題子應山齋張守唱和八首次韻張守述懐同張守謁蔡子强觀硯論琴偶書次韻吉甫遊天宮莫田石磨寒澗秋望兩山游鯈和徐從道韻二首蔡子强挽章聞笛投壺思賢堂懐薛令燒潮洛陽橋途中次張守韻四首同李漢老登高齋過舟峯菴悼李奉聞韓矦至次韻張守梅詩次韻陳成季郡㑹古松出郊偶書送惠州史君智聞柳鹿鳴燕詩至日曲倚宵長試弓次韻張守梅詩次韻張守立春九日登北山荔子龍眼次韻張守酴醿二首荔子次施子韻次韻張守秋懐四首巻十七詩次韻蔡學士巖桂得冲佑命與温其對榻和士特栽果十首與原仲至交溪橋山源春望書齋十詠有酒過東陽題盖竹廟遊北巖訪原仲北風同原仲茂元致和入開善原仲温其彦藻彦符致明集敝廬過天竺寺山館偶題悠然堂雜題四首道中次彭資深韻奉酬少稷宿雲際偶題贈詹朝倚雪隆祐太后挽歌辭三首徐大著挽詩二首次韻劉憲詩二首次韻温其雪次韻原仲幽居次韻原仲竹書事客路哭呂倅贈詹道人燕子秋意屏跡哭士特二首讀士特詩集燕子下灘絶句五首寄蜀二首野墅秋宵春圃六言絶二首巻十八詩汴京紀事長句寄尚明學士讀韓子蒼呂居仁近詩題將軍巖遊武夷山致中惠𤓰得天台命二首遊密菴三首訪原仲山居與致明對榻登原仲茅亭送𤓰與胡原仲菊黄彦逹之衡山有詩㽜别因次其韻懐逺梨築室絶句送巨山送原仲致中惠𤓰因成二絶句勸六四叔卜居贈王周士杖藜有懐十首山寺見牡丹送六四叔之茶陵蕭屯訪致中李似表見訪致明携酒來雲際次韻六四叔蘭詩讀李忠愍文集同明誠茂元遊晞真館入白水次韻温其宿士特山堂懐似表過致思新齋約致明入開善不至二首宿回向寺次韻趙清獻隂字詩次韻温其種竹詩次韻温其見寄長句周元仲將出山伯勝文本袖詩見訪呂尚書挽詩二首和邱斯行牧牛頌夜凉寄題煮茶軒三首寄題頤軒四首胡文定公挽詩三首巻十九詩徑山寄生子作道服三首清泉亨老寄皷枕二首贈總上人二首㑹蔡子思張叔獻次韻挹山亭絶句䆳老寄龍涎香二首次韻温其元日詩呂丞相挽詩二首次韻明仲遊北巖李丞相挽詩三首無諸策題問顔亡絶好軻沒無傳次韻一源亭二首翁仁山受恩歸題王巖起樂齋三首寄巨山寄題觀瀾亭二首遊密菴次韻熊叔雅七言題石井二首登鵝湖妙峯亭次韻題呉若愚一經堂寄如愚珙二首次韻朱喬年送山老住三峯二首朱喬年傅茂元見訪寄題東明齋二首寄題清軒二首有感三首和黄徳欽韻謝劉致中𤓰二首詹君則賦光壁堂李佐國携致中贈别詩來戯成二絶次韻白水雪梅二詩原仲致中寄雪梅二詩再次前韻橙子四首寄巨山次韻傅茂元二首居仁報李季言論養生之益次居仁韻送致明之高沙三首次韻新鄉諸公雪詩二首大年三月書來許訪敝廬分茶公美子應預為白曬之約竒仲徳華第二轉語皆有㫖趣寄致中因温前約原仲紅釀甚佳嘗有十壺之約小詩發一笑居仁與季言論養生致中詩戯論詩碁酒輙次元韻巻二十詩致中招原仲遊武夷致中手談見知胡漳州而竒仲未有定論次韻茂元茉莉花詩二首同才仲入山寄行夫兼懐如愚珙致中相拉遊武夷呂居仁挽詞三首竒仲和致中碁詩有元中一着是吾宗之句竒仲和詩有吸盡西江説是公之句呉公路作功徳院記成子静閲僕舊舉子文有詩因次元韻寄秀峯忠老轉秩奉祠致明贈茯苓次翁來借諸家易解寄子静夢如愚珙食鵝梨三首次李巽伯韻送暐侍者之湖南次六四叔青字韻題慎儀餘清閣春興時中良弼茂元慎儀集水閣致中晩集酴醿四首寄張子平次明仲凉字韻晩飲次韻長汀壁間詩問明仲遊武夷日次韻文殊五言次韻梔坑七言次韻幽居春來十首次韻六四叔村居即事十二絶凝雲堂詩次文賀州韻次明仲勤字韻次韻明仲贈六四叔之作次六四叔韻祝道人日供梅蘭二首梅詩呈六四叔寄致明拙句謝伯逹老友次韻上梅嶺詞驀溪山寄寶學和明仲木犀花詞和章湖州南歌子二首序人之大倫五而朋友居其一焉可謂重矣哉師道尊人生有三事之如一師之謂也顧不列於大倫者以朋友兼之也是以其服同止於緦而已朋友之道親如兄弟相結以誠相責以善相與切磋扶持必期至於有成而後已故古人所謂自天子至於庶人未有不須友以成者也後世之所謂朋友者亦茍然而已予與彦冲居相鄰世相好而臭味又同然予少出遊四方迨中年始獲見於里中潭川之上籍水之濵杖屨往來彈琴賦詩商今畧古毎見必有所益間數日不見則必折簡相招襆被對床所以啓發䝉陋者多矣其有闕失必宛轉諷諭不但已也予方以親依愜所願為幸乃遽哭其喪是年予盖六十有一而彦冲甫四十七以如斯人而止於斯痛念疇昔分好而琢磨之助遂絶望豈不重可哀耶越十有三年其嗣子玶始編次其遺文凡得古賦古律詩記銘章奏議論二十巻目曰屏山集屬予為序嗚呼彦冲不可得而見矣讀其文如見其為人庶可以少紓菀結之思乎彦冲天資卓異而屬意高深於書無所不讀語不妄發與人交淡而耐乆初無所假借鄉人子弟來見必與之欵曲吾以孝弟忠信之道而勉其學業由是薫而為善士者多矣世俗日益偷薄面相諛説則惟予與汝而已轉背則相非毁甚則相為仇敵朋友之道不幾於喪乎念死者之不可作也因感激為之書如彦冲之文豈假予言而後傳哉紹興三十年六月朔籍溪胡憲序屏山集序
