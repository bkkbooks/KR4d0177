body:
  text: 屏山集巻十三宋劉子翬撰詩觀二劉題壁溫其題詩新歴寺落筆風雨驚長林眼高一世常欲罵想見掀髯坐巖隂致中題詩新興寺壞壁嵗乆莓苔侵山僧好事亦可喜解誦鳥啼春意深我來經覽渾如昨玉友金昆念離索投林倦翼不同棲况復分飛在寥廓故山終勝他山好新交不如舊交樂何况把酒問鷗盟卧聽松風同一壑入白水訪劉致中昆仲夜雨歇清曉山椒雲氣昏駕言聊出遊窈窕窮川原側㡌避横篠揚袪障晴暾春泉散石壁細草羅邱園陟峻已逾嶺窺深更緣源喬松傍澗折埀柯激潺湲過籟寒慘慘驚林白翻翻造幽景寥閴勝絶難具論僕夫知余樂踟蹰為停軒惜無徙倚地時來此開樽暮投鵞峯宿青燈耿柴門相從二三子交情乆彌敦談𤣥測彖象攬佩紉蘭蓀願言固所懷邱壑吾道尊攜笻晨起偶無事攜笻出潭川翩翩雙鳬飛宛若導我前林静滴殘雨村深澹寒烟當春足膏澤俯夏餘清妍野溜綠交貫山花紅接連雄觀發新竒勝地窮攀緣據石弄驚急班荆䕃連巻幽懷脫塵拘如超混芒先向令作興來未必勝偶然榮觀事多乖内取樂乃全他時誰繼遊此意遥相傳續賦家園七詠早賦堂南溪抱山流潤氣滋林麓平生歸與心寄老一堂足夢破午忩隂清風在寒竹横秋閣秋山萬尺青影落杯酒中登臨豈不佳寒色見遠空未忘天下憂胡塵起西風萬石亭嵐光近却無一徑緣崖斷危亭勢欲飛翠石雲中亂小山閟清遊懷人發長嘆桂巖山中多桂樹亭亭傍幽巖微風發秋香十里穿松杉誰歌招隱詞吾生付長鑱百花臺森沉徑易迷搘笻為徘徊何處春光多時登百花臺主人澹無情林花為誰開酴醿洞不愛酴醿花愛此酴醿樹青條含露滋輕隂覆行路晝永倦尋書時來散幽步意遠亭雨餘陂水平徙倚聊一望歸雲淡欲無宇宙何清曠吾心遊太虛聊寄此亭上題靈鷲忩翠合初疑無路往停鞭邂逅成清賞僧爐坐穩紙忩明細雨忽來山竹響和溫其對月之什意根如亂苖已薙仍復生讀君對月吟知君懷未平懷悽有豐恨吟苦無和聲雄豪睨一世失路鴻毛輕所以達觀士榮枯兩忘情蒼蒼古松林下有寒泉清醉倒石上眠山禽喚人耕讀平險銘寄李漢老官侯鑿平劍浦灘遊子不歌行路難李公作銘埀不刋峻峰激流生筆端斯文豈但夸雄觀寓理之奥開聾眢惟人性天同廣胖横目立見分庭壇紛然蔽翳榛葦萑騰逃鬱屈猿蛇蚖銛剡獵利劍㦸攢離暌􅎒裂趙魏韓千崖百瀬中繞蟠覆溺嵬岸麋堅完胡為氣舒貌顜頇旁觀已洞其肺肝浮思一縱坂走丸不極不止巧力殫塗膏然萁卒焦亁萬古乾坤元自安堂堂靈君司五官乍臣乍叛勞控摶日漸月磨如印刓壯哉情枿牢盤還躁謀欲驟加雕剜慘若蕭斧臨髀髖自腥夷之良可嘆何如含垢休索瘢灑灑落落從中看豁然四通裂囊簞有如湍流平下湍静看天空秋月寒療性此實言中丹至味淡薄誰能飡我昔䝉公分賸殘桐花城西路漫漫裁牋屢喚南飛翰何當澡瀹紉椒蘭厚地為履天為冠從公上征鞭龍鸞訪瞿追孔聊遊般物外虛明如許寛脚底日轉紅團圞瑶池簉席一笑䦨春著萬象流餘懽茲遊未遂心慱慱吟餘北忩睡長鼾清風時來撼琅玕同胡原仲吳公路遊清湍亭賦詩得流字出山曾幾時桂露颯已秋興來任兩屐散此黙黙憂嵐光近仍滅鳥語静忽流新亭逈臨危急澗循巖陬上有獨樹䕃下有鳴湍幽長飈一振蕩俯仰聞颼飀早生塵累心净盡逈此遊徘徊嘯咏發瞻眺窮林邱天寒雲已歸山好客自畱悠然百不知日月過則休人生樂在我何必遂所求和熊叔雅四詠石峯春靄寒山遠欲無春在𡨕濛處何如掃浮隂盡放岧嶤露清湖驟雨快雨不相期平湖忽蕭颯坐乆日明簷繁聲静中滅潭溪秋碧秋空晩自明孤煙澹難起適意一枝笻時來對寒水屏山夜雪誰憐組練寒夜雪連營積有客卧衡茅淮山夢中白次韻李漢老詩䝉莊嘆隙駒孔聖悲逝川百年生有涯萬感情無邉賢愚真唯阿繫心同一緣内熱蠱其中伊誰肯求痊樂哉今日遊衆賔肅初筵社樗間羣材嫫母參眾妍謔弄旣莞爾獻酬亦頽然胡為發争端咄咄論深禪擊水但増波止薪自無煙便應三宜休敢論四不遷公如高車馳揚塵絶通鄽我如馭小駟交綏已回旋初謀不自量取困大敵前金化質不亡冰融水非堅市門有真樓相從待他年次韻致明七言春風揺溪溪揺天劉郎詩思如湧泉已憐飛花大狼籍却愛芳草長芊綿痴兒了事從渠了萬古寒空没飛鳥北海樽中興味長邯鄲枕裏功名小南山北山雲崔嵬君胡不歌歸去來山中交遊苦相憶玉柱瑶瑟生浮埃謝方德順古風吾聞滄溟深浸灌東南維長風一蕩潏莽蒼天為低中藏百怪珍文彩光陸離潛鯤盡鵬材浮魚悉龍姿罔象遡波浮天吳躍空飛蚌雖辱泥塗猶能吐珠璣地靈物固然在人必多竒英英方家郎秀發如瓊枝裝懷素王書落筆幼婦詞我昔言壺山邂逅初見之賔筵為勸駕一武登雲梯鴻鶱九霄快驥騁天路夷似聞東諸侯辟書已交馳惠然訪吾廬窈窕窮山谿夜燈一笑懽愁抱忽若遺語妙時脱塵飲豪屢反平聲巵領新意自失佳處昔未窺胡為遽改轅歸袂風披披上祈養德業下祝慎鼎幃敬言崇道公乆别良佇思少稷遠訪敝廬仍畱佳句書此寫懷抱不足為報也常嫌門外車驅馳但揚塵今朝故人來喜聽聲轔轔昔别自梁苑分飛湘吳閩痛心鳴鏑禍事往勿復陳共載諧寥閴分笻上嶙峋山川舊賞識挾友意彌新徘徊小精廬劇談口翻津為言漂蕩餘投跡荒寒濵夕火斧僧林朝飡糴隣囷官閑非所恨有禄不濟貧牢愁寫萬斛語壯眉不顰定知撑腸書為君發精神調鐘尚變啞畵龍孰窺真吾聞倜儻才韜黙貴自珍量海浚宜廣豪山磨欲磷十科世所重羣公謂當仁向來薦牘飛璧光動高旻陳編論糟粕中有王道諄謀國必張國療民須活民但得君名揚何異我志伸栁源觀瀑戱明仲山横曉色中綫路窮﨑嶇何年貫日虹飄然墮秋虛晴暉發燦爛隂飈助傾輸深深粉雪沸注險龍蛇趨平生浩蕩胸對此聊一舒蒼蒼古澄潭髣髴幽靈居竒觀付豪逸餘潤分膏腴來遊今七賢賤跡欣與俱扶笻却軒輊坐石安氍毹壁隂生小寒賞澹樂有餘詩魔乆已降幽事復起予為言玉堂人五字不可無次韻明仲遊將軍巖樂哉今日遊結友盡英秀山靈欣客來閣雨開雲岫步屣出煙嵐聲呼荅巖竇輕生快險竒一墜那復捄崇林蓊地幽長湍㵼天漏精廬記舊經宻徑迷新簉將軍隱高寒古井餘荒甃巖有將軍井當年百戰疲蟣蝨生戎胄心存巢許間功豈韓彭後慨然望中原毒手方交鬬曷不生斯辰天驕過難宥妖氛六合昏長夜何時晝尊周感獲麟懷楚歌啼狖世變莽難知如瞽窺篆籒置之勿重論大白飲醇酎幽禽静一聞寒芳晩三嗅方虛接勝懷日轂轉何驟山南山北竒脚力倦尋究良遊易蹉跎澹境難宿畱詩囊歸倒懸瓊琚羡君富寄彭子静凍岫立高白曉寒生太虛閉門翻巾幐偶見良友書書中有長句别懷陳鬱紆吐鳯詞旣絶續貂理難如起望新卿雲一讀三巻舒繁思擾中扄頼此豁欲無鵠鷄有潛化蓬麻豈資扶吾人交義深不恨相見疎但恐德不修心期愧非初必源以古風見投詞意甚遠因為賦風吹原上苖勉其植學待時也風吹原上苖青青入無邊發生頼陽和秀潤滋澄漣遊車走道旁忽之如浮烟那知丁黄愁枵腹望果然農功日夜急地産東南偏飛霜皓盈疇豐穗埀連顚盤盂薦新嘗瓊糜失輝鮮物生為世用豈較成後先羣芳紅打圍從渠争春妍少稷賦十二相屬詩戯贈一篇不用為鼠何數竒放牛南山聊自怡探穴取虎有竒禍守株伺兔非全癡文成雕龍盈巻軸畵蛇失杯坐添足走馬章臺憶舊遊嵗月纔驚羊胛熟六忩要自息獼猴黄鷄無應心日休白衣蒼狗變化易世事何殊牧豬戱夜行潭溪上念原仲致中喬年茂元伯達皆有入山期以詩趣之長夏不見雨袢暑故相病及茲顥氣回一夕飛灑併攬衣步新凉宇宙涵清潤月離去聲南山高水循雙澗静流觀外旣洽至樂中潛應緬懷平生友契濶時光運石峯許尋盟有約殊未定事紛莽如塵欲掃那得盡年衰覺世浮慮淡知心勝良遊莫蹉跎小暇即乘興再和六四叔所賦十二相屬詩飢鼠緣條殘果墮舍如蝸牛足高卧無心虎殿逐羣英尚想兔園傾一座同年我又衰龍鍾䕫蛇相憐寜有窮馬革戰塲空白骨羊裘釣瀬餘清風棘端造猴巧難學且赴茅簷鷄黍約雲深杞狗夜可尋已辦豬靴走磽确讀曾吉甫横碧齋詩㩦鉏引荒泉偶步松崗北泠然毛骨清楚尾見秋色稻氣馥初凉檉隂淡微日緬懷小齋居櫺檻增岑寂曠度滅知聞微吟數峯碧若人端好修珍駕動無跡深窮伊水源峻陟衡山極終焉憩孔林所樂惟自得延和數酌醪侑静一編易向來辱傾輸洞見胸中白思親道匪侔旣遠情不懌矧余質𡨕頑固未易刻畫尊生有遐心克己無全力以茲畏所知負負常夕惕餘波倘時漸玉汝天其戚次韻明仲遊棲雲閣溪山步步開圖障山影更隨溪蕩漾回環兩縣烟雨竒一目盡奄長橋上乾楓枯柳淡不春歡伯為解愁城屯書空咄咄亦良苦抵掌嗚嗚聊任真山房竹隂生晩寂客醉忘歸主忘客沉機已寄謝安棋逸興何慚阮孚屐道人棲雲樂其天孰知為仙孰為禪定應風蜩足枯槁絶勝磨蟻争回旋同汪正夫行夫望鄱江夜夢鄱江清曉踏鄱陽縣雲濤著眼新還疑夢中見寒聲彭蠡合凍色廬峯見時方冬氣深水縮川原變連沙突堆阜泒港分組練蕭蕭蓬鬂風瑟瑟葭叢霰竒觀信幽絶領畧殊未徧何當煙艇高載我行鏡面二難今勝流愛客移清燕飲酣生泰和語妙融交戰衰遲百不堪一快天與便回笻晩霽中路壓滄浪轉波光似畱人隨裾蕩華絢呂居仁惠建昌紙被寒聲晩移林殘臘無幾日高人擁楮眠臠巻意自適素風含混沌春煦回呼吸餘溫偶見分來自芝蘭室乍舒魄流輝忽捲潮無迹未能澡余心愧此一衾白嘗聞盱江藤蒼崖走虬屈斬之霜露秋漚以滄浪色粉身從澼絖蛻骨齊麗宻乃知瑩然姿故自漸陶出治物猶貴精治心豈宜逸平生感交遊耳剽非無得精神隨事分内省殊未力寸隂捐已多老矣將何及自從得此衾夢覺常惕惕清如夷齊隣粹若淵騫覿獨警發鏗鍧邪思戢毫忽勿謂絶知聞虛闈百靈集鼎鬴或存戒韋弦亦規失則知君子所惠以勵䝉塞任伯顯昨寄日杮不至續以膽瓶為貺石瀬分㩦常慘慘尺書沓至中彌感槁杮不呈嫫母面圓壺俄落雄兒膽南忩吾伊俱不勤汲泉養花聊任真枝頭造化豈耐乆我輩自有無窮春寄茶與汪正夫兼簡行夫絳囊團窊社邊得持歸廣文破枯寂三人舌本有雌黄一引胸次還虛白平生目成惟素書邇英能事知有餘欻然長嘯風裂石黟山方卧小於菟雲巖竹源二禪俱與招客三月二十一日遂飲於竹源庵謀諸野則獲也劉竒仲有約不至吳周寳游德華劉致中曁公望劉才仲陳聖述某㑹焉從容辨論懷抱甚適因賦詩以紀之雲巖市聲中竹源山色處平生幾兩屐惟樂取意去晨光霽老春飛蓋雙溪路沙平水漫流雲散天全露逶迤經淺坂窈窕穿崇樹綠登方怒舒紅竟忽繁雨斯焉得小休境熟來已屢徴君常主盟呼吸名勝聚子休心鐵石太叔語韶濩鼎鼎吳劉陳俱有不凡度余衰氣不華清遨慚輙與未渠推遠之政以枵然故九賔旣雲集一士乃鴻翥毋多溷幽人蔬茗煩草具叢談雜莊謔泛閱披黄素豐鐫辨活筆始畫窮真數解衣半日許萬古回胸膆西忩引虛明汛灑延晩步嬾身厭依隨静若超覊馭博山真起予浮煙一枝鶩寄茶與曾吉甫西焙春風一塍隔玉尺銀槽分細色解苞難辨邑中黔㵸盞方知天下白岸巾小啜横碧齋真味從底傾輸來曩歸畀余一語妙三嵗暗室驚轟雷竹源之集竒仲不赴蕭屯以詩嘲之再用原韻平生老子興渾寄幽絶處寜嫌一坡遠甘作十歇去至今清夢狂時走松隂路心忻自吟哦技癢輒披露那知菅蒯微辱報瑶瓊樹胸中萬斛清忽向毫端雨援桴未敢再破敵已驚屢病身得所便一閲精神聚淇竹秋稜欒洛花春布濩真機不可藏文亦肖風度樂哉精廬遊愧我不常與陋鄉豈無竒之此追陪故翻然卜隣心幾逐長風翥但分茅半簷不假牛十具劉郎箇中人幽期乃愆素曾無負負言直委茫茫數移文太遽生恐未明深膆君有旋磨蟻𤨏屑安故步何如驥突雲軒豁隨長馭集枯豈小與動者中不鶩屏山集巻十三
