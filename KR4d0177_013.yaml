body:
  text: 屏山集卷十三宋劉子翬撰詩觀二劉題壁溫其題詩新歷寺落筆風雨驚長林眼高一世常欲罵想見掀髯坐巖隂致中題詩新興寺壞壁嵗久莓苔侵山僧好事亦可喜解誦鳥啼春意深我來經覽渾如昨玉友金昆念離索投林倦翼不同棲况復分飛在寥廓故山終勝他山好新交不如舊交樂何况把酒問鷗盟卧聽松風同一壑入白水訪劉致中昆仲夜雨歇清曉山椒雲氣昏駕言聊出遊窈窕窮川原側帽避橫篠揚袪障晴暾春泉散石壁細草羅邱園陟峻已逾嶺窺深更緣源喬松傍澗折埀柯激潺湲過籟寒慘慘驚林白翻翻造幽景寥閴勝絶難具論僕夫知余樂踟蹰為停軒惜無徙倚地時來此開樽暮投鵝峯宿青燈耿柴門相從二三子交情久彌敦談𤣥測彖象攬佩紉蘭蓀願言固所懷邱壑吾道尊攜笻晨起偶無事攜笻出潭川翩翩雙鳬飛宛若導我前林靜滴殘雨村深淡寒烟當春足膏澤俯夏餘清妍野溜緑交貫山花紅接連雄觀發新竒勝地窮攀緣據石弄驚急班荆䕃連卷幽懷脫塵拘如超混芒先向令作興來未必勝偶然榮觀事多乖內取樂乃全他時誰繼遊此意遙相傳續賦家園七詠早賦堂南溪抱山流潤氣滋林麓平生歸與心寄老一堂足夢破午忩隂清風在寒竹橫秋閣秋山萬尺青影落杯酒中登臨豈不佳寒色見遠空未忘天下憂胡塵起西風萬石亭嵐光近却無一徑緣崖斷危亭勢欲飛翠石雲中亂小山閟清遊懷人發長嘆桂巖山中多桂樹亭亭傍幽巖微風發秋香十里穿松杉誰歌招隱詞吾生付長鑱百花臺森沉徑易迷搘笻為徘徊何處春光多時登百花臺主人淡無情林花為誰開酴醿洞不愛酴醿花愛此酴醿樹青條含露滋輕隂覆行路晝永倦尋書時來散幽步意遠亭雨餘陂水平徙倚聊一望歸雲淡欲無宇宙何清曠吾心遊太虛聊寄此亭上題靈鷲忩翠合初疑無路往停鞭邂逅成清賞僧爐坐穩紙忩明細雨忽來山竹響和溫其對月之什意根如亂苖已剃仍復生讀君對月吟知君懷未平懷悽有豐恨吟苦無和聲雄豪睨一世失路鴻毛輕所以達觀士榮枯兩忘情蒼蒼古松林下有寒泉清醉倒石上眠山禽喚人耕讀平險銘寄李漢老官侯鑿平劍浦灘遊子不歌行路難李公作銘埀不刋峻峰激流生筆端斯文豈但夸雄觀寓理之奧開聾眢惟人性天同廣胖橫目立見分庭壇紛然蔽翳榛葦萑騰逃鬱屈猿蛇蚖銛剡獵利劍㦸攢離暌􅎒裂趙魏韓千崖百瀨中繞蟠覆溺嵬岸麋堅完胡為氣舒貌顜頇旁觀已洞其肺肝浮思一縱坂走丸不極不止巧力殫塗膏然萁卒焦乾萬古乾坤元自安堂堂靈君司五官乍臣乍叛勞控摶日漸月磨如印刓壯哉情枿牢盤還躁謀欲驟加雕剜慘若蕭斧臨髀髖自腥夷之良可嘆何如含垢休索瘢灑灑落落從中看豁然四通裂囊簞有如湍流平下湍靜看天空秋月寒療性此實言中丹至味淡薄誰能餐我昔䝉公分賸殘桐花城西路漫漫裁箋屢喚南飛翰何當澡瀹紉椒蘭厚地為履天為冠從公上征鞭龍鸞訪瞿追孔聊遊般物外虛明如許寬腳底日轉紅團圞瑶池簉席一笑䦨春著萬象流餘歡茲遊未遂心慱慱吟餘北忩睡長鼾清風時來撼琅玕同胡原仲吳公路遊清湍亭賦詩得流字出山曾幾時桂露颯已秋興來任兩屐散此默默憂嵐光近仍滅鳥語靜忽流新亭逈臨危急澗循巖陬上有獨樹䕃下有鳴湍幽長飈一振蕩俯仰聞颼飀早生塵纍心净盡逈此遊徘徊嘯咏發瞻眺窮林邱天寒雲已歸山好客自留悠然百不知日月過則休人生樂在我何必遂所求和熊叔雅四詠石峯春靄寒山遠欲無春在𡨕濛處何如掃浮隂盡放岧嶤露清湖驟雨快雨不相期平湖忽蕭颯坐久日明簷繁聲靜中滅潭溪秋碧秋空晚自明孤煙淡難起適意一枝笻時來對寒水屏山夜雪誰憐組練寒夜雪連營積有客卧衡茅淮山夢中白次韻李漢老詩䝉莊嘆隙駒孔聖悲逝川百年生有涯萬感情無邉賢愚真唯阿繫心同一緣內熱蠱其中伊誰肯求痊樂哉今日遊衆賔肅初筵社樗間羣材嫫母參衆妍謔弄既莞爾獻酬亦頽然胡為發爭端咄咄論深禪擊水但增波止薪自無煙便應三宜休敢論四不遷公如高車馳揚塵絶通鄽我如馭小駟交綏已回旋初謀不自量取困大敵前金化質不亡冰融水非堅市門有真樓相從待他年次韻致明七言春風搖溪溪搖天劉郎詩思如湧泉已憐飛花大狼籍却愛芳草長芊綿癡兒了事從渠了萬古寒空沒飛鳥北海樽中興味長邯鄲枕裏功名小南山北山雲崔嵬君胡不歌歸去來山中交遊苦相憶玉柱瑶瑟生浮埃謝方德順古風吾聞滄溟深浸灌東南維長風一蕩潏莽蒼天為低中藏百怪珍文彩光陸離潛鯤盡鵬材浮魚悉龍姿罔象遡波浮天吳躍空飛蚌雖辱泥塗猶能吐珠璣地靈物固然在人必多竒英英方家郎秀發如瓊枝裝懷素王書落筆幼婦詞我昔言壺山邂逅初見之賔筵為勸駕一武登雲梯鴻鶱九霄快驥騁天路夷似聞東諸侯辟書已交馳惠然訪吾廬窈窕窮山溪夜燈一笑歡愁抱忽若遺語妙時脫塵飲豪屢反平聲巵領新意自失佳處昔未窺胡為遽改轅歸袂風披披上祈養德業下祝慎鼎幃敬言崇道公久别良佇思少稷遠訪敝廬仍留佳句書此寫懷抱不足為報也常嫌門外車驅馳但揚塵今朝故人來喜聽聲轔轔昔别自梁苑分飛湘吳閩痛心鳴鏑禍事往勿復陳共載諧寥閴分笻上嶙峋山川舊賞識挾友意彌新徘徊小精廬劇談口翻津為言漂蕩餘投跡荒寒濵夕火斧僧林朝餐糴鄰囷官間非所恨有祿不濟貧牢愁寫萬斛語壯眉不顰定知撑腸書為君發精神調鐘尚變啞畫龍孰窺真吾聞倜儻才韜默貴自珍量海浚宜廣豪山磨欲磷十科世所重羣公謂當仁向來薦牘飛璧光動高旻陳編論糟粕中有王道諄謀國必張國療民須活民但得君名揚何異我志伸栁源觀瀑戲明仲山橫曉色中線路窮﨑嶇何年貫日虹飄然墮秋虛晴暉發燦爛隂飈助傾輸深深粉雪沸注險龍蛇趨平生浩蕩胸對此聊一舒蒼蒼古澄潭髣佛幽靈居竒觀付豪逸餘潤分膏腴來遊今七賢賤跡欣與俱扶笻却軒輊坐石安氍毹壁隂生小寒賞淡樂有餘詩魔久已降幽事復起豫為言玉堂人五字不可無次韻明仲遊將軍巖樂哉今日遊結友盡英秀山靈欣客來閣雨開雲岫步屣出煙嵐聲呼答巖竇輕生快險竒一墜那復救崇林蓊地幽長湍㵼天漏精廬記舊經密徑迷新簉將軍隱高寒古井餘荒甃巖有將軍井當年百戰疲蟣蝨生戎胄心存巢許間功豈韓彭後慨然望中原毒手方交鬬曷不生斯辰天驕過難宥妖氛六合昏長夜何時晝尊周感獲麟懷楚歌啼狖世變莽難知如瞽窺篆籒置之勿重論大白飲醇酎幽禽靜一聞寒芳晚三嗅方虛接勝懷日轂轉何驟山南山北竒腳力倦尋究良遊易蹉跎淡境難宿留詩囊歸倒懸瓊琚羡君富寄彭子靜凍岫立高白曉寒生太虛閉門翻巾幐偶見良友書書中有長句别懷陳鬱紆吐鳯詞既絶續貂理難如起望新卿雲一讀三卷舒繁思擾中扄賴此豁欲無鵠雞有潛化蓬麻豈資扶吾人交義深不恨相見疏但恐德不修心期愧非初必源以古風見投詞意甚遠因為賦風吹原上苖勉其植學待時也風吹原上苖青青入無邊發生賴陽和秀潤滋澄漣遊車走道旁忽之如浮烟那知丁黃愁枵腹望果然農功日夜急地産東南偏飛霜皓盈疇豐穗埀連顚盤盂薦新嘗瓊糜失輝鮮物生為世用豈較成後先羣芳紅打圍從渠爭春妍少稷賦十二相屬詩戲贈一篇不用為鼠何數竒放牛南山聊自怡探穴取虎有竒禍守株伺兔非全癡文成雕龍盈卷軸畫蛇失杯坐添足走馬章臺憶舊遊嵗月才驚羊胛熟六忩要自息獼猴黃雞無應心日休白衣蒼狗變化易世事何殊牧豬戲夜行潭溪上念原仲致中喬年茂元伯達皆有入山期以詩趣之長夏不見雨袢暑故相病及茲皓氣回一夕飛灑併攬衣步新凉宇宙涵清潤月離去聲南山高水循雙澗靜流觀外既洽至樂中潛應緬懷平生友契濶時光運石峯許尋盟有約殊未定事紛莽如塵欲掃那得盡年衰覺世浮慮淡知心勝良遊莫蹉跎小暇即乘興再和六四叔所賦十二相屬詩飢鼠緣條殘果墮舍如蝸牛足高卧無心虎殿逐羣英尚想兔園傾一座同年我又衰龍鍾䕫蛇相憐寧有窮馬革戰場空白骨羊裘釣瀨餘清風棘端造猴巧難學且赴茅簷雞黍約雲深杞狗夜可尋已辦豬靴走磽確讀曾吉甫橫碧齊詩㩦鉏引荒泉偶步松岡北泠然毛骨清楚尾見秋色稻氣馥初凉柳隂淡微日緬懷小齊居櫺檻增岑寂曠度滅知聞微吟數峯碧若人端好修珍駕動無跡深窮伊水源峻陟衡山極終焉憩孔林所樂惟自得延和數酌醪侑靜一編易向來辱傾輸洞見胸中白思親道匪侔既遠情不懌矧余質𡨕頑固未易刻畫尊生有遐心克己無全力以茲畏所知負負常夕惕餘波倘時漸玉汝天其戚次韻明仲遊棲雲閣溪山步步開圖障山影更隨溪蕩漾回環兩縣烟雨竒一目盡奄長橋上乾楓枯柳淡不春歡伯為解愁城屯書空咄咄亦良苦抵掌嗚嗚聊任真山房竹隂生晚寂客醉忘歸主忘客沉機已寄謝安棋逸興何慚阮孚屐道人棲雲樂其天孰知為仙孰為禪定應風蜩足枯槁絶勝磨蟻爭回旋同汪正夫行夫望鄱江夜夢鄱江清曉踏鄱陽縣雲濤著眼新還疑夢中見寒聲彭蠡合凍色廬峯見時方冬氣深水縮川原變連沙突堆阜泒港分組練蕭蕭蓬鬢風瑟瑟葭叢霰竒觀信幽絶領略殊未遍何當煙艇高載我行鏡面二難今勝流愛客移清燕飲酣生泰和語妙融交戰衰遲百不堪一快天與便回笻晚霽中路壓滄浪轉波光似留人隨裾蕩華絢呂居仁惠建昌紙被寒聲晚移林殘臘無幾日高人擁楮眠臠卷意自適素風含混沌春煦回呼吸餘溫偶見分來自芝蘭室乍舒魄流輝忽捲潮無迹未能澡余心愧此一衾白嘗聞盱江藤蒼崖走虬屈斬之霜露秋漚以滄浪色粉身從澼絖蛻骨齊麗密乃知瑩然姿故自漸陶出治物猶貴精治心豈宜逸平生感交遊耳剽非無得精神隨事分內省殊未力寸隂捐已多老矣將何及自從得此衾夢覺常惕惕清如夷齊鄰粹若淵騫覿獨警發鏗鍧邪思戢毫忽勿謂絶知聞虛闈百靈集鼎釜或存戒韋弦亦規失則知君子所惠以勵䝉塞任伯顯昨寄日柿不至續以膽瓶為貺石瀨分㩦常慘慘尺書沓至中彌感槁柿不呈嫫母面圓壺俄落雄兒膽南忩吾伊俱不勤汲泉養花聊任真枝頭造化豈耐久我輩自有無窮春寄茶與汪正夫兼簡行夫絳囊團窊社邊得持歸廣文破枯寂三人舌本有雌黃一引胸次還虛白平生目成惟素書邇英能事知有餘欻然長嘯風裂石黟山方卧小於菟雲巖竹源二禪俱與招客三月二十一日遂飲於竹源庵謀諸野則獲也劉竒仲有約不至吳周寶游德華劉致中暨公望劉才仲陳聖述某㑹焉從容辨論懷抱甚適因賦詩以紀之雲巖市聲中竹源山色處平生幾兩屐惟樂取意去晨光霽老春飛蓋雙溪路沙平水漫流雲散天全露逶迤經淺坂窈窕穿崇樹緑登方怒舒紅竟忽繁雨斯焉得小休境熟來已屢徴君常主盟呼吸名勝聚子休心鐵石太叔語韶濩鼎鼎吳劉陳俱有不凡度余衰氣不華清遨慚輒與未渠推遠之政以枵然故九賔既雲集一士乃鴻翥毋多溷幽人蔬茗煩草具叢談雜莊謔泛閲披黃素豐鐫辨活筆始畫窮真數解衣半日許萬古回胸膆西忩引虛明汛灑延晚步懶身厭依隨靜若超羈馭博山真起豫浮煙一枝鶩寄茶與曾吉甫西焙春風一塍隔玉尺銀槽分細色解苞難辨邑中黔㵸盞方知天下白岸巾小啜橫碧齊真味從底傾輸來曩歸畀余一語妙三嵗暗室驚轟雷竹源之集竒仲不赴蕭屯以詩嘲之再用原韻平生老子興渾寄幽絶處寧嫌一坡遠甘作十歇去至今清夢狂時走松隂路心欣自吟哦技癢輒披露那知菅蒯微辱報瑶瓊樹胸中萬斛清忽向毫端雨援桴未敢再破敵已驚屢病身得所便一閲精神聚淇竹秋稜欒洛花春布濩真機不可藏文亦肖風度樂哉精廬遊愧我不常與陋鄉豈無竒之此追陪故翻然卜鄰心幾逐長風翥但分茅半簷不假牛十具劉郎箇中人幽期乃愆素曾無負負言直委茫茫數移文太遽生恐未明深膆君有旋磨蟻瑣屑安故步何如驥突雲軒豁隨長馭集枯豈小與動者中不鶩屏山集卷十三
